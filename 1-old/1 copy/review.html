<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review — backup restore</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        :root{ --header-offset: 0.5cm; --hint-offset: 2cm }
        .background-gradient{position:fixed;inset:0;pointer-events:none;z-index:0}
        .icon{font-size:70px;opacity:0.3;font-weight:800;user-select:none;pointer-events:none}
        .horizontal-left-overlay, .horizontal-right-overlay{position:absolute;top:0;bottom:0;width:50%;display:none;align-items:center;z-index:1;pointer-events:none}
        .horizontal-left-overlay{left:0;justify-content:center}
        .horizontal-right-overlay{right:0;justify-content:center}
        .vertical-top-overlay, .vertical-bottom-overlay{position:absolute;left:0;right:0;width:100%;display:none;align-items:center;z-index:1;pointer-events:none}
        .vertical-top-overlay{top:0;height:50%;justify-content:center}
        .vertical-bottom-overlay{bottom:0;height:50%;justify-content:center}
        .gradient-overlay{position:absolute;width:200%;height:200%;top:-50%;left:-50%;opacity:0;transition:opacity 0.15s}
        .gradient-known{background:radial-gradient(circle at center, rgba(76,175,80,0) 0%, rgba(76,175,80,0.12) 30%, rgba(76,175,80,0.28) 60%, rgba(76,175,80,0.45) 100%)}
        .gradient-review{background:radial-gradient(circle at center, rgba(255,152,0,0) 0%, rgba(255,152,0,0.12) 30%, rgba(255,152,0,0.28) 60%, rgba(255,152,0,0.45) 100%)}

        .container{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center}
        .word-large{font-size:64px;font-weight:800;text-align:center;user-select:none;transition:transform .08s ease, opacity .08s;max-width:90vw;line-height:1.2;word-wrap:break-word;white-space:normal}
        .word-small{font-size:26px;font-weight:700;text-align:center;color:#ddd}

        .top-area{position:absolute;top:calc(var(--header-offset) + env(safe-area-inset-top,0px));left:0;right:0;height:72px;display:flex;align-items:center;justify-content:center;z-index:3;pointer-events:none}
        .top-inner{width:100%;max-width:900px;display:flex;align-items:center;gap:12px;padding:12px 20px;box-sizing:border-box;pointer-events:auto}
        .top-inner{display:flex;align-items:center;justify-content:space-between}
        .top-left, .top-center, .top-right {display:flex;align-items:center}
        .top-left {flex:0 0 48px}
        .top-center {flex:1 1 auto;justify-content:center}
        .top-right {flex:0 0 auto}
        .back-button{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.04);z-index:5}
        .back-button:before{content:'';width:10px;height:10px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:translateY(1px) rotate(45deg);display:block}
        .section-title{font-weight:700;z-index:4}

        .background-icon{position:absolute;font-weight:800;z-index:0;pointer-events:none;display:none}
        .background-icon-mobile-top{top:10%;left:50%;transform:translateX(-50%);font-size:180px;opacity:0.08;color:rgba(76,175,80,0.18);filter:drop-shadow(0 0 8px rgba(76,175,80,0.25))}
        .background-icon-mobile-bottom{bottom:10%;left:50%;transform:translateX(-50%);font-size:160px;opacity:0.08;color:rgba(255,152,0,0.18);filter:drop-shadow(0 0 8px rgba(255,152,0,0.25))}
        .background-icon-pc-left{top:50%;left:6%;transform:translateY(-50%);font-size:200px;opacity:0.08;color:rgba(76,175,80,0.12);filter:drop-shadow(0 0 12px rgba(76,175,80,0.22))}
        .background-icon-pc-right{top:50%;right:6%;transform:translateY(-50%);font-size:200px;opacity:0.08;color:rgba(255,152,0,0.12);filter:drop-shadow(0 0 12px rgba(255,152,0,0.22))}

        .bottom-hint{position:absolute;bottom:calc(var(--hint-offset) + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);color:#999;font-size:13px;z-index:3;white-space:nowrap;max-width:calc(100% - 40px);overflow:hidden;text-overflow:ellipsis}

        .progress{position:relative;color:#aaa;z-index:3;font-weight:400}

        .dragging { font-size:64px; color:#4caf50 }

        .hidden-ui{opacity:0;visibility:hidden;pointer-events:none}
        .visible-ui{opacity:1;visibility:visible;pointer-events:auto}

        .translation-sticky{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:800;color:#4caf50;z-index:4;pointer-events:none;opacity:0;transition:opacity .12s;max-width:calc(100% - 40px);white-space:nowrap;overflow:hidden}

        @media (max-width:768px){ .word-large{font-size:48px} }
        @media (max-width:768px) {
            .horizontal-left-overlay, .horizontal-right-overlay { display: none !important; }
            .vertical-top-overlay, .vertical-bottom-overlay { display: flex !important; }
            .background-icon-mobile-top, .background-icon-mobile-bottom { display: block !important; }
            .background-icon-pc-left, .background-icon-pc-right { display: none !important; }
        }
        @media (min-width:769px) {
            .vertical-top-overlay, .vertical-bottom-overlay { display: none !important; }
            .horizontal-left-overlay, .horizontal-right-overlay { display: flex !important; }
            .background-icon-mobile-top, .background-icon-mobile-bottom { display: none !important; }
            .background-icon-pc-left, .background-icon-pc-right { display: block !important; }
        }
    </style>
</head>
<body>
    <div class="background-gradient">
        <div class="gradient-overlay gradient-known" id="gradient-known"></div>
        <div class="gradient-overlay gradient-review" id="gradient-review"></div>
        <div class="background-icon background-icon-mobile-top">✓</div>
        <div class="background-icon background-icon-mobile-bottom">↻</div>
        <div class="background-icon background-icon-pc-left">✓</div>
        <div class="background-icon background-icon-pc-right">↻</div>
        <div class="horizontal-left-overlay"><div class="icon" style="color:#4caf50;filter:drop-shadow(0 0 8px rgba(76,175,80,0.45))"></div></div>
        <div class="horizontal-right-overlay"><div class="icon" style="color:#ff9800;filter:drop-shadow(0 0 8px rgba(255,152,0,0.45))"></div></div>
        <div class="vertical-top-overlay"><div class="icon" style="color:#4caf50;filter:drop-shadow(0 0 8px rgba(76,175,80,0.45))"></div></div>
        <div class="vertical-bottom-overlay"><div class="icon" style="color:#ff9800;filter:drop-shadow(0 0 8px rgba(255,152,0,0.45))"></div></div>
    </div>

    <div class="top-area hidden-ui" id="top-area">
        <div class="top-inner">
            <div class="top-left"><div class="back-button" id="back-button" title="Back"></div></div>
            <div class="top-center"><div class="section-title" id="section-title">Review Words</div></div>
            <div class="top-right"><div id="progress" class="progress"></div></div>
        </div>
    </div>

    <div class="container">
        <div id="wordContainer" style="position:relative; width:100%; display:flex; justify-content:center">
            <div id="wordLarge" class="word-large">Loading...</div>
            <div id="wordSmall" class="word-small" style="display:none"></div>
            <div id="translationSticky" class="translation-sticky" aria-hidden="true"></div>
        </div>
        <div id="hint" class="bottom-hint hidden-ui"></div>
    </div>

    <script>
    (function() {
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const listParam = urlParams.get('list');
        const typeParam = urlParams.get('type') || 'words'; // words, phrases, sentences
        const sessionId = urlParams.get('session');

        // DOM элементы
        const wordLarge = document.getElementById('wordLarge');
        const wordSmall = document.getElementById('wordSmall');
        const progressEl = document.getElementById('progress');
        const backButton = document.getElementById('back-button');
        const topArea = document.getElementById('top-area');
        const sectionTitle = document.getElementById('section-title');
        const gradientKnown = document.getElementById('gradient-known');
        const gradientReview = document.getElementById('gradient-review');
        const hintEl = document.getElementById('hint');
        const translationSticky = document.getElementById('translationSticky');
        const wordContainer = document.getElementById('wordContainer');

        // Состояние
        let wordQueue = [];
        let currentIndex = 0;
        let currentWord = null;
        let currentList = null;
        let isCombined = false;
        let isUIHidden = true;

        // Для drag & drop
        let isPointerActive = false;
        let startX = 0, startY = 0, lastX = 0, lastY = 0;
        let draggingStarted = false;
        let downTime = 0;
        let translationShownDuringDrag = false;
        let originalEnglish = '';
        let originalFontSize = '';
        let stickyVisible = false;

        const TAP_MAX_MS = 150;
        const START_DRAG = 2;
        const DRAG_THRESHOLD = 40;

        // ===== НАСТРОЙКИ ГИСТЕРЕЗИСА =====
        // Порог показа перевода при движении К ГРАНИЦЕ (в процентах от края экрана)
        const SHOW_TRANSLATION_THRESHOLD = 0.15; // 15% - показываем перевод

        // Порог возврата оригинала при движении ОТ ГРАНИЦЫ (в процентах от края экрана)
        // Здесь можно менять значение: 0.2 = 20%, 0.25 = 25% и т.д.
        const HIDE_TRANSLATION_THRESHOLD = 0.20; // 20% - возвращаем оригинал
        // =================================

        // Определяем мобильное устройство
        const isMobile = window.innerWidth <= 768 || 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // Устанавливаем текст подсказки
        function setHintText() {
            if (isMobile) {
                hintEl.textContent = 'Вверх — слово знаете, вниз — для повтора';
            } else {
                hintEl.textContent = 'Влево — слово знаете, вправо — для повтора';
            }
        }
        setHintText();

        // Обновление видимости UI
        function updateUIVisibility() {
            if (isUIHidden) {
                topArea.classList.add('hidden-ui');
                topArea.classList.remove('visible-ui');
                hintEl.classList.add('hidden-ui');
                hintEl.classList.remove('visible-ui');
                progressEl.classList.add('hidden-ui');
                progressEl.classList.remove('visible-ui');
            } else {
                topArea.classList.remove('hidden-ui');
                topArea.classList.add('visible-ui');
                hintEl.classList.remove('hidden-ui');
                hintEl.classList.add('visible-ui');
                progressEl.classList.remove('hidden-ui');
                progressEl.classList.add('visible-ui');
            }
        }

        // База данных для сохранения прогресса
        const WordDB = {
            // Сохраняем статус слова
            saveWordStatus(listId, itemId, status) {
                const listKey = listId.split('/').pop().replace('.json', '');
                const key = `item_${listKey}_${itemId}`;
                localStorage.setItem(key, status);
                console.log(`Saved: ${key} = ${status}`);
            },

            // Получаем статус слова
            getWordStatus(listId, itemId) {
                const listKey = listId.split('/').pop().replace('.json', '');
                const key = `item_${listKey}_${itemId}`;
                return localStorage.getItem(key) || 'new';
            },

            // Получаем слова для повторения
            getItemsForReview(listData) {
                const reviewed = [];
                const fresh = [];

                (listData.items || []).forEach(item => {
                    const status = this.getWordStatus(listData.id || listData.filename, item.id || item.english);
                    item.status = status;
                    if (status === 'review') reviewed.push(item);
                    else if (status === 'new') fresh.push(item);
                });

                return reviewed.concat(fresh);
            },

            // Обновляем статусы в списке
            updateListStatus(listData) {
                if (!listData || !Array.isArray(listData.items)) return listData;
                listData.items.forEach(item => {
                    const status = this.getWordStatus(listData.id || listData.filename, item.id || item.english);
                    item.status = status;
                });
                return listData;
            }
        };

        // Менеджер аудио
        const AudioManager = {
            audioElements: new Map(),

            async play(item) {
                if (!item) return;

                try {
                    // Получаем путь к аудио
                    let src = null;
                    if (item.audio && item.audio[0]) {
                        src = item.audio[0];
                    } else {
                        // Пробуем сгенерировать путь из английского слова
                        const word = (item.english || '').toLowerCase().replace(/[^a-z0-9]/g, '_');
                        src = `audio/${word}.wav`;
                    }

                    // Проверяем, есть ли уже загруженное аудио
                    if (this.audioElements.has(item.id || item.english)) {
                        const audio = this.audioElements.get(item.id || item.english);
                        try {
                            audio.currentTime = 0;
                            await audio.play();
                        } catch (e) {
                            // Игнорируем ошибки воспроизведения
                        }
                        return;
                    }

                    // Создаем новое аудио
                    const audio = new Audio(src);
                    audio.preload = 'auto';
                    this.audioElements.set(item.id || item.english, audio);

                    audio.addEventListener('canplaythrough', () => {
                        try {
                            audio.play().catch(() => {});
                        } catch (e) {}
                    });

                    audio.addEventListener('error', () => {
                        console.log('Audio not found:', src);
                    });

                    // Пытаемся воспроизвести
                    try {
                        await audio.play();
                    } catch (e) {
                        // Игнорируем ошибки (браузер может блокировать автовоспроизведение)
                    }
                } catch (e) {
                    console.warn('Audio error:', e);
                }
            }
        };

        // Загрузка JSON
        async function fetchJson(path) {
            try {
                const response = await fetch(path);
                if (!response.ok) return null;
                return await response.json();
            } catch (e) {
                console.warn('Failed to fetch:', path, e);
                return null;
            }
        }

        // Загрузка списка
        async function loadList() {
            try {
                // Если есть sessionId - загружаем комбинированную сессию
                if (sessionId) {
                    const sessionData = localStorage.getItem(sessionId);
                    if (sessionData) {
                        const session = JSON.parse(sessionData);
                        wordQueue = session.items || [];
                        isCombined = true;
                        currentList = {
                            id: 'combined',
                            name: 'Multiple Lists',
                            theme: 'Combined Review'
                        };
                        sectionTitle.textContent = 'Combined Review';
                    } else {
                        wordLarge.textContent = 'Session not found';
                        return;
                    }
                }
                // Иначе загружаем обычный список
                else if (listParam) {
                    const listName = decodeURIComponent(listParam);

                    // Формируем путь к файлу
                    let filePath;
                    if (listName.includes('/')) {
                        // Если уже есть путь, используем как есть
                        filePath = listName;
                    } else {
                        // Иначе строим путь на основе типа
                        filePath = `english/${typeParam}/${listName}.json`;
                    }

                    console.log('Loading list from:', filePath);

                    // Загружаем список
                    let listData = await fetchJson(filePath);

                    if (!listData) {
                        // Пробуем альтернативный путь
                        const altPath = `english/${listName}.json`;
                        console.log('Trying alternative path:', altPath);
                        listData = await fetchJson(altPath);
                    }

                    if (!listData) {
                        wordLarge.textContent = 'Error: List not found';
                        console.error('Could not load list:', listParam);
                        return;
                    }

                    // Добавляем метаданные
                    listData.id = listName;
                    listData.filename = listName;
                    listData.fullPath = filePath;

                    currentList = listData;

                    // Устанавливаем заголовок
                    sectionTitle.textContent = listData.theme || listData.name || 'Review';

                    // Обновляем статусы
                    WordDB.updateListStatus(listData);

                    // Получаем слова для повторения
                    wordQueue = WordDB.getItemsForReview(listData);

                    // Перемешиваем
                    for (let i = wordQueue.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [wordQueue[i], wordQueue[j]] = [wordQueue[j], wordQueue[i]];
                    }
                }

                if (!wordQueue || wordQueue.length === 0) {
                    wordLarge.textContent = 'No words to review';
                    return;
                }

                currentIndex = 0;
                showWord();
                updateProgress();

            } catch (e) {
                console.error('Error loading list:', e);
                wordLarge.textContent = 'Error loading list';
            }
        }

        // Показать текущее слово
        function showWord() {
            currentWord = wordQueue[currentIndex];

            // Сбрасываем визуальное состояние
            translationSticky.style.opacity = '0';
            translationSticky.textContent = '';

            // Принудительно сбрасываем все стили перед показом нового слова
            wordLarge.style.cssText = '';
            wordLarge.classList.remove('dragging');

            // ВАЖНО: Устанавливаем правильные CSS свойства для переноса текста
            wordLarge.style.whiteSpace = 'normal';
            wordLarge.style.wordWrap = 'break-word';
            wordLarge.style.maxWidth = '90vw';

            // Устанавливаем текст и базовый класс
            wordLarge.textContent = currentWord.english || currentWord.word || '';
            wordLarge.classList.add('word-large');

            // Скрываем small элемент
            wordSmall.style.display = 'none';

            translationShownDuringDrag = false;
            stickyVisible = false;

            // Воспроизводим аудио
            try {
                AudioManager.play(currentWord);
            } catch (e) {}

            console.log('Showing word:', currentWord.english, 'index:', currentIndex);
        }

        // Обновить прогресс
        function updateProgress() {
            progressEl.textContent = `${currentIndex + 1}/${wordQueue.length}`;
        }

        // Подогнать текст под контейнер (улучшенная версия)
        function fitTextToContainer(elem, initialSize = 64) {
            try {
                // Сохраняем оригинальный текст
                const originalText = elem.textContent;

                // Временно убираем inline стили размера
                const originalInlineStyle = elem.style.cssText;
                elem.style.fontSize = '';
                elem.style.whiteSpace = 'nowrap';

                // Получаем максимальную ширину
                const container = wordContainer;
                const maxWidth = Math.max(100, container.clientWidth - 40);

                // Начинаем с начального размера
                let fontSize = initialSize;
                elem.style.fontSize = fontSize + 'px';

                // Уменьшаем пока не влезет или не достигнем минимума
                while (elem.scrollWidth > maxWidth && fontSize > 12) {
                    fontSize -= 2;
                    elem.style.fontSize = fontSize + 'px';
                }

                console.log(`Fitted text "${originalText.substring(0, 15)}..." to ${fontSize}px`);
            } catch (e) {
                console.warn('Error in fitTextToContainer:', e);
            }
        }

        // Функция для сброса текста к оригинальному состоянию с правильным переносом
        function resetToOriginalText() {
            if (currentWord) {
                wordLarge.textContent = originalEnglish || currentWord.english || '';
                // ВАЖНО: Возвращаем правильные свойства для переноса
                wordLarge.style.whiteSpace = 'normal';
                wordLarge.style.wordWrap = 'break-word';
                wordLarge.style.fontSize = ''; // Сбрасываем inline размер
                wordLarge.style.maxWidth = '90vw';
            }
        }

        // Обработчики drag & drop
        function onPointerDown(e) {
            const point = (e.touches && e.touches[0]) || e;
            startX = point.clientX;
            startY = point.clientY;
            lastX = startX;
            lastY = startY;

            isPointerActive = true;
            draggingStarted = false;
            downTime = Date.now();

            wordLarge.style.transition = 'none';
            translationSticky.style.opacity = '0';

            e.preventDefault?.();
        }

        function onPointerMove(e) {
            if (!isPointerActive) return;

            const point = (e.touches && e.touches[0]) || e;
            const dx = point.clientX - startX;
            const dy = point.clientY - startY;
            lastX = point.clientX;
            lastY = point.clientY;

            const moved = Math.max(Math.abs(dx), Math.abs(dy));

            // Начинаем драг только после превышения порога
            if (!draggingStarted && moved >= START_DRAG) {
                draggingStarted = true;
                wordLarge.classList.add('dragging');
                isUIHidden = true;
                updateUIVisibility();

                // Сохраняем оригинальный текст при старте драга
                originalEnglish = wordLarge.textContent;
                // Сохраняем текущий размер шрифта
                originalFontSize = wordLarge.style.fontSize;
            }

            if (draggingStarted) {
                const primaryDistance = Math.max(Math.abs(dx), Math.abs(dy));
                const ratio = Math.min(primaryDistance / 200, 1);

                // Управляем градиентами
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        gradientReview.style.opacity = String(ratio);
                        gradientKnown.style.opacity = '0';
                    } else {
                        gradientKnown.style.opacity = String(ratio);
                        gradientReview.style.opacity = '0';
                    }
                } else {
                    if (dy > 0) {
                        gradientReview.style.opacity = String(ratio);
                        gradientKnown.style.opacity = '0';
                    } else {
                        gradientKnown.style.opacity = String(ratio);
                        gradientReview.style.opacity = '0';
                    }
                }

                // Масштаб и цвет
                const scale = 1 + 0.14 * ratio;
                let targetColor;

                if (Math.abs(dx) > Math.abs(dy)) {
                    targetColor = dx > 0 ? { r: 255, g: 152, b: 0 } : { r: 76, g: 175, b: 80 };
                } else {
                    targetColor = dy > 0 ? { r: 255, g: 152, b: 0 } : { r: 76, g: 175, b: 80 };
                }

                const r = Math.round(255 + (targetColor.r - 255) * ratio);
                const g = Math.round(255 + (targetColor.g - 255) * ratio);
                const b = Math.round(255 + (targetColor.b - 255) * ratio);

                wordLarge.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
                wordLarge.style.color = `rgb(${r},${g},${b})`;

                // Определяем, нужно ли показывать перевод (с гистерезисом)
                let shouldShowTranslation = false;

                try {
                    const rect = wordLarge.getBoundingClientRect();

                    if (isMobile) {
                        // Для мобильных: вертикальное движение
                        const distanceToTop = rect.top;
                        const distanceToBottom = window.innerHeight - rect.bottom;

                        // Проверяем, достаточно ли близко к границе для показа перевода
                        if (distanceToTop <= window.innerHeight * SHOW_TRANSLATION_THRESHOLD) {
                            shouldShowTranslation = true;
                        }
                        if (distanceToBottom <= window.innerHeight * SHOW_TRANSLATION_THRESHOLD) {
                            shouldShowTranslation = true;
                        }

                        // Если перевод уже показан, используем больший порог для скрытия (гистерезис)
                        if (translationShownDuringDrag) {
                            // Проверяем, не ушли ли мы слишком далеко от границы
                            if (distanceToTop > window.innerHeight * HIDE_TRANSLATION_THRESHOLD &&
                                distanceToBottom > window.innerHeight * HIDE_TRANSLATION_THRESHOLD) {
                                shouldShowTranslation = false;
                            } else {
                                // Если мы все еще в зоне гистерезиса, оставляем перевод
                                shouldShowTranslation = true;
                            }
                        }
                    } else {
                        // Для ПК: горизонтальное движение
                        const distanceToLeft = rect.left;
                        const distanceToRight = window.innerWidth - rect.right;

                        // Проверяем, достаточно ли близко к границе для показа перевода
                        if (distanceToLeft <= window.innerWidth * SHOW_TRANSLATION_THRESHOLD) {
                            shouldShowTranslation = true;
                        }
                        if (distanceToRight <= window.innerWidth * SHOW_TRANSLATION_THRESHOLD) {
                            shouldShowTranslation = true;
                        }

                        // Если перевод уже показан, используем больший порог для скрытия (гистерезис)
                        if (translationShownDuringDrag) {
                            // Проверяем, не ушли ли мы слишком далеко от границы
                            if (distanceToLeft > window.innerWidth * HIDE_TRANSLATION_THRESHOLD &&
                                distanceToRight > window.innerWidth * HIDE_TRANSLATION_THRESHOLD) {
                                shouldShowTranslation = false;
                            } else {
                                // Если мы все еще в зоне гистерезиса, оставляем перевод
                                shouldShowTranslation = true;
                            }
                        }
                    }
                } catch (e) {}

                // Управляем отображением перевода на основе рассчитанного shouldShowTranslation
                if (shouldShowTranslation && !translationShownDuringDrag) {
                    // Показываем перевод
                    const translation = currentWord.translation || currentWord.russian || '';
                    wordLarge.textContent = translation;

                    // ВАЖНО: Для перевода тоже устанавливаем правильный перенос
                    wordLarge.style.whiteSpace = 'normal';
                    wordLarge.style.wordWrap = 'break-word';

                    // Подгоняем размер перевода
                    fitTextToContainer(wordLarge, 64);

                    translationShownDuringDrag = true;
                } else if (!shouldShowTranslation && translationShownDuringDrag) {
                    // Возвращаем оригинальный текст с правильным переносом
                    resetToOriginalText();
                    translationShownDuringDrag = false;
                }
            }

            e.preventDefault?.();
        }

        function onPointerUp(e) {
            if (!isPointerActive) return;
            isPointerActive = false;

            // Если это был тап (без драга) - переключаем UI
            if (!draggingStarted) {
                if (Date.now() - downTime < TAP_MAX_MS) {
                    isUIHidden = !isUIHidden;
                    updateUIVisibility();
                }
                return;
            }

            // Обрабатываем отпускание после драга
            wordLarge.style.transition = 'transform 0.25s ease, opacity 0.2s ease';

            const dx = lastX - startX;
            const dy = lastY - startY;

            gradientKnown.style.opacity = '0';
            gradientReview.style.opacity = '0';

            // Если движение слишком маленькое - отменяем
            if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) {
                translationSticky.style.opacity = '0';
                stickyVisible = false;

                // Возвращаем оригинальный текст с правильным переносом
                resetToOriginalText();
                wordLarge.style.cssText = '';
                wordLarge.classList.remove('dragging');
                translationShownDuringDrag = false;

                wordLarge.style.transform = '';
                return;
            }

            // Определяем действие
            let action = null;
            const primaryIsHorizontal = Math.abs(dx) > Math.abs(dy);

            if (primaryIsHorizontal) {
                action = dx > 0 ? 'review' : 'known';
            } else {
                action = dy > 0 ? 'review' : 'known';
            }

            // Анимация улетания
            const signX = dx > 0 ? 1 : -1;
            const signY = dy > 0 ? 1 : -1;

            let offX = 0, offY = 0;
            if (primaryIsHorizontal) {
                offX = signX * (window.innerWidth + 200);
                offY = 0;
            } else {
                offX = 0;
                offY = signY * (window.innerHeight + 200);
            }

            wordLarge.style.transform = `translate(${offX}px, ${offY}px) scale(0.95)`;
            wordLarge.style.opacity = '0';

            // Сохраняем статус
            if (!isCombined) {
                WordDB.saveWordStatus(
                    currentList.id || currentList.filename,
                    currentWord.id || currentWord.english,
                    action
                );
            }

            translationSticky.style.opacity = '0';
            stickyVisible = false;

            // Переходим к следующему слову
            setTimeout(() => {
                currentIndex++;
                if (currentIndex >= wordQueue.length) {
                    window.location.href = 'index.html';
                    return;
                }

                // Полный сброс стилей перед показом нового слова
                wordLarge.style.cssText = '';
                wordLarge.style.transition = '';
                wordLarge.style.transform = '';
                wordLarge.style.opacity = '1';

                showWord();
                updateProgress();
            }, 320);
        }

        // Клавиатурное управление
        function applyActionKeyboard(action) {
            if (!currentWord) return;

            if (!isCombined) {
                WordDB.saveWordStatus(
                    currentList.id || currentList.filename,
                    currentWord.id || currentWord.english,
                    action
                );
            }

            wordLarge.style.transition = 'transform .25s ease, opacity .18s';
            wordLarge.style.transform = action === 'review'
                ? `translate(${window.innerWidth}px, 0)`
                : `translate(-${window.innerWidth}px, 0)`;
            wordLarge.style.opacity = '0';

            setTimeout(() => {
                currentIndex++;
                if (currentIndex >= wordQueue.length) {
                    window.location.href = 'index.html';
                    return;
                }

                wordLarge.style.cssText = '';
                wordLarge.style.opacity = '1';
                wordLarge.style.transform = '';
                showWord();
                updateProgress();
            }, 260);
        }

        // Инициализация
        function init() {
            // Обработчики мыши/тач
            window.addEventListener('mousedown', onPointerDown);
            window.addEventListener('touchstart', onPointerDown, { passive: false });
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('touchmove', onPointerMove, { passive: false });
            window.addEventListener('mouseup', onPointerUp);
            window.addEventListener('touchend', onPointerUp);

            // Клавиатура
            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'ArrowUp') {
                    applyActionKeyboard('known');
                } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'ArrowDown') {
                    applyActionKeyboard('review');
                }
            });

            // Кнопка назад
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            backButton.addEventListener('touchend', (e) => {
                e.preventDefault?.();
                window.location.href = 'index.html';
            });

            // Обработка свайпа от левого края для возврата
            let touchStartX = null, touchStartY = null, touchStartTime = 0;

            window.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (touch) {
                    touchStartX = touch.clientX;
                    touchStartY = touch.clientY;
                    touchStartTime = Date.now();
                }
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                if (touchStartX !== null && touchStartX <= 60) {
                    const touch = e.changedTouches[0];
                    if (touch) {
                        const dx = Math.abs(touch.clientX - touchStartX);
                        const dy = Math.abs(touch.clientY - touchStartY);
                        const dt = Date.now() - touchStartTime;

                        if (dx < 30 && dy < 40 && dt < 500) {
                            window.location.href = 'index.html';
                        }
                    }
                }
                touchStartX = null;
                touchStartY = null;
            }, { passive: true });

            // Показываем UI скрытым изначально
            updateUIVisibility();

            // Загружаем список
            loadList();
        }

        // Запускаем приложение
        init();
    })();
    </script>
</body>
