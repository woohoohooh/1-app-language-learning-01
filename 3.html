<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Найди кошечек — Уровень 2</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0d1008; overflow:hidden; font-family:'Caveat',cursive; }
#scene { position:fixed; inset:0; overflow:hidden; }
#world {
  position:absolute; width:1200px; height:800px;
  top:50%; left:50%; transform:translate(-50%,-50%);
  transform-origin:center center;
}
#bg-layer,#fg-layer { position:absolute; top:0; left:0; width:1200px; height:800px; }
#fg-layer { pointer-events:none; z-index:15; }
.cloud-a { animation:cldA 32s linear infinite; }
.cloud-b { animation:cldA 50s linear infinite; animation-delay:-20s; }
.cloud-c { animation:cldA 68s linear infinite; animation-delay:-40s; }
@keyframes cldA { from{transform:translateX(0)} to{transform:translateX(220px)} }
.sway  { transform-origin:bottom center; animation:sw 3.4s ease-in-out infinite; }
.sway2 { transform-origin:bottom center; animation:sw 2.8s ease-in-out infinite; animation-delay:-1.2s; }
.sway3 { transform-origin:bottom center; animation:sw 4.1s ease-in-out infinite; animation-delay:-2.8s; }
.sway4 { transform-origin:bottom center; animation:sw 5s   ease-in-out infinite; animation-delay:-1.8s; }
@keyframes sw { 0%,100%{transform:rotate(0)} 50%{transform:rotate(4.5deg)} }
#sails { transform-origin:592px 430px; animation:spin 9s linear infinite; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
.rpl  { animation:rplA 4.2s ease-in-out infinite; }
.rpl2 { animation:rplA 5.1s ease-in-out infinite; animation-delay:-2s; }
.rpl3 { animation:rplA 3.4s ease-in-out infinite; animation-delay:-3.3s; }
@keyframes rplA { 0%,100%{opacity:.32;transform:scaleX(1)} 50%{opacity:.68;transform:scaleX(1.05)} }
.bfly  { animation:bfA 20s linear infinite; }
.bfly2 { animation:bfA 28s linear infinite; animation-delay:-11s; }
@keyframes bfA { from{transform:translateX(-120px);opacity:0} 5%{opacity:1} 95%{opacity:1} to{transform:translateX(380px);opacity:0} }
.dfly  { animation:dfA 2.4s ease-in-out infinite; }
@keyframes dfA { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-9px) rotate(4deg)} }
.wfrond { animation:wfA 4s ease-in-out infinite; transform-origin:top center; }
@keyframes wfA { 0%,100%{transform:rotate(0)} 50%{transform:rotate(3deg)} }
.smoke { animation:smokeA 6s ease-in-out infinite; }
@keyframes smokeA { 0%,100%{transform:translateY(0) scaleX(1);opacity:.45} 50%{transform:translateY(-6px) scaleX(1.15);opacity:.25} }
.cat-wrap {
  position:absolute; cursor:crosshair; z-index:10;
  transition:left 1.05s cubic-bezier(.4,0,.5,1),
             top .9s cubic-bezier(.3,0,.5,1),
             transform .8s ease-in, opacity .35s;
}
.cat-wrap.found { pointer-events:none; z-index:30; }
@keyframes catReveal {
  from{opacity:.3;transform:scale(.85);filter:blur(3px)}
  to  {opacity:1; transform:scale(1);  filter:blur(0)}
}
#ui {
  position:absolute; top:18px; left:18px;
  background:rgba(248,244,230,.93); border:2px solid #2a1a0a;
  border-radius:2px; padding:10px 20px 13px;
  box-shadow:3px 3px 0 #2a1a0a; z-index:40;
}
#ui h2 { font-family:'IM Fell English',serif; font-size:16px; font-style:italic;
  color:#1a0800; border-bottom:1px solid #b0905a; padding-bottom:5px; margin-bottom:7px; }
#score-line { font-size:27px; color:#1a0800; letter-spacing:2px; }
#hint { font-size:12px; color:#88603a; font-style:italic; margin-top:5px; }
#level-badge { font-size:11px; color:#664420; margin-top:4px; opacity:.7; }
.paw {
  position:absolute; pointer-events:none; font-size:12px;
  opacity:0; z-index:35; animation:pawA 1.3s ease-out forwards;
}
@keyframes pawA {
  0%  {opacity:.85;transform:scale(1) rotate(var(--r))}
  100%{opacity:0; transform:scale(.3) rotate(var(--r)) translateY(14px)}
}
#door-flash {
  position:absolute; left:550px; top:624px; width:90px; height:70px;
  background:radial-gradient(ellipse,#fffde0 0%,transparent 70%);
  pointer-events:none; z-index:25; opacity:0; transition:opacity .18s; border-radius:4px;
}
#win {
  display:none; position:absolute; inset:0;
  background:rgba(245,238,215,.96); z-index:100;
  align-items:center; justify-content:center; flex-direction:column; gap:14px;
}
#win.show { display:flex; }
#win h1 { font-family:'IM Fell English',serif; font-size:52px; color:#1a0800;
  font-style:italic; animation:winP .7s cubic-bezier(.2,.8,.3,1.3) both; }
#win p  { font-size:22px; color:#664420; }
@keyframes winP { from{transform:scale(.3);opacity:0} to{transform:scale(1);opacity:1} }
#win button { font-family:'Caveat',cursive; font-size:22px; padding:10px 36px;
  background:#2a1a0a; color:#f8f2e0; border:none; border-radius:2px;
  cursor:pointer; box-shadow:3px 3px 0 #664420; letter-spacing:1px; }
#win button:hover { transform:translate(1px,1px); box-shadow:2px 2px 0 #664420; }
</style>
</head>

<div id="door-flash"></div>
<div id="ui">
  <h2>Найди всех кошечек</h2>
  <div id="score-line">&#x1F43E; <span id="found">0</span> / <span id="total">15</span></div>
  <div id="hint">Они где-то притаились…</div>
  <div id="level-badge">&#x1F33B; Уровень 2 — У мельницы</div>
</div>
<div id="win">
  <h1>Все кошки дома! &#x1F431;</h1>
  <p>Ты нашёл всех <span id="win-count">15</span> кошечек</p>
  <button onclick="location.reload()">Играть снова</button>
</div>
</div></div>

<script>
(function(){
  function resize(){
    var s=Math.max(window.innerWidth/1200,window.innerHeight/800);
    document.getElementById('world').style.transform='translate(-50%,-50%) scale('+s+')';
  }
  window.addEventListener('resize',resize); resize();

  var found=0, TOTAL=15, DOOR_X=592, DOOR_Y=715;

  function spawnPaws(lx,ly,sw,sh){
    var w=document.getElementById('world');
    var cx=lx+sw/2, cy=ly+sh/2;
    for(var i=1;i<=8;i++){
      var p=document.createElement('div'); p.className='paw';
      var t=i/8;
      p.style.left=(cx+(DOOR_X-cx)*t+(Math.random()-0.5)*32)+'px';
      p.style.top =(cy+(DOOR_Y-cy)*t+(Math.random()-0.5)*22)+'px';
      p.style.animationDelay=(i*0.13)+'s';
      p.style.setProperty('--r',(Math.random()*70-35)+'deg');
      p.textContent='\uD83D\uDC3E';
      w.appendChild(p);
      (function(el){setTimeout(function(){el.remove();},2200);})(p);
    }
  }

  function handleClick(el){
    if(el.classList.contains('found'))return;
    el.classList.add('found');
    var svg=el.querySelector('svg');
    if(svg) svg.style.animation='catReveal 0.45s ease-out both';
    var lx=el.offsetLeft, ly=el.offsetTop;
    var sw=svg?+svg.getAttribute('width'):60;
    var sh=svg?+svg.getAttribute('height'):60;
    setTimeout(function(){spawnPaws(lx,ly,sw,sh);},380);
    el.style.left=(DOOR_X-sw/2)+'px';
    el.style.top =(DOOR_Y-sh/2)+'px';
    el.style.transform='scale(0.55)';
    setTimeout(function(){
      el.style.opacity='0'; el.style.transform='scale(0.12)';
      var f=document.getElementById('door-flash');
      f.style.opacity='0.9';
      setTimeout(function(){f.style.opacity='0';},360);
    },1050);
    setTimeout(function(){
      el.remove(); found++;
      document.getElementById('found').textContent=found;
      if(found>=TOTAL)setTimeout(function(){
        document.getElementById('win').classList.add('show');
      },500);
    },1550);
  }

  document.querySelectorAll('.cat-wrap').forEach(function(el){
    el.addEventListener('click',function(){handleClick(el);});
  });
  document.getElementById('total').textContent=TOTAL;
  document.getElementById('win-count').textContent=TOTAL;
})();
</script>
