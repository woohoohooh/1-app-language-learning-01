<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Find the Farm Kittens! — Level 2</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #1a1208; overflow: hidden; font-family: 'Caveat', cursive; touch-action: pan-x pan-y; }

#scene { position: fixed; inset: 0; overflow: hidden; }

#world {
  position: absolute;
  width: 1200px; height: 800px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transform-origin: center center;
}

#bg-layer, #fg-layer {
  position: absolute; top: 0; left: 0;
  width: 1200px; height: 800px;
}
#fg-layer { pointer-events: none; z-index: 15; }

.cat-wrap {
  position: absolute;
  cursor: pointer;
  z-index: 10;
  transition: left 1.05s cubic-bezier(0.4,0,0.5,1),
              top  0.9s cubic-bezier(0.3,0,0.5,1),
              transform 0.8s ease-in,
              opacity 0.35s;
  touch-action: manipulation;
  -webkit-touch-callout: none;
}
.cat-wrap.found { pointer-events: none; z-index: 30; }

@keyframes catReveal {
  from { opacity: 0.3; transform: scale(0.85); filter: blur(3px); }
  to   { opacity: 1;   transform: scale(1);    filter: blur(0);   }
}

#ui {
  position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  left: max(12px, env(safe-area-inset-left, 12px));
  background: rgba(248,244,230,0.95);
  border: 2px solid #2a1a0a;
  border-radius: 2px;
  padding: 10px 18px 12px;
  box-shadow: 3px 3px 0 #2a1a0a;
  z-index: 40;
  backdrop-filter: blur(2px);
}
#ui h2 {
  font-family: 'IM Fell English', serif;
  font-size: 14px; font-style: italic;
  color: #1a0800;
  border-bottom: 1px solid #b0905a;
  padding-bottom: 4px; margin-bottom: 6px;
}
#score-line {
  font-size: 27px;
  color: #1a0800;
  letter-spacing: 2px;
}
#score-line span {
  font-family: 'IM Fell English', serif;
}
#hint { font-size: 12px; color: #88603a; font-style: italic; margin-top: 5px; }

.paw {
  position: absolute; pointer-events: none;
  font-size: 12px; opacity: 0; z-index: 35;
  animation: pawAnim 1.3s ease-out forwards;
}
@keyframes pawAnim {
  0%   { opacity: 0.85; transform: scale(1) rotate(var(--r)); }
  100% { opacity: 0;    transform: scale(0.3) rotate(var(--r)) translateY(14px); }
}

#door-flash {
  position: absolute;
  left: 806px; top: 468px;
  width: 128px; height: 98px;
  background: radial-gradient(ellipse, #fffde0 0%, transparent 70%);
  pointer-events: none; z-index: 25;
  opacity: 0; transition: opacity 0.18s;
  border-radius: 4px;
}

#win {
  display: none; position: fixed; inset: 0;
  background: rgba(245,238,215,0.97);
  z-index: 100; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  padding: 20px;
}
#win.show { display: flex; }
#win h1 {
  font-family: 'IM Fell English', serif;
  font-size: min(52px, 12vw); color: #1a0800; font-style: italic;
  text-align: center;
  animation: winPop 0.7s cubic-bezier(0.2,0.8,0.3,1.3) both;
}
#win p { font-size: min(22px, 6vw); color: #664420; text-align: center; }
@keyframes winPop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#win button {
  font-family: 'Caveat', cursive; font-size: min(22px, 6vw);
  padding: 10px 36px; background: #2a1a0a; color: #f8f2e0;
  border: none; border-radius: 2px; cursor: pointer;
  box-shadow: 3px 3px 0 #664420; letter-spacing: 1px;
  transition: transform 0.1s, box-shadow 0.1s;
  min-width: 200px;
  -webkit-appearance: none;
}
#win button:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 #664420; }

/* Tooltip — fixed, always visible, but hidden by default */
#cat-tooltip {
  position: fixed;
  background: rgba(42,26,10,0.95);
  color: #f8f2e0;
  font-family: 'Caveat', cursive;
  font-size: 26px;
  padding: 6px 16px 8px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 99999;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.12s;
  letter-spacing: 0.5px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  border: 1px solid #b0905a;
  transform: translateZ(0);
  left: 0; top: 0;
}

/* Mobile optimizations */
@media (max-width: 600px) {
  #cat-tooltip { font-size: 14px; padding: 4px 12px 6px; }
  #ui { padding: 8px 14px 10px; }
  #score-line { font-size: 20px; }
}
</style>
</head>

<!-- Tooltip (fixed) -->
<div id="cat-tooltip"></div>

<script>
// ─── Scale world to fill viewport ─────────────────────
function resizeWorld() {
  const s = Math.max(window.innerWidth / 1200, window.innerHeight / 800);
  document.getElementById('world').style.transform =
    `translate(-50%, -50%) scale(${s})`;
}
window.addEventListener('resize', resizeWorld);
resizeWorld();

// ─── Game state ───────────────────────────────────────
let found = 0;
const TOTAL = 10;
const DOOR_X = 866;
const DOOR_Y = 512;

// Key for localStorage
const SAVE_KEY = 'farmKittensProgress';

// ─── Load saved progress ──────────────────────────────
function loadProgress() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      // Check if the saved level matches the current page filename
      const currentFile = window.location.pathname.split('/').pop() || 'index002.html'; // Default for testing
      if (data.currentLevel === currentFile) {
        // We only care about which level, not the score within the level
        console.log('Resuming level:', currentFile);
      } else {
        // If saved level is different, clear saved cats for this level (start fresh)
        console.log('New level, starting fresh');
        localStorage.removeItem(SAVE_KEY + '_cats_' + currentFile);
      }
    }
  } catch (e) {
    console.warn('Failed to load progress', e);
  }
}

// ─── Save that this level was started ─────────────────
function saveLevelStart() {
  try {
    const currentFile = window.location.pathname.split('/').pop() || 'index002.html';
    const data = { currentLevel: currentFile };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('Failed to save progress', e);
  }
}

// ─── Load next level from JSON ────────────────────────
async function goToNextLevel() {
  try {
    const response = await fetch('game-data.json');
    if (!response.ok) throw new Error('Failed to load game data');
    const gameData = await response.json();

    const currentFile = window.location.pathname.split('/').pop() || 'index002.html';
    const currentLevelData = gameData.levels.find(l => l.file === currentFile);

    if (currentLevelData && currentLevelData.next) {
      window.location.href = currentLevelData.next;
    } else {
      // If no next level, just reload (or you could show a "The End" message)
      window.location.reload();
    }
  } catch (e) {
    console.error('Error loading next level:', e);
    // Fallback to reload
    window.location.reload();
  }
}

// ─── Initialize ───────────────────────────────────────
loadProgress();
saveLevelStart(); // Mark that we started this level

// ─── Tooltip with CORRECT numbering (001 to 010) ─────
const tooltip = document.getElementById('cat-tooltip');
const LABELS = {
  'cat-001': '001',
  'cat-002': '002',
  'cat-003': '003',
  'cat-004': '004',
  'cat-005': '005',
  'cat-006': '006',
  'cat-007': '007',
  'cat-008': '008',
  'cat-009': '009',
  'cat-010': '010'
};

document.querySelectorAll('.cat-wrap').forEach(el => {
  // Mouse events for desktop
  el.addEventListener('mousemove', e => {
    if (el.classList.contains('found')) return;
    tooltip.textContent = LABELS[el.id] || el.id;
    tooltip.style.opacity = '1';
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 32) + 'px';
  });
  el.addEventListener('mouseleave', () => {
    tooltip.style.opacity = '0';
  });

  // Touch events for mobile
  el.addEventListener('touchstart', e => {
    if (el.classList.contains('found')) return;
    e.preventDefault();
    const touch = e.touches[0];
    tooltip.textContent = LABELS[el.id] || el.id;
    tooltip.style.opacity = '1';
    tooltip.style.left = (touch.clientX + 16) + 'px';
    tooltip.style.top  = (touch.clientY - 32) + 'px';
  });
  el.addEventListener('touchend', () => {
    tooltip.style.opacity = '0';
  });
  el.addEventListener('touchcancel', () => {
    tooltip.style.opacity = '0';
  });
});

// ─── Paw prints ──────────────────────────────────────
function spawnPaws(catLocalX, catLocalY, catW, catH) {
  const world = document.getElementById('world');
  const cx = catLocalX + catW / 2;
  const cy = catLocalY + catH / 2;
  for (let i = 1; i <= 8; i++) {
    const paw = document.createElement('div');
    paw.className = 'paw';
    const t = i / 8;
    const lx = cx + (DOOR_X - cx) * t + (Math.random() - 0.5) * 32;
    const ly = cy + (DOOR_Y - cy) * t + (Math.random() - 0.5) * 22;
    paw.style.left = lx + 'px';
    paw.style.top  = ly + 'px';
    paw.style.animationDelay = (i * 0.13) + 's';
    paw.style.setProperty('--r', (Math.random() * 70 - 35) + 'deg');
    paw.textContent = '🐾';
    world.appendChild(paw);
    setTimeout(() => paw.remove(), 2000);
  }
}

// ─── Check if point is near cat element (within ~0.5cm at default scale) ─────
function isNearCat(el, clientX, clientY) {
  const rect = el.getBoundingClientRect();
  // 0.5cm ≈ 19px at 96dpi, using 30px for comfortable mobile tapping
  const threshold = 30; // pixels from element bounds
  const expandedLeft = rect.left - threshold;
  const expandedRight = rect.right + threshold;
  const expandedTop = rect.top - threshold;
  const expandedBottom = rect.bottom + threshold;
  return clientX >= expandedLeft && clientX <= expandedRight &&
         clientY >= expandedTop && clientY <= expandedBottom;
}

// ─── Handle cat click/tap (now with proximity) ─────────────────────────────
function handleClick(el) {
  if (el.classList.contains('found')) return;
  el.classList.add('found');
  tooltip.style.opacity = '0';

  const svg = el.querySelector('svg');
  if (svg) svg.style.animation = 'catReveal 0.45s ease-out both';

  const lx = el.offsetLeft;
  const ly = el.offsetTop;
  const sw = svg ? +svg.getAttribute('width')  : 60;
  const sh = svg ? +svg.getAttribute('height') : 60;

  setTimeout(() => spawnPaws(lx, ly, sw, sh), 380);

  el.style.left      = (DOOR_X - sw / 2) + 'px';
  el.style.top       = (DOOR_Y - sh / 2) + 'px';
  el.style.transform = 'scale(0.55)';

  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'scale(0.12)';
    const flash = document.getElementById('door-flash');
    flash.style.opacity = '0.75';
    setTimeout(() => flash.style.opacity = '0', 350);
  }, 1050);

  setTimeout(() => {
    el.remove();
    found++;
    document.getElementById('found').textContent = found;

    // Dynamic hints in English (removed as requested, but keeping array for potential future use)
    const hints = [
      'Good! Keep searching…',
      'More! Look carefully…',
      'Well done!',
      'Halfway there!',
      'More than half!',
      'Almost done…',
      'Just a few left!',
    ];
    // Hint text is hidden via CSS, but we keep functionality
    document.getElementById('hint').textContent = '';

    if (found >= TOTAL) {
      setTimeout(() => document.getElementById('win').classList.add('show'), 500);
    }
  }, 1500);
}

// ─── Initialize cats with proximity detection ──────────────────────────────
document.querySelectorAll('.cat-wrap').forEach(el => {
  // Click event for desktop with proximity
  el.addEventListener('click', (e) => {
    e.preventDefault();
    if (isNearCat(el, e.clientX, e.clientY)) {
      handleClick(el);
    }
  });

  // Touch event for mobile with proximity
  el.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    if (isNearCat(el, touch.clientX, touch.clientY)) {
      handleClick(el);
    }
  }, { passive: false });
});

// Increase hit area via CSS as well (optional but helps with cursor change)
const style = document.createElement('style');
style.textContent = `
  .cat-wrap {
    cursor: pointer;
    /* Add invisible padding to increase hit area without affecting layout */
    --hit-padding: 15px;
  }
  /* This creates an invisible larger hit area using pseudo-element */
  .cat-wrap::before {
    content: '';
    position: absolute;
    top: calc(-1 * var(--hit-padding));
    left: calc(-1 * var(--hit-padding));
    right: calc(-1 * var(--hit-padding));
    bottom: calc(-1 * var(--hit-padding));
    pointer-events: auto; /* captures clicks */
    background: transparent;
    z-index: -1;
  }
  /* Ensure the actual content still receives pointer events */
  .cat-wrap > * {
    pointer-events: none;
  }
`;
document.head.appendChild(style);

document.getElementById('total').textContent     = TOTAL;
document.getElementById('win-count').textContent = TOTAL;

// ─── Attach next level handler ───────────────────────
document.getElementById('next-level-btn').addEventListener('click', (e) => {
  e.preventDefault();
  goToNextLevel();
});

// ─── If this is the last level and no next, change button text ───
// This will be checked after loading JSON, but we can't know without fetch.
// The goToNextLevel function handles the case where next is null.
</script>
