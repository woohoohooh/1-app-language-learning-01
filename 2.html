<title>Найди кошечек на ферме!</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1208; overflow: hidden; font-family: 'Caveat', cursive; }

#scene { position: fixed; inset: 0; overflow: hidden; }

#world {
  position: absolute;
  width: 1200px; height: 800px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  transform-origin: center center;
}

#bg-layer, #fg-layer {
  position: absolute; top: 0; left: 0;
  width: 1200px; height: 800px;
}
#fg-layer { pointer-events: none; z-index: 15; }

.cat-wrap {
  position: absolute;
  cursor: crosshair;
  z-index: 10;
  transition: left 1.05s cubic-bezier(0.4,0,0.5,1),
              top  0.9s cubic-bezier(0.3,0,0.5,1),
              transform 0.8s ease-in,
              opacity 0.35s;
}
.cat-wrap.found { pointer-events: none; z-index: 30; }

@keyframes catReveal {
  from { opacity: 0.3; transform: scale(0.85); filter: blur(3px); }
  to   { opacity: 1;   transform: scale(1);    filter: blur(0);   }
}

/* UI panel */
#ui {
  position: absolute; top: 18px; left: 18px;
  background: rgba(248,244,230,0.93);
  border: 2px solid #2a1a0a;
  border-radius: 2px;
  padding: 10px 20px 13px;
  box-shadow: 3px 3px 0 #2a1a0a;
  z-index: 40;
}
#ui h2 {
  font-family: 'IM Fell English', serif;
  font-size: 16px; font-style: italic;
  color: #1a0800;
  border-bottom: 1px solid #b0905a;
  padding-bottom: 5px; margin-bottom: 7px;
}
#score-line { font-size: 27px; color: #1a0800; letter-spacing: 2px; }
#hint { font-size: 12px; color: #88603a; font-style: italic; margin-top: 5px; }

/* Paw prints */
.paw {
  position: absolute; pointer-events: none;
  font-size: 12px; opacity: 0; z-index: 35;
  animation: pawAnim 1.3s ease-out forwards;
}
@keyframes pawAnim {
  0%   { opacity: 0.85; transform: scale(1) rotate(var(--r)); }
  100% { opacity: 0;    transform: scale(0.3) rotate(var(--r)) translateY(14px); }
}

/* Door flash */
#door-flash {
  position: absolute;
  left: 806px; top: 468px;
  width: 128px; height: 98px;
  background: radial-gradient(ellipse, #fffde0 0%, transparent 70%);
  pointer-events: none; z-index: 25;
  opacity: 0; transition: opacity 0.18s;
  border-radius: 4px;
}

/* Win overlay */
#win {
  display: none; position: absolute; inset: 0;
  background: rgba(245,238,215,0.95);
  z-index: 100; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
}
#win.show { display: flex; }
#win h1 {
  font-family: 'IM Fell English', serif;
  font-size: 52px; color: #1a0800; font-style: italic;
  animation: winPop 0.7s cubic-bezier(0.2,0.8,0.3,1.3) both;
}
#win p { font-size: 22px; color: #664420; }
@keyframes winPop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#win button {
  font-family: 'Caveat', cursive; font-size: 22px;
  padding: 10px 36px; background: #2a1a0a; color: #f8f2e0;
  border: none; border-radius: 2px; cursor: pointer;
  box-shadow: 3px 3px 0 #664420; letter-spacing: 1px;
  transition: transform 0.1s, box-shadow 0.1s;
}
#win button:hover { transform: translate(1px,1px); box-shadow: 2px 2px 0 #664420; }
</style>
</head>

<!-- Door flash effect -->
<div id="door-flash"></div>

<!-- UI -->
<div id="ui">
  <h2>Найди всех кошечек</h2>
  <div id="score-line">🐾 <span id="found">0</span> / <span id="total">6</span></div>
  <div id="hint">Они где-то затаились…</div>
</div>

<!-- Win screen -->
<div id="win">
  <h1>Все кошки дома! 🐱</h1>
  <p>Ты нашёл всех <span id="win-count">6</span> кошечек</p>
  <button onclick="location.reload()">Играть снова</button>
</div>

<script>
// ─── Scale world to fill viewport ─────────────────────
function resizeWorld() {
  const s = Math.max(window.innerWidth / 1200, window.innerHeight / 800);
  document.getElementById('world').style.transform =
    `translate(-50%, -50%) scale(${s})`;
}
window.addEventListener('resize', resizeWorld);
resizeWorld();

// ─── Game state ────────────────────────────────────────
let found = 0;
const TOTAL = 6;
const DOOR_X = 868; // barn door center x in world coords
const DOOR_Y = 510; // barn door center y

// ─── Paw prints ───────────────────────────────────────
function spawnPaws(catLocalX, catLocalY, catW, catH) {
  const world = document.getElementById('world');
  const cx = catLocalX + catW / 2;
  const cy = catLocalY + catH / 2;
  for (let i = 1; i <= 8; i++) {
    const paw = document.createElement('div');
    paw.className = 'paw';
    const t = i / 8;
    const lx = cx + (DOOR_X - cx) * t + (Math.random() - 0.5) * 32;
    const ly = cy + (DOOR_Y - cy) * t + (Math.random() - 0.5) * 22;
    paw.style.left = lx + 'px';
    paw.style.top  = ly + 'px';
    paw.style.animationDelay = (i * 0.13) + 's';
    paw.style.setProperty('--r', (Math.random() * 70 - 35) + 'deg');
    paw.textContent = '🐾';
    world.appendChild(paw);
    setTimeout(() => paw.remove(), 2000);
  }
}

// ─── Handle cat click ──────────────────────────────────
function handleClick(el) {
  if (el.classList.contains('found')) return;
  el.classList.add('found');

  const svg = el.querySelector('svg');
  if (svg) svg.style.animation = 'catReveal 0.45s ease-out both';

  // Current world-local position
  const lx = el.offsetLeft;
  const ly = el.offsetTop;
  const sw = svg ? +svg.getAttribute('width')  : 60;
  const sh = svg ? +svg.getAttribute('height') : 60;

  // Spawn paw prints
  setTimeout(() => spawnPaws(lx, ly, sw, sh), 380);

  // Animate toward barn door
  el.style.left      = (DOOR_X - sw / 2) + 'px';
  el.style.top       = (DOOR_Y - sh / 2) + 'px';
  el.style.transform = 'scale(0.55)';

  // Fade on entry
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'scale(0.12)';
    // Flash barn door
    const flash = document.getElementById('door-flash');
    flash.style.opacity = '0.75';
    setTimeout(() => flash.style.opacity = '0', 350);
  }, 1050);

  // Remove and update score
  setTimeout(() => {
    el.remove();
    found++;
    document.getElementById('found').textContent = found;
    if (found >= TOTAL) {
      setTimeout(() => document.getElementById('win').classList.add('show'), 500);
    }
  }, 1500);
}

// ─── Init ──────────────────────────────────────────────
document.querySelectorAll('.cat-wrap').forEach(el => {
  el.addEventListener('click', () => handleClick(el));
});

document.getElementById('total').textContent     = TOTAL;
document.getElementById('win-count').textContent = TOTAL;
</script>
</body>
