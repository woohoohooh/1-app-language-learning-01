<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Dialogue Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #cccccc;
            --accent-green: #4caf50;
            --accent-blue: #2196f3;
            --accent-orange: #ff9800;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Nunito', Arial, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .back-button::before {
            content: '';
            width: 10px;
            height: 10px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(45deg);
            margin-right: 2px;
        }

        .dialogue-info {
            display: flex;
            flex-direction: column;
        }

        .dialogue-theme {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.2;
        }

        .dialogue-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .progress {
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* Navigation Arrows */
        .nav-arrows {
            position: fixed;
            top: 50%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 50;
        }

        .nav-arrow {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0;
            transition: all 0.3s ease;
            transform: scale(0.9);
        }

        .nav-arrow.show {
            opacity: 1;
            transform: scale(1);
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .nav-arrow.prev::before {
            content: '';
            width: 10px;
            height: 10px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(45deg);
            margin-left: 3px;
        }

        .nav-arrow.next::before {
            content: '';
            width: 10px;
            height: 10px;
            border-right: 2px solid #fff;
            border-top: 2px solid #fff;
            transform: rotate(45deg);
            margin-right: 3px;
        }

        /* Dialogue Container */
        .dialogue-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px;
            scroll-behavior: smooth;
        }

        .dialogue-content {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Dialogue Messages */
        .message-group {
            margin-bottom: 32px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message-info {
            margin-left: 12px;
        }

        .speaker-name {
            font-weight: 700;
            font-size: 15px;
            line-height: 1.2;
        }

        .speaker-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .message-bubble {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 16px 20px;
            position: relative;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .message-text {
            font-size: 16px;
            line-height: 1.5;
            font-weight: 400;
        }

        .message-translation {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 15px;
            line-height: 1.5;
            color: var(--accent-green);
            display: none;
        }

        .message-translation.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; max-height: 0; }
            to { opacity: 1; max-height: 200px; }
        }

        /* Target Words */
        .target-words {
            margin-top: 24px;
            padding: 16px;
            background: rgba(76, 175, 80, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(76, 175, 80, 0.15);
        }

        .target-words-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-green);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .target-words-title::before {
            content: '📌';
            font-size: 12px;
        }

        .words-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .word-tag {
            background: rgba(76, 175, 80, 0.12);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(76, 175, 80, 0.2);
        }

        /* Tasks */
        .tasks {
            margin-top: 32px;
            padding: 20px;
            background: rgba(33, 150, 243, 0.08);
            border-radius: 12px;
            border: 1px solid rgba(33, 150, 243, 0.15);
        }

        .tasks-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tasks-title::before {
            content: '💭';
            font-size: 12px;
        }

        .task-item {
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--accent-blue);
        }

        .task-type {
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 600;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-question {
            font-size: 14px;
            line-height: 1.4;
        }

        /* Bottom Controls */
        .bottom-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .bottom-controls.show {
            transform: translateY(0);
        }

        .control-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Nunito', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .control-btn.primary {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        .control-btn.primary:hover {
            background: #43a047;
        }

        /* Message alignment */
        .message-group[data-speaker="Leo"] {
            margin-right: 40px;
        }

        .message-group[data-speaker="Leo"] .message-header {
            justify-content: flex-start;
        }

        .message-group[data-speaker="Leo"] .avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .message-group[data-speaker="Maya"] {
            margin-left: 40px;
        }

        .message-group[data-speaker="Maya"] .message-header {
            justify-content: flex-end;
            flex-direction: row-reverse;
        }

        .message-group[data-speaker="Maya"] .message-info {
            margin-left: 0;
            margin-right: 12px;
            text-align: right;
        }

        .message-group[data-speaker="Maya"] .avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .dialogue-container {
                padding: 16px;
                padding-bottom: 70px;
            }

            .message-group[data-speaker="Leo"] {
                margin-right: 20px;
            }

            .message-group[data-speaker="Maya"] {
                margin-left: 20px;
            }

            .message-bubble {
                padding: 14px 16px;
            }

            .message-text {
                font-size: 15px;
            }

            .nav-arrows {
                padding: 0 8px;
            }

            .nav-arrow {
                width: 40px;
                height: 40px;
            }

            .bottom-controls {
                padding: 12px 16px;
            }

            .control-btn {
                padding: 12px;
                font-size: 14px;
            }
        }

        /* Loading state */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="back-button" id="backButton" title="Back to main"></div>
                <div class="dialogue-info">
                    <div class="dialogue-theme" id="dialogueTheme">Loading...</div>
                    <div class="dialogue-meta" id="dialogueMeta"></div>
                </div>
            </div>
            <div class="progress" id="progress">0/0</div>
        </div>

        <!-- Navigation Arrows -->
        <div class="nav-arrows">
            <div class="nav-arrow prev" id="prevArrow"></div>
            <div class="nav-arrow next" id="nextArrow"></div>
        </div>

        <!-- Dialogue Content -->
        <div class="dialogue-container" id="dialogueContainer">
            <div class="dialogue-content" id="dialogueContent"></div>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls" id="bottomControls">
            <button class="control-btn" id="showTranslationsBtn">
                <span>Show Translations</span>
            </button>
            <button class="control-btn primary" id="readAloudBtn">
                <span>Read Aloud</span>
            </button>
        </div>

        <!-- Loading Overlay -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading dialogue...</div>
        </div>
    </div>

    <script>
        // DOM Elements
        const backButton = document.getElementById('backButton');
        const dialogueTheme = document.getElementById('dialogueTheme');
        const dialogueMeta = document.getElementById('dialogueMeta');
        const progress = document.getElementById('progress');
        const prevArrow = document.getElementById('prevArrow');
        const nextArrow = document.getElementById('nextArrow');
        const dialogueContent = document.getElementById('dialogueContent');
        const dialogueContainer = document.getElementById('dialogueContainer');
        const showTranslationsBtn = document.getElementById('showTranslationsBtn');
        const readAloudBtn = document.getElementById('readAloudBtn');
        const bottomControls = document.getElementById('bottomControls');
        const loading = document.getElementById('loading');

        // State
        let allDialogues = [];
        let currentDialogueIndex = 0;
        let currentDialogue = null;
        let translationsVisible = false;
        let isUIHidden = false;

        // Colors for speakers (can be extended)
        const speakerColors = {
            'Leo': '#667eea',
            'Maya': '#f5576c',
            'Alex': '#4caf50',
            'Sarah': '#ff9800',
            'John': '#2196f3',
            'Emma': '#9c27b0'
        };

        // Initialize
        async function init() {
            await loadDialogues();

            // Show UI after a moment (minimalist approach - UI appears on tap/click)
            document.addEventListener('click', () => {
                if (isUIHidden) {
                    showUI();
                }
            });

            // Hide UI initially after 3 seconds if no interaction
            setTimeout(() => {
                if (!isUIHidden) {
                    hideUI();
                }
            }, 3000);
        }

        // Load dialogues list
        async function loadDialogues() {
            try {
                const response = await fetch('dialogs.json');
                if (!response.ok) throw new Error('Failed to load dialogs.json');
                const data = await response.json();
                allDialogues = data.items;

                // Get dialogue index from URL or start from 0
                const urlParams = new URLSearchParams(window.location.search);
                const dialogueId = urlParams.get('id');

                if (dialogueId) {
                    currentDialogueIndex = allDialogues.findIndex(d => d.id === dialogueId);
                    if (currentDialogueIndex === -1) currentDialogueIndex = 0;
                }

                await loadCurrentDialogue();
            } catch (error) {
                console.error('Error loading dialogues:', error);
                showError('Failed to load dialogues. Please check if dialogs.json exists.');
            }
        }

        // Load current dialogue
        async function loadCurrentDialogue() {
            if (allDialogues.length === 0) {
                showError('No dialogues available');
                return;
            }

            const dialogueInfo = allDialogues[currentDialogueIndex];

            try {
                const response = await fetch(dialogueInfo.file);
                if (!response.ok) throw new Error('Failed to load dialogue file');
                currentDialogue = await response.json();

                renderDialogue();
                updateUI();
                loading.style.display = 'none';

                // Auto-hide UI after loading
                setTimeout(hideUI, 2000);
            } catch (error) {
                console.error('Error loading dialogue:', error);
                showError('Failed to load dialogue content.');
            }
        }

        // Render dialogue content
        function renderDialogue() {
            if (!currentDialogue) return;

            // Update header
            dialogueTheme.textContent = currentDialogue.theme || 'Dialogue';
            dialogueMeta.textContent = `${currentDialogue.level || ''} • ${currentDialogue.dialogue?.length || 0} lines`;

            // Build dialogue content
            let contentHTML = '';

            // Render each message
            currentDialogue.dialogue?.forEach(message => {
                const speaker = currentDialogue.characters?.[message.speaker] || {};
                const firstLetter = message.speaker.charAt(0);

                contentHTML += `
                    <div class="message-group" data-speaker="${message.speaker}">
                        <div class="message-header">
                            <div class="avatar" style="background: ${speakerColors[message.speaker] || '#666'}">
                                ${firstLetter}
                            </div>
                            <div class="message-info">
                                <div class="speaker-name">${message.speaker}</div>
                                ${speaker.role ? `<div class="speaker-role">${speaker.role}</div>` : ''}
                            </div>
                        </div>
                        <div class="message-bubble">
                            <div class="message-text">${message.en}</div>
                            <div class="message-translation" id="translation-${message.id}">
                                ${message.ru}
                            </div>
                        </div>
                    </div>
                `;
            });

            // Add target words section
            if (currentDialogue.target_words?.length > 0) {
                contentHTML += `
                    <div class="target-words">
                        <div class="target-words-title">Target Words</div>
                        <div class="words-list">
                            ${currentDialogue.target_words.map(word =>
                                `<span class="word-tag">${word}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            // Add tasks section
            if (currentDialogue.tasks?.length > 0) {
                contentHTML += `
                    <div class="tasks">
                        <div class="tasks-title">Tasks</div>
                        ${currentDialogue.tasks.map((task, index) => `
                            <div class="task-item">
                                <div class="task-type">${task.type}</div>
                                <div class="task-question">${task.q}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            dialogueContent.innerHTML = contentHTML;

            // Add click handlers to message bubbles
            document.querySelectorAll('.message-bubble').forEach(bubble => {
                bubble.addEventListener('click', (e) => {
                    if (!e.target.closest('.control-btn')) {
                        toggleTranslation(e.currentTarget);
                    }
                });
            });
        }

        // Toggle translation for a message
        function toggleTranslation(messageBubble) {
            const translation = messageBubble.querySelector('.message-translation');
            if (translation) {
                translation.classList.toggle('show');
            }
        }

        // Update UI state
        function updateUI() {
            // Update progress
            progress.textContent = `${currentDialogueIndex + 1}/${allDialogues.length}`;

            // Update navigation arrows
            prevArrow.classList.toggle('show', currentDialogueIndex > 0);
            nextArrow.classList.toggle('show', currentDialogueIndex < allDialogues.length - 1);

            // Update bottom controls text
            showTranslationsBtn.innerHTML = translationsVisible ?
                '<span>Hide Translations</span>' :
                '<span>Show Translations</span>';
        }

        // Toggle all translations
        function toggleAllTranslations() {
            translationsVisible = !translationsVisible;
            document.querySelectorAll('.message-translation').forEach(translation => {
                if (translationsVisible) {
                    translation.classList.add('show');
                } else {
                    translation.classList.remove('show');
                }
            });
            updateUI();
        }

        // Read dialogue aloud
        async function readDialogueAloud() {
            if (!currentDialogue?.dialogue) return;

            // Show UI while reading
            showUI();

            // TODO: Implement text-to-speech or audio playback
            // For now, just highlight each line as we "read" it
            const messages = document.querySelectorAll('.message-bubble');
            let index = 0;

            function highlightNext() {
                if (index > 0) {
                    messages[index - 1].style.background = 'rgba(255, 255, 255, 0.05)';
                }

                if (index < messages.length) {
                    messages[index].style.background = 'rgba(76, 175, 80, 0.15)';
                    messages[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    index++;
                    setTimeout(highlightNext, 2000); // 2 seconds per line
                }
            }

            highlightNext();
        }

        // Navigate to previous/next dialogue
        function navigate(direction) {
            const newIndex = currentDialogueIndex + direction;
            if (newIndex >= 0 && newIndex < allDialogues.length) {
                currentDialogueIndex = newIndex;
                loadCurrentDialogue();
                dialogueContainer.scrollTop = 0;
                showUI();
            }
        }

        // Show UI elements
        function showUI() {
            isUIHidden = false;
            document.querySelector('.header').style.opacity = '1';
            document.querySelector('.nav-arrows').style.opacity = '1';
            bottomControls.classList.add('show');

            // Auto-hide after 5 seconds
            clearTimeout(window.hideUITimeout);
            window.hideUITimeout = setTimeout(hideUI, 5000);
        }

        // Hide UI elements for minimal view
        function hideUI() {
            isUIHidden = true;
            document.querySelector('.header').style.opacity = '0';
            document.querySelector('.nav-arrows').style.opacity = '0';
            bottomControls.classList.remove('show');
        }

        // Show error message
        function showError(message) {
            loading.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="color: #ff6b6b; font-size: 18px; margin-bottom: 10px;">⚠️</div>
                    <div style="color: var(--text-secondary); font-size: 16px;">${message}</div>
                </div>
            `;
        }

        // Event Listeners
        backButton.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        prevArrow.addEventListener('click', () => navigate(-1));
        nextArrow.addEventListener('click', () => navigate(1));

        showTranslationsBtn.addEventListener('click', toggleAllTranslations);
        readAloudBtn.addEventListener('click', readDialogueAloud);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                navigate(-1);
            } else if (e.key === 'ArrowRight') {
                navigate(1);
            } else if (e.key === 'Escape') {
                hideUI();
            } else if (e.key === 't' || e.key === 'T') {
                toggleAllTranslations();
            } else if (e.key === 'r' || e.key === 'R') {
                readDialogueAloud();
            }
        });

        // Swipe gestures for mobile
        let touchStartX = 0;
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
            showUI(); // Show UI on touch
        });

        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            const touchEndY = e.changedTouches[0].screenY;
            const diffX = touchStartX - touchEndX;
            const diffY = touchStartY - touchEndY;

            // Only trigger swipe if horizontal movement is greater than vertical
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 50) {
                    // Swipe left - next dialogue
                    navigate(1);
                } else if (diffX < -50) {
                    // Swipe right - previous dialogue
                    navigate(-1);
                }
            }
        });

        // Click/tap on main area shows UI
        dialogueContainer.addEventListener('click', (e) => {
            if (!e.target.closest('.message-bubble') && !e.target.closest('.nav-arrow')) {
                if (isUIHidden) {
                    showUI();
                }
            }
        });

        // Initialize the app
        init();
    </script>
</body>
</html>
