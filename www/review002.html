<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review002 — Split-screen choice</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#0f0f12;color:#fff;font-family:Nunito,Arial,sans-serif}
        .split{display:flex;height:100vh}
        .left,.right{flex:1;display:flex;align-items:center;justify-content:center;position:relative}
        .left{background:linear-gradient(180deg,#0b1020,#0f1724)}
        .right{background:linear-gradient(180deg,#121212,#17202a)}
        .word{font-size:64px;font-weight:800}
        .translation{font-size:28px;color:#4caf50}
        .hint{position:absolute;bottom:18px;color:#999}
        .btn{position:absolute;top:18px;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid #333}
    </style>
</head>
<body>
<div class="split">
    <div class="left" id="left"><div>
        <div class="word" id="wordLeft">Loading...</div>
        <div class="translation" id="transLeft"></div>
    </div></div>
    <div class="right" id="right"><div>
        <div class="word" id="wordRight">Loading...</div>
        <div class="translation" id="transRight"></div>
    </div></div>
</div>
<div class="hint">Tap left for "known" or right for "review" — also swipe gestures supported</div>
<script>
// review002: split screen — left side = known, right = review. Shows next pair of words (same word mirrored) but different animations.
const url=new URLSearchParams(window.location.search);const listId=url.get('list');const sessionId=url.get('session');
let words=[];let idx=0;
const wL=document.getElementById('wordLeft'),tL=document.getElementById('transLeft'),wR=document.getElementById('wordRight'),tR=document.getElementById('transRight');
const WordDB={getWordStatus(l,e){return localStorage.getItem(`word_${l}_${e}`)||'new'},saveWordStatus(l,e,s){localStorage.setItem(`word_${l}_${e}`,s)}}
async function load(){try{if(sessionId){const s=JSON.parse(localStorage.getItem(sessionId)||'{}');words=s.words||[]}else if(listId){const r=await fetch(listId);const txt=await r.text();const list=JSON.parse(txt);words=list.words||[];words=words.filter(w=>{const st=WordDB.getWordStatus(list.filename,w.english);return st!=='known' ? true:false})}if(!words||!words.length){wL.textContent='No words';wR.textContent='No words';return}show();}catch(e){console.error(e)}}
function show(){const w=words[idx];wL.textContent=w.english;wR.textContent=w.english;tL.textContent=w.russian||w.translation||'';tR.textContent=tL.textContent}
function advance(action){ if(!words[idx])return; const w=words[idx]; WordDB.saveWordStatus(listId||'local',w.english,action); // animate
 if(action==='known'){wL.style.transform='scale(0.9) translateX(-40vw)';wL.style.opacity='0'} else {wR.style.transform='scale(0.9) translateX(40vw)';wR.style.opacity='0'} setTimeout(()=>{idx++; if(idx>=words.length){wL.textContent='Done';wR.textContent='Done';return} // reset
 wL.style.transform='';wR.style.transform='';wL.style.opacity='1';wR.style.opacity='1'; show();},250)}

// clicks
document.getElementById('left').addEventListener('click',()=>advance('known'));
document.getElementById('right').addEventListener('click',()=>advance('review'));

// keyboard
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')advance('known');if(e.key==='ArrowRight'||e.key==='d')advance('review')})

load();
</script>
</body>
</html>
