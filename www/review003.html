<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Review003 — Tap-to-reveal with quick-swipe verdict</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>html,body{height:100%;margin:0;background:#0b0b0c;color:#fff;font-family:Nunito,Arial,sans-serif} .wrap{display:flex;align-items:center;justify-content:center;height:100vh;position:relative} .card{width:320px;height:220px;border-radius:16px;background:#151515;border:1px solid #222;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer} .eng{font-size:36px;font-weight:800} .trans{font-size:20px;color:#4caf50;margin-top:12px;opacity:0;transition:opacity .18s} .controls{position:absolute;bottom:28px;display:flex;gap:12px} .btn{padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid #333}</style>
</head>
<body>
<div class="wrap">
    <div class="card" id="card"><div class="eng" id="eng">Loading</div><div class="trans" id="trans"></div></div>
    <div class="controls"><button id="knownBtn" class="btn">Known</button><button id="reviewBtn" class="btn">Review</button></div>
</div>
<script>
// review003: tap card to reveal translation; quick short swipe left/right while translation visible records verdict. Buttons also available.
const params=new URLSearchParams(window.location.search);const listId=params.get('list');const sessionId=params.get('session');
let queue=[];let i=0;const engEl=document.getElementById('eng'),transEl=document.getElementById('trans'),card=document.getElementById('card');
const WordDB={save(l,e,s){localStorage.setItem(`word_${l}_${e}`,s)},get(l,e){return localStorage.getItem(`word_${l}_${e}`)||'new'}}
async function load(){try{if(sessionId){const s=JSON.parse(localStorage.getItem(sessionId)||'{}');queue=s.words||[]}else if(listId){const r=await fetch(listId);const txt=await r.text();const list=JSON.parse(txt);queue=list.words||[];queue=queue.filter(w=>WordDB.get(list.filename,w.english)!=='known')}if(!queue.length){engEl.textContent='No words';return}show();}catch(e){console.error(e)}}
function show(){const w=queue[i];engEl.textContent=w.english;transEl.textContent=w.russian||w.translation||'';transEl.style.opacity=0}
function reveal(){transEl.style.opacity=0.96}
function next(action){const w=queue[i];WordDB.save(listId||'local',w.english,action);i++;if(i>=queue.length){engEl.textContent='Done';transEl.style.opacity=0;return}show()}
card.addEventListener('click',()=>{reveal();});
// quick swipe while translation visible
let sx=0,sy=0,active=false;card.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;active=true})
window.addEventListener('pointermove',e=>{if(!active)return;const dx=e.clientX-sx,dy=e.clientY-sy; if(Math.abs(dx)>80 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) { next('known'); active=false } else { next('review'); active=false }}})
window.addEventListener('pointerup',e=>{active=false})

document.getElementById('knownBtn').addEventListener('click',()=>next('known'));
document.getElementById('reviewBtn').addEventListener('click',()=>next('review'));
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')next('known'); if(e.key==='ArrowRight'||e.key==='d')next('review')})
load();
</script>
</body>
</html>
