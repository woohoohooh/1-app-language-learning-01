<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review — variant 1001 (floating token + fixed green translation)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        .container{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center}
        .word-large{font-size:64px;font-weight:800;text-align:center;user-select:none;transition:transform .08s ease, opacity .08s}
        .dragging { font-size:64px; color:#4caf50 }
        .top-area{position:absolute;top:0;left:0;right:0;height:72px;display:flex;align-items:center;z-index:3}
        .top-inner{width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;box-sizing:border-box}
        .back-button{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.04)}
        .back-button:before{content:'';width:10px;height:10px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:translateY(1px) rotate(45deg);display:block}
        .section-title{font-weight:700;text-align:center}
        .progress{color:#aaa;font-weight:400}
        .bottom-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);color:#999;font-size:13px;z-index:3}
    </style>
</head>
<body>
    <div class="top-area" id="top-area">
        <div class="top-inner">
            <div style="display:flex;align-items:center"><div class="back-button" id="back-button" title="Back"></div></div>
            <div class="section-title" id="section-title">Review Words</div>
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div class="container">
        <div id="wordContainer">
            <div id="wordLarge" class="word-large">Loading...</div>
        </div>
        <div id="hint" class="bottom-hint"></div>
    </div>

    <script>
    // Variant 1001: floating English token, translation appears fixed (green) when drag starts.

    const urlParams = new URLSearchParams(window.location.search);
    const listId = urlParams.get('list');
    const sessionId = urlParams.get('session');

    const wordLarge = document.getElementById('wordLarge');
    const progressEl = document.getElementById('progress');
    const backButton = document.getElementById('back-button');
    const sectionTitle = document.getElementById('section-title');
    const hintEl = document.getElementById('hint');

    let wordQueue = [];
    let currentIndex = 0;
    let currentWord = null;
    let currentList = null;
    let isCombined = false;

    // Audio manager (simple caching)
    const AudioManager = {
        audioElements: new Map(),
        async play(word){ if(!word) return; try{ let src=(word.audio&&word.audio[0])||`audio/${word.english.toLowerCase().replace(/[^a-z0-9]/g,'_')}.wav`; if(src && !src.startsWith('audio/') && !src.startsWith('http')) src=`${src}`; if(this.audioElements.has(src)){const a=this.audioElements.get(src); a.currentTime=0; await a.play(); return;} const a=new Audio(src); a.preload='auto'; a.addEventListener('canplaythrough', ()=>{ a.play().catch(()=>{}); this.audioElements.set(src,a); }); a.addEventListener('error',()=>{});}catch(e){} }
    };

    async function fetchJson(path){ try{ const r=await fetch(path); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }

    async function loadList(){
        try{
            if(sessionId){ const session = JSON.parse(localStorage.getItem(sessionId)||'{}'); wordQueue = session.words || []; isCombined = true; currentList = { filename: 'combined', name: 'Multiple Lists' }; }
            else if(listId){
                const requested = decodeURIComponent(listId);
                let list = await fetchJson(requested);
                if(!list && !requested.startsWith('english/')) list = await fetchJson(`english/${requested}`) || null;
                if(!list){ const defaults = ['english/list_basic_1.json','english/list_intermediate_1.json','english/list_advanced_1.json']; for(const d of defaults){ const l = await fetchJson(d); if(l){ list = l; list.filename = d; break; } } }
                if(!list){ wordLarge.textContent = 'Error loading list. Please check path.'; console.error('1001: could not resolve list param', requested); return; }
                if(!list.filename) list.filename = requested.startsWith('english/') ? requested : `english/${requested}`;
                currentList = list;
                sectionTitle.textContent = currentList.theme || currentList.name || 'Review Words';
                wordQueue = currentList.words || [];
            }

            if(!wordQueue || wordQueue.length === 0){ wordLarge.textContent = 'No words'; return; }
            currentIndex = 0; showWord(); updateProgress();
        }catch(e){ console.error('1001 loadList error', e); wordLarge.textContent = 'Error loading list.'; }
    }

    function updateProgress(){ progressEl.textContent = `${currentIndex+1}/${wordQueue.length}`; }

    function showWord(){ currentWord = wordQueue[currentIndex]; wordLarge.textContent = currentWord.english; wordLarge.classList.remove('dragging'); wordLarge.style.transform=''; wordLarge.style.opacity='1'; // play audio once on appear
        try{ AudioManager.play(currentWord); }catch(e){}
    }

    // Floating draggable element
    let draggableEl = null;
    function ensureDraggable(){ if(draggableEl) return; draggableEl = document.createElement('div'); draggableEl.style.position='fixed'; draggableEl.style.pointerEvents='none'; draggableEl.style.zIndex=9999; draggableEl.style.left='50%'; draggableEl.style.top='50%'; draggableEl.style.transform='translate(-50%,-50%)'; draggableEl.style.fontSize=getComputedStyle(wordLarge).fontSize; draggableEl.style.fontWeight='800'; draggableEl.style.color='#fff'; draggableEl.style.textAlign='center'; draggableEl.style.transition='transform .06s linear,opacity .12s'; document.body.appendChild(draggableEl); draggableEl.style.opacity='0'; }

    // Drag logic
    let isPointerActive=false, startX=0, startY=0, lastX=0, lastY=0, dragging=false;
    const START_DRAG=2, DRAG_THRESHOLD=40;

    function onPointerDown(e){ const p=(e.touches&&e.touches[0])||e; startX=p.clientX; startY=p.clientY; lastX=startX; lastY=startY; isPointerActive=true; dragging=false; try{ wordLarge.style.transition='none'; }catch(e){} ensureDraggable(); draggableEl.textContent = currentWord ? currentWord.english : ''; draggableEl.style.opacity='0'; e.preventDefault && e.preventDefault(); }
    function onPointerMove(e){ if(!isPointerActive) return; const p=(e.touches&&e.touches[0])||e; const dx=p.clientX-startX; const dy=p.clientY-startY; lastX=p.clientX; lastY=p.clientY; const moved=Math.max(Math.abs(dx),Math.abs(dy)); if(!dragging && moved>=START_DRAG){ dragging=true; // show translation fixed in place (green)
            const translation=currentWord.russian||currentWord.translation||''; wordLarge.textContent = translation||''; wordLarge.classList.add('dragging'); // show draggable token
            draggableEl.textContent = currentWord.english; draggableEl.style.left=`${p.clientX}px`; draggableEl.style.top=`${p.clientY}px`; draggableEl.style.opacity='1'; // hide header
            document.getElementById('top-area').classList.add('hidden-ui');
        }
        if(dragging){ draggableEl.style.left=`${p.clientX}px`; draggableEl.style.top=`${p.clientY}px`; const absX=Math.abs(dx), absY=Math.abs(dy); const primary=Math.max(absX,absY); const ratio=Math.min(primary/200,1); if(Math.abs(dx)>Math.abs(dy)){ if(dx>0){ document.getElementById('gradient-review').style.opacity=String(ratio); document.getElementById('gradient-known').style.opacity='0'; } else { document.getElementById('gradient-known').style.opacity=String(ratio); document.getElementById('gradient-review').style.opacity='0'; } } else { if(dy>0){ document.getElementById('gradient-review').style.opacity=String(ratio); document.getElementById('gradient-known').style.opacity='0'; } else { document.getElementById('gradient-known').style.opacity=String(ratio); document.getElementById('gradient-review').style.opacity='0'; } } }
        e.preventDefault && e.preventDefault(); }
    function onPointerUp(e){ if(!isPointerActive) return; isPointerActive=false; if(!dragging){ // tap - toggle header
            const ta=document.getElementById('top-area'); ta.classList.toggle('hidden-ui'); return; }
        // handle release
        const dx=lastX-startX, dy=lastY-startY; document.getElementById('gradient-known').style.opacity='0'; document.getElementById('gradient-review').style.opacity='0'; if(Math.abs(dx)<DRAG_THRESHOLD && Math.abs(dy)<DRAG_THRESHOLD){ // cancel - hide draggable, keep translation
            draggableEl.style.transition='transform .18s ease,opacity .12s'; draggableEl.style.opacity='0'; setTimeout(()=>{ draggableEl.style.transition=''; draggableEl.style.transform='translate(-50%,-50%)'; },160); return; }
        let action=null; if(Math.abs(dx)>Math.abs(dy)) action = dx>0?'review':'known'; else action = dy>0?'review':'known'; // animate token off
        const offX=(dx>0?1:-1)*(window.innerWidth+200); const offY=(dy>0?1:-1)*(window.innerHeight+200);
        draggableEl.style.transition='transform .32s ease,opacity .22s'; draggableEl.style.transform=`translate(${offX}px, ${offY}px)`; draggableEl.style.opacity='0'; if(!isCombined) localStorage.setItem(`word_${currentList.filename||listId}_${currentWord.english}`, action);
        setTimeout(()=>{ draggableEl.style.transition=''; draggableEl.style.transform='translate(-50%,-50%)'; draggableEl.style.opacity='0'; currentIndex++; if(currentIndex>=wordQueue.length){ wordLarge.textContent='Done'; progressEl.textContent=`${wordQueue.length}/${wordQueue.length}`; return; } showWord(); updateProgress(); },340);
    }

    // events
    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('touchstart', onPointerDown, {passive:false});
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, {passive:false});
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchend', onPointerUp);

    backButton.addEventListener('click', ()=>{ window.location.href='index.html'; });

    // init
    updateProgress(); loadList();
    </script>
</body>
</html>
