<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Words - Spelling Puzzle</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .puzzle-card {
            position: relative;
            width: 80%;
            max-width: 600px;
            height: 400px;
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            z-index: 4;
            transition: transform 0.3s ease;
            border: 2px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .hint {
            font-size: 22px;
            font-weight: 700;
            color: rgba(76, 175, 80, 0.4);
            margin-bottom: 20px;
            text-align: center;
            width: 100%;
        }
        .blanks {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
        }
        .blank {
            width: 40px;
            height: 40px;
            border-bottom: 3px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .blank.filled {
            border-bottom-color: #4caf50;
        }
        .letters-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            max-width: 80%;
        }
        .letter {
            padding: 10px 15px;
            background-color: #333;
            border-radius: 8px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .letter:hover {
            transform: scale(1.1);
            background-color: #4caf50;
        }
        .letter.used {
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.9);
        }
        .errors {
            font-size: 18px;
            color: #f44336;
            margin-top: 10px;
        }
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-button {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            margin-top: 25px;
            margin-left: 25px;
        }
        .top-area:hover .back-button {
            opacity: 1;
            pointer-events: auto;
        }
        .back-icon {
            font-size: 65px;
            color: #2196f3;
            font-weight: 900;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(33, 150, 243, 0.4));
            opacity: 0.7;
        }
        .back-button:hover .back-icon {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.7));
        }
        .progress-section {
            margin-top: 25px;
            margin-right: 25px;
            text-align: right;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 400px;
        }
        .top-area:hover .progress-section {
            opacity: 1;
            pointer-events: auto;
        }
        .progress-info {
            font-size: 24px;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 600;
            color: #bbbbbb;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-known {
            color: #4caf50;
        }
        .stat-review {
            color: #ff9800;
        }
        .stat-new {
            color: #2196f3;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .puzzle-card {
                width: 90%;
                height: 350px;
            }
            .hint {
                font-size: 18px;
            }
            .blanks {
                font-size: 28px;
                gap: 8px;
            }
            .blank {
                width: 35px;
                height: 35px;
            }
            .letters-container {
                gap: 10px;
            }
            .letter {
                font-size: 20px;
                padding: 8px 12px;
            }
            .progress-info {
                font-size: 20px;
            }
            .progress-stats {
                font-size: 16px;
                gap: 10px;
            }
            .back-button {
                margin-top: 20px;
                margin-left: 20px;
                width: 60px;
                height: 60px;
            }
            .back-icon {
                font-size: 55px;
            }
            .progress-section {
                margin-top: 20px;
                margin-right: 20px;
            }
            .loader-spinner {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>
        <div class="top-area">
            <div class="back-button" id="back-button">
                <div class="back-icon">←</div>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-info" id="progress-info"></div>
                <div class="progress-stats" id="progress-stats"></div>
            </div>
        </div>
        <div id="puzzle-card" class="puzzle-card">
            <div class="hint" id="hint"></div>
            <div class="blanks" id="blanks"></div>
            <div class="letters-container" id="letters-container"></div>
            <div class="errors" id="errors">Errors: 0/3</div>
        </div>
        <div class="loading" id="loading">Loading words...</div>
    </div>
    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            },
            getListProgress(listId, totalWords) {
                let known = 0;
                let review = 0;
                let newWords = totalWords;
                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith(`word_${listId}_`)) {
                        const status = localStorage.getItem(key);
                        if (status === 'known') known++;
                        if (status === 'review') review++;
                    }
                });
                newWords = totalWords - known - review;
                return { known, review, new: newWords };
            }
        };
        const Utils = {
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                };
                return shuffled;
            },
            getRandomAudioFile(audioArray) {
                if (!audioArray || audioArray.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * audioArray.length);
                return audioArray[randomIndex];
            }
        };
        const AudioManager = {
            currentAudio: null,
            isPlaying: false,
            async playAudio(audioFiles) {
                await this.stopAudio();
                const audioFile = Utils.getRandomAudioFile(audioFiles);
                if (!audioFile) return;
                this.currentAudio = new Audio(audioFile);
                return new Promise((resolve, reject) => {
                    this.currentAudio.addEventListener('ended', () => {
                        this.isPlaying = false;
                        resolve();
                    });
                    this.currentAudio.addEventListener('error', (error) => {
                        this.isPlaying = false;
                        reject(error);
                    });
                    const playPromise = this.currentAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            this.isPlaying = true;
                        }).catch(error => {
                            this.isPlaying = false;
                            reject(error);
                        });
                    }
                });
            },
            async stopAudio() {
                if (this.currentAudio) {
                    this.currentAudio.pause();
                    this.currentAudio.currentTime = 0;
                    this.isPlaying = false;
                }
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            let wordQueue = [];
            let currentList = null;
            const puzzleCard = document.getElementById('puzzle-card');
            const hintEl = document.getElementById('hint');
            const blanksEl = document.getElementById('blanks');
            const lettersContainer = document.getElementById('letters-container');
            const errorsEl = document.getElementById('errors');
            const backButton = document.getElementById('back-button');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const progressInfo = document.getElementById('progress-info');
            const progressStats = document.getElementById('progress-stats');
            let currentWord = null;
            let currentIndex = 0;
            let currentPosition = 0;
            let errors = 0;
            let maxErrors = 3;
            let letters = [];
            let blanks = [];
            async function loadList() {
                try {
                    const response = await fetch(listId);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const text = await response.text();
                    currentList = JSON.parse(text);
                    if (!currentList.words || !Array.isArray(currentList.words)) {
                        throw new Error('Invalid list format');
                    }
                    currentList.filename = listId;
                    WordDB.updateListStatus(currentList);
                    const wordsForReview = WordDB.getWordsForReview(currentList);
                    wordQueue = Utils.shuffleArray(wordsForReview);
                    if (wordQueue.length === 0) {
                        showLoader();
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }
                    loadingEl.style.display = 'none';
                    puzzleCard.style.display = 'flex';
                    currentIndex = 0;
                    setupPuzzle();
                    updateProgress();
                } catch (error) {
                    loadingEl.textContent = 'Error loading list.';
                }
            }
            function showLoader() {
                loaderOverlay.classList.add('active');
            }
            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }
            function setupPuzzle() {
                if (currentIndex >= wordQueue.length) {
                    showLoader();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                }
                currentWord = wordQueue[currentIndex];
                hintEl.textContent = currentWord.translation;
                const wordLetters = currentWord.english.toLowerCase().split('');
                letters = Utils.shuffleArray([...wordLetters]);
                blanks = wordLetters.map(() => '_');
                currentPosition = 0;
                errors = 0;
                renderBlanks();
                renderLetters();
                updateErrors();
                hideLoader();
            }
            function renderBlanks() {
                blanksEl.innerHTML = '';
                blanks.forEach((char, index) => {
                    const blank = document.createElement('div');
                    blank.className = 'blank';
                    blank.textContent = char === '_' ? '_' : char.toUpperCase();
                    if (char !== '_') blank.classList.add('filled');
                    blanksEl.appendChild(blank);
                });
            }
            function renderLetters() {
                lettersContainer.innerHTML = '';
                letters.forEach((letter, index) => {
                    const letterEl = document.createElement('div');
                    letterEl.className = 'letter';
                    letterEl.textContent = letter.toUpperCase();
                    letterEl.dataset.index = index;
                    letterEl.addEventListener('click', handleLetterClick);
                    lettersContainer.appendChild(letterEl);
                });
            }
            async function handleLetterClick(e) {
                const letterEl = e.target;
                const selectedLetter = letterEl.textContent.toLowerCase();
                const correctLetter = currentWord.english.toLowerCase()[currentPosition];
                if (selectedLetter === correctLetter) {
                    blanks[currentPosition] = selectedLetter;
                    flyLetter(letterEl, blanksEl.children[currentPosition]);
                    letterEl.classList.add('used');
                    currentPosition++;
                    renderBlanks();
                    if (currentPosition >= blanks.length) {
                        await completeWord();
                    }
                } else {
                    errors++;
                    updateErrors();
                    if (errors >= maxErrors) {
                        resetPuzzle();
                        return;
                    }
                    // Find the correct letter and fly it
                    const correctLetterEl = Array.from(lettersContainer.children).find(el => el.textContent.toLowerCase() === correctLetter && !el.classList.contains('used'));
                    if (correctLetterEl) {
                        blanks[currentPosition] = correctLetter;
                        flyLetter(correctLetterEl, blanksEl.children[currentPosition]);
                        correctLetterEl.classList.add('used');
                        currentPosition++;
                        renderBlanks();
                        if (currentPosition >= blanks.length) {
                            await completeWord();
                        }
                    }
                }
            }
            function flyLetter(fromEl, toEl) {
                const fromRect = fromEl.getBoundingClientRect();
                const toRect = toEl.getBoundingClientRect();
                const clone = fromEl.cloneNode(true);
                clone.style.position = 'absolute';
                clone.style.left = `${fromRect.left}px`;
                clone.style.top = `${fromRect.top}px`;
                clone.style.transition = 'all 0.5s ease';
                document.body.appendChild(clone);
                setTimeout(() => {
                    clone.style.left = `${toRect.left}px`;
                    clone.style.top = `${toRect.top}px`;
                    clone.style.transform = 'scale(1.2)';
                    clone.style.opacity = '0';
                }, 10);
                setTimeout(() => {
                    clone.remove();
                }, 600);
            }
            async function completeWord() {
                if (currentWord.audio && currentWord.audio.length > 0) {
                    try {
                        await AudioManager.playAudio(currentWord.audio);
                    } catch (error) {
                        console.warn('Audio play failed:', error);
                    }
                }
                // Save as known if no errors, else review
                const status = errors === 0 ? 'known' : 'review';
                WordDB.saveWordStatus(currentList.filename, currentWord.english, status);
                await new Promise(resolve => setTimeout(resolve, 1000));
                currentIndex++;
                updateProgress();
                setupPuzzle();
            }
            function resetPuzzle() {
                errors = 0;
                currentPosition = 0;
                const wordLetters = currentWord.english.toLowerCase().split('');
                letters = Utils.shuffleArray([...wordLetters]);
                blanks = wordLetters.map(() => '_');
                renderBlanks();
                renderLetters();
                updateErrors();
            }
            function updateErrors() {
                errorsEl.textContent = `Errors: ${errors}/${maxErrors}`;
            }
            function updateProgress() {
                if (!currentList) return;
                const total = currentList.words.length;
                const progress = WordDB.getListProgress(currentList.filename, total);
                const remaining = wordQueue.length - currentIndex;
                const currentPos = currentIndex + 1;
                progressInfo.textContent = `${currentPos}/${wordQueue.length} (${remaining} left)`;
                progressStats.innerHTML = `
                    <div class="stat-item stat-known">
                        <span>✓</span>
                        <span>Known: ${progress.known}</span>
                    </div>
                    <div class="stat-item stat-review">
                        <span>↻</span>
                        <span>Review: ${progress.review}</span>
                    </div>
                    <div class="stat-item stat-new">
                        <span>+</span>
                        <span>New: ${progress.new}</span>
                    </div>
                `;
            }
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            window.addEventListener('beforeunload', () => {
                AudioManager.stopAudio();
            });
            puzzleCard.style.display = 'none';
            loadList();
        });
    </script>
</body>
</html>
