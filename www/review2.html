<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Read and Listen - Always Free English</title>

    <!-- PWA мета-теги (добавлено как в первом файле) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">

    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            min-height: -webkit-fill-available;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }

        /* Заголовок для мобильных */
        .mobile-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            padding-top: env(safe-area-inset-top, 15px);
            min-height: 70px;
        }

        .mobile-back-btn {
            background: none;
            border: none;
            color: #2196f3;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .mobile-back-btn:active {
            background-color: rgba(33, 150, 243, 0.1);
            transform: scale(0.95);
        }

        .mobile-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            flex: 1;
            margin: 0 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .text-card {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: auto;
            max-height: 60vh;
            padding: 30px;
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: left;
            overflow-y: auto;
            z-index: 4;
            border: 2px solid #333;
            font-size: 22px;
            line-height: 1.6;
            color: #bbbbbb;
            cursor: pointer;
            word-break: break-word;
            margin-top: 80px;
            margin-bottom: 80px;
        }

        .text-card::-webkit-scrollbar {
            width: 8px;
        }

        .text-card::-webkit-scrollbar-track {
            background: #333;
            border-radius: 4px;
        }

        .text-card::-webkit-scrollbar-thumb {
            background: #4caf50;
            border-radius: 4px;
        }

        .text-card span {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: pre-wrap;
            position: relative;
            display: inline-block;
            padding: 2px 4px;
            margin: 0 1px;
            border-radius: 4px;
        }

        /* Стили для текущего слова */
        .text-card .current-word {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.2) 0%, rgba(76, 175, 80, 0.1) 100%);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow:
                0 4px 12px rgba(76, 175, 80, 0.15),
                0 0 0 1px rgba(76, 175, 80, 0.3);
            text-shadow: 0 0 8px rgba(76, 175, 80, 0.4);
            animation: wordPulse 2s ease-in-out infinite;
        }

        /* Стили для следующих слов */
        .text-card .word-ahead-1 {
            color: #e0e0e0;
            background: rgba(76, 175, 80, 0.05);
        }

        .text-card .word-ahead-2 {
            color: #d0d0d0;
        }

        /* Стили для произнесенных слов */
        .text-card .word-spoken {
            color: #4caf50;
            opacity: 0.7;
            position: relative;
        }

        .text-card .word-spoken::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 10%;
            width: 80%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #4caf50, transparent);
            opacity: 0.5;
        }

        /* Эффект выделения для слов из списка */
        .text-card .word-from-list {
            font-weight: 700;
            color: #ffffff;
            position: relative;
        }

        .text-card .word-from-list.current-word {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.3) 0%, rgba(76, 175, 80, 0.2) 100%);
            box-shadow:
                0 6px 20px rgba(76, 175, 80, 0.25),
                0 0 0 2px rgba(76, 175, 80, 0.4);
        }

        /* Анимация пульсации */
        @keyframes wordPulse {
            0%, 100% {
                box-shadow:
                    0 4px 12px rgba(76, 175, 80, 0.15),
                    0 0 0 1px rgba(76, 175, 80, 0.3);
                transform: translateY(-2px) scale(1);
            }
            50% {
                box-shadow:
                    0 6px 20px rgba(76, 175, 80, 0.25),
                    0 0 0 1px rgba(76, 175, 80, 0.5);
                transform: translateY(-2px) scale(1.02);
            }
        }

        /* Кнопки управления */
        .controls-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 100;
            border-top: 1px solid #333;
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #333;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:active {
            transform: scale(0.95);
            background-color: #2a2a2a;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background-color: #4caf50;
            border-color: #4caf50;
            font-size: 28px;
        }

        .play-btn:active {
            background-color: #388e3c;
        }

        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .text-card {
                width: 95%;
                font-size: 18px;
                padding: 20px;
                margin-top: 70px;
                margin-bottom: 120px;
            }

            .control-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }

            .play-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }

            .mobile-title {
                font-size: 16px;
            }
        }

        @media (min-width: 769px) {
            .mobile-header {
                display: none;
            }

            .text-card {
                margin-top: 20px;
                margin-bottom: 100px;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .text-card {
                font-size: 16px;
                padding: 15px;
            }

            .control-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .play-btn {
                width: 55px;
                height: 55px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>

        <!-- Мобильный заголовок -->
        <div class="mobile-header" id="mobile-header">
            <button class="mobile-back-btn" id="mobile-back-btn">← Back</button>
            <div class="mobile-title" id="mobile-title">Read and Listen</div>
            <div style="width: 80px;"></div> <!-- Для баланса -->
        </div>

        <div id="text-card" class="text-card">
            <!-- Текст будет загружен здесь -->
        </div>

        <!-- Панель управления -->
        <div class="controls-container" id="controls-container">
            <button class="control-btn" id="prev-btn" title="Previous text">⏮</button>
            <button class="control-btn play-btn" id="play-btn" title="Play/Pause">▶</button>
            <button class="control-btn" id="next-btn" title="Next text">⏭</button>
        </div>

        <div class="loading" id="loading">Loading text...</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Получаем параметры из URL
            const urlParams = new URLSearchParams(window.location.search);
            let listId = urlParams.get('list');

            // Элементы DOM
            const textCard = document.getElementById('text-card');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const mobileBackBtn = document.getElementById('mobile-back-btn');
            const mobileTitle = document.getElementById('mobile-title');
            const playBtn = document.getElementById('play-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            let currentList = null;
            let wordSet = new Set();
            let utterance = null;
            let currentTextIndex = 0;
            let isPlaying = false;
            let wordElements = [];
            let currentWordIndex = -1;

            // Образцы текстов
            const texts = [
                "The approach we take can define the outcome. We must consider every factor and assume nothing. The benefit of this strategy is to improve our process and maintain focus. Evidence shows that this will impact the result positively. We need to measure the risk and set priority. The overall vision should guide us through uncertainty.",
                "In this context, the demand for resources is high. We must contribute effectively to meet the requirement. The pattern of variation tends to limit our options. Support is key to achieve the objective. The trade-off involves a tendency toward a certain trend. We estimate the scope and structure accordingly.",
                "To support the value, we must limit uncertainty and focus on the role. The process involves a strategy to improve the outcome. We define the requirement and estimate the impact. The evidence shows a pattern in the trend. Overall, the priority is to maintain the vision through effective measures."
            ];

            // Функция загрузки списка слов
            async function loadList() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const listId = urlParams.get('list');

        if (!listId) {
            throw new Error('No list specified');
        }

        // Проверяем, является ли это default list
        if (listId.startsWith('default_')) {
            const defaultLists = JSON.parse(localStorage.getItem('default_lists') || '[]');
            currentList = defaultLists.find(list => list.filename === listId);
            if (!currentList) {
                throw new Error('Default list not found');
            }
        } else {
            // Загружаем из папки english/
            const listPath = listId.startsWith('english/') ? listId : `english/${listId}`;
            const response = await fetch(listPath);
            if (!response.ok) {
                // Пробуем альтернативный путь
                const altResponse = await fetch(listId);
                if (!altResponse.ok) {
                    throw new Error(`Failed to load list: ${response.status}`);
                }
                const text = await altResponse.text();
                currentList = JSON.parse(text);
            } else {
                const text = await response.text();
                currentList = JSON.parse(text);
            }
        }

        if (!currentList.words || !Array.isArray(currentList.words)) {
            throw new Error('Invalid list format');
        }

        currentList.filename = listId;
        WordDB.updateListStatus(currentList);
        wordSet = new Set(currentList.words.map(w => w.english.toLowerCase()));
        loadCurrentText();
        loadingEl.style.display = 'none';
        textCard.style.display = 'block';
        updateProgress();
        startHideControls();

        // Инициализируем голос при загрузке
        if ('speechSynthesis' in window) {
            setTimeout(() => {
                // Даем время на загрузку голосов
                startSpeech();
            }, 500);
        }
    } catch (error) {
        console.error('Error loading list:', error);
        loadingEl.textContent = 'Error loading list: ' + error.message;

        // Возвращаем на главную через 3 секунды
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 3000);
    }
}

            function showLoader() {
                loaderOverlay.classList.add('active');
            }

            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }

            function loadCurrentText() {
                // Получаем сохраненный индекс текста или используем 0
                const storageKey = `currentTextIndex_${currentList.filename}`;
                currentTextIndex = parseInt(localStorage.getItem(storageKey) || '0', 10) % texts.length;

                // Рендерим текст
                renderText(texts[currentTextIndex]);

                // Останавливаем речь, если она воспроизводится
                stopSpeech();
            }

            function renderText(text) {
                // Разбиваем текст на слова
                const words = text.split(/\s+/);

                // Создаем HTML для каждого слова
                textCard.innerHTML = words.map((word, index) => {
                    // Очищаем слово от знаков препинания для сравнения
                    const cleanWord = word.replace(/[.,!?;:"'()]/g, '').toLowerCase();
                    const isFromList = wordSet.has(cleanWord);

                    return `<span id="word-${index}" class="${isFromList ? 'word-from-list' : ''}">${word}</span>`;
                }).join(' ');

                // Сохраняем ссылки на элементы слов
                wordElements = Array.from(textCard.querySelectorAll('span'));
            }

            function resetWordHighlights() {
                wordElements.forEach((span, index) => {
                    span.classList.remove('current-word', 'word-spoken', 'word-ahead-1', 'word-ahead-2');
                });
                currentWordIndex = -1;
            }

            function updateWordHighlights(currentIndex) {
                resetWordHighlights();

                // Отмечаем произнесенные слова
                for (let i = 0; i < currentIndex; i++) {
                    if (wordElements[i]) {
                        wordElements[i].classList.add('word-spoken');
                    }
                }

                // Подсвечиваем текущее слово
                if (wordElements[currentIndex]) {
                    wordElements[currentIndex].classList.add('current-word');

                    // Плавная прокрутка к текущему слову
                    const wordElement = wordElements[currentIndex];
                    const container = textCard;
                    const wordTop = wordElement.offsetTop;
                    const containerHeight = container.clientHeight;
                    const wordHeight = wordElement.offsetHeight;

                    container.scrollTo({
                        top: wordTop - containerHeight / 2 + wordHeight / 2,
                        behavior: 'smooth'
                    });
                }

                // Слегка подсвечиваем следующие слова
                for (let i = 1; i <= 2; i++) {
                    const nextIndex = currentIndex + i;
                    if (wordElements[nextIndex]) {
                        wordElements[nextIndex].classList.add(`word-ahead-${i}`);
                    }
                }
            }

            function nextText() {
                currentTextIndex = (currentTextIndex + 1) % texts.length;
                const storageKey = `currentTextIndex_${currentList.filename}`;
                localStorage.setItem(storageKey, currentTextIndex);
                renderText(texts[currentTextIndex]);
                stopSpeech();
                setTimeout(startSpeech, 500);
            }

            function prevText() {
                currentTextIndex = (currentTextIndex - 1 + texts.length) % texts.length;
                const storageKey = `currentTextIndex_${currentList.filename}`;
                localStorage.setItem(storageKey, currentTextIndex);
                renderText(texts[currentTextIndex]);
                stopSpeech();
                setTimeout(startSpeech, 500);
            }

            // Функции для работы с синтезом речи
            function getFemaleVoice() {
                const voices = speechSynthesis.getVoices();
                return voices.find(voice =>
                    voice.lang === 'en-US' &&
                    (voice.name.includes('Female') ||
                     voice.name.includes('Samantha') ||
                     voice.name.includes('Google US English') ||
                     voice.name.toLowerCase().includes('female'))
                ) || voices.find(voice => voice.lang === 'en-US');
            }

            function startSpeech() {
                if (!('speechSynthesis' in window)) {
                    alert('Text-to-speech not supported in this browser.');
                    return;
                }

                stopSpeech();

                utterance = new SpeechSynthesisUtterance(texts[currentTextIndex]);
                const femaleVoice = getFemaleVoice();
                if (femaleVoice) {
                    utterance.voice = femaleVoice;
                }

                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.pitch = 1.1;
                utterance.volume = 1;

                // Отслеживание текущего слова
                let wordIndex = 0;

                utterance.onboundary = (event) => {
                    if (event.name === 'word') {
                        currentWordIndex = wordIndex;
                        updateWordHighlights(currentWordIndex);

                        // Переходим к следующему слову
                        const words = texts[currentTextIndex].split(/\s+/);
                        if (wordIndex < words.length - 1) {
                            wordIndex++;
                        }
                    }
                };

                utterance.onend = () => {
                    // Помечаем все слова как произнесенные
                    wordElements.forEach(span => {
                        span.classList.remove('current-word', 'word-ahead-1', 'word-ahead-2');
                        span.classList.add('word-spoken');
                    });

                    stopSpeech();
                    // Автоматически переходим к следующему тексту через 1.5 секунды
                    setTimeout(nextText, 1500);
                };

                utterance.onerror = (event) => {
                    console.error('Speech synthesis error:', event);
                    stopSpeech();
                };

                speechSynthesis.speak(utterance);
                isPlaying = true;
                playBtn.textContent = '⏸';
            }

            function pauseSpeech() {
                if (speechSynthesis.speaking) {
                    speechSynthesis.pause();
                    isPlaying = false;
                    playBtn.textContent = '▶';
                }
            }

            function resumeSpeech() {
                if (speechSynthesis.paused) {
                    speechSynthesis.resume();
                    isPlaying = true;
                    playBtn.textContent = '⏸';
                }
            }

            function stopSpeech() {
                if (utterance) {
                    speechSynthesis.cancel();
                    utterance = null;
                }
                resetWordHighlights();
                isPlaying = false;
                playBtn.textContent = '▶';
            }

            function togglePlay() {
                if (isPlaying) {
                    if (speechSynthesis.paused) {
                        resumeSpeech();
                    } else {
                        pauseSpeech();
                    }
                } else {
                    startSpeech();
                }
            }

            // Обработчики событий
            mobileBackBtn.addEventListener('click', () => {
                stopSpeech();
                window.location.href = 'index.html';
            });

            playBtn.addEventListener('click', togglePlay);

            prevBtn.addEventListener('click', prevText);

            nextBtn.addEventListener('click', nextText);

            textCard.addEventListener('click', togglePlay);

            // Обработка клавиатуры
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                } else if (e.code === 'ArrowLeft') {
                    e.preventDefault();
                    prevText();
                } else if (e.code === 'ArrowRight') {
                    e.preventDefault();
                    nextText();
                } else if (e.code === 'Escape') {
                    stopSpeech();
                    window.location.href = 'index.html';
                }
            });

            // Останавливаем речь при закрытии страницы
            window.addEventListener('beforeunload', stopSpeech);

            // Загружаем голоса при инициализации
            let voicesLoaded = false;
            speechSynthesis.onvoiceschanged = () => {
                if (!voicesLoaded) {
                    voicesLoaded = true;
                    console.log('Voices loaded:', speechSynthesis.getVoices().length);
                }
            };

            // Инициализация
            textCard.style.display = 'none';
            await loadList();
        });
    </script>
</body>
</html>
