<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review — backup restore</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        /* Adjustable offsets (change these two vars to tweak header/hint vertical offsets)
           - --header-offset: distance from top to header (default 0.5cm = slightly higher)
           - --hint-offset: distance from bottom to hint (default 2cm = visible on mobile)
           You can edit these at the top of this file. */
        :root{ --header-offset: 0.5cm; --hint-offset: 2cm }
        .background-gradient{position:fixed;inset:0;pointer-events:none;z-index:0}
        /* overlay icon containers and small icon style (copied minimal from review-01) */
        .icon{font-size:70px;opacity:0.3;font-weight:800;user-select:none;pointer-events:none}
        .horizontal-left-overlay, .horizontal-right-overlay{position:absolute;top:0;bottom:0;width:50%;display:none;align-items:center;z-index:1;pointer-events:none}
        .horizontal-left-overlay{left:0;justify-content:center}
        .horizontal-right-overlay{right:0;justify-content:center}
        .vertical-top-overlay, .vertical-bottom-overlay{position:absolute;left:0;right:0;width:100%;display:none;align-items:center;z-index:1;pointer-events:none}
        .vertical-top-overlay{top:0;height:50%;justify-content:center}
        .vertical-bottom-overlay{bottom:0;height:50%;justify-content:center}
        .gradient-overlay{position:absolute;width:200%;height:200%;top:-50%;left:-50%;opacity:0;transition:opacity 0.15s}
        .gradient-known{background:radial-gradient(circle at center, rgba(76,175,80,0) 0%, rgba(76,175,80,0.12) 30%, rgba(76,175,80,0.28) 60%, rgba(76,175,80,0.45) 100%)}
        .gradient-review{background:radial-gradient(circle at center, rgba(255,152,0,0) 0%, rgba(255,152,0,0.12) 30%, rgba(255,152,0,0.28) 60%, rgba(255,152,0,0.45) 100%)}

        .container{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center}
        .word-large{font-size:64px;font-weight:800;text-align:center;user-select:none;transition:transform .08s ease, opacity .08s}
        .word-small{font-size:26px;font-weight:700;text-align:center;color:#ddd}

        /* move header down by ~1cm for better spacing on mobile */
        .top-area{position:absolute;top:calc(var(--header-offset) + env(safe-area-inset-top,0px));left:0;right:0;height:72px;display:flex;align-items:center;justify-content:center;z-index:3;pointer-events:none}
        .top-inner{width:100%;max-width:900px;display:flex;align-items:center;gap:12px;padding:12px 20px;box-sizing:border-box;pointer-events:auto}
        /* Header: left/back, center/title, right/progress - strict three-slot layout */
        .top-inner{display:flex;align-items:center;justify-content:space-between}
        .top-left, .top-center, .top-right {display:flex;align-items:center}
        .top-left {flex:0 0 48px}
        .top-center {flex:1 1 auto;justify-content:center}
        .top-right {flex:0 0 auto}
        .back-button{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,0.04);z-index:5}
        .back-button:before{content:'';width:10px;height:10px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:translateY(1px) rotate(45deg);display:block}
        .section-title{font-weight:700;z-index:4}

        /* faint background icons (hidden by default; shown per breakpoint) */
        .background-icon{position:absolute;font-weight:800;z-index:0;pointer-events:none;display:none}
        .background-icon-mobile-top{top:10%;left:50%;transform:translateX(-50%);font-size:180px;opacity:0.08;color:rgba(76,175,80,0.18);filter:drop-shadow(0 0 8px rgba(76,175,80,0.25))}
        .background-icon-mobile-bottom{bottom:10%;left:50%;transform:translateX(-50%);font-size:160px;opacity:0.08;color:rgba(255,152,0,0.18);filter:drop-shadow(0 0 8px rgba(255,152,0,0.25))}
        .background-icon-pc-left{top:50%;left:6%;transform:translateY(-50%);font-size:200px;opacity:0.08;color:rgba(76,175,80,0.12);filter:drop-shadow(0 0 12px rgba(76,175,80,0.22))}
        .background-icon-pc-right{top:50%;right:6%;transform:translateY(-50%);font-size:200px;opacity:0.08;color:rgba(255,152,0,0.12);filter:drop-shadow(0 0 12px rgba(255,152,0,0.22))}

        /* prevent wrapping on small screens like review.html */
        .bottom-hint{position:absolute;bottom:calc(var(--hint-offset) + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);color:#999;font-size:13px;z-index:3;white-space:nowrap;max-width:calc(100% - 40px);overflow:hidden;text-overflow:ellipsis}

        /* progress sits inside the header on the right, aligned with the title */
        .progress{position:relative;color:#aaa;z-index:3;font-weight:400}

        /* when translation is shown (dragging mode) enlarge text */
        .dragging { font-size:64px; color:#4caf50 }

        .hidden-ui{opacity:0;visibility:hidden;pointer-events:none}
        .visible-ui{opacity:1;visibility:visible;pointer-events:auto}

        /* Sticky translation (appears after vertical release) */
        .translation-sticky{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:64px;font-weight:800;color:#4caf50;z-index:4;pointer-events:none;opacity:0;transition:opacity .12s;max-width:calc(100% - 40px);white-space:nowrap;overflow:hidden}

        @media (max-width:768px){ .word-large{font-size:48px} }
        /* Responsive visibility for background icons/overlays (like review-01) */
        @media (max-width:768px) {
            .horizontal-left-overlay, .horizontal-right-overlay { display: none !important; }
            .vertical-top-overlay, .vertical-bottom-overlay { display: flex !important; }
            .background-icon-mobile-top, .background-icon-mobile-bottom { display: block !important; }
            .background-icon-pc-left, .background-icon-pc-right { display: none !important; }
        }
        @media (min-width:769px) {
            .vertical-top-overlay, .vertical-bottom-overlay { display: none !important; }
            .horizontal-left-overlay, .horizontal-right-overlay { display: flex !important; }
            .background-icon-mobile-top, .background-icon-mobile-bottom { display: none !important; }
            .background-icon-pc-left, .background-icon-pc-right { display: block !important; }
        }
    </style>
</head>
<body>
    <div class="background-gradient">
        <div class="gradient-overlay gradient-known" id="gradient-known"></div>
        <div class="gradient-overlay gradient-review" id="gradient-review"></div>
        <!-- background icons for visual hint: left/top = ✓(green), right/bottom = ↻(orange) -->
        <div class="background-icon background-icon-mobile-top">✓</div>
        <div class="background-icon background-icon-mobile-bottom">↻</div>
        <div class="background-icon background-icon-pc-left">✓</div>
        <div class="background-icon background-icon-pc-right">↻</div>
        <!-- overlay helper icons: left/top green check, right/bottom orange reset -->
        <div class="horizontal-left-overlay"><div class="icon" style="color:#4caf50;filter:drop-shadow(0 0 8px rgba(76,175,80,0.45))"></div></div>
        <div class="horizontal-right-overlay"><div class="icon" style="color:#ff9800;filter:drop-shadow(0 0 8px rgba(255,152,0,0.45))"></div></div>
        <div class="vertical-top-overlay"><div class="icon" style="color:#4caf50;filter:drop-shadow(0 0 8px rgba(76,175,80,0.45))"></div></div>
        <div class="vertical-bottom-overlay"><div class="icon" style="color:#ff9800;filter:drop-shadow(0 0 8px rgba(255,152,0,0.45))"></div></div>
    </div>

    <div class="top-area hidden-ui" id="top-area">
        <div class="top-inner">
                <div class="top-left"><div class="back-button" id="back-button" title="Back"></div></div>
                <div class="top-center"><div class="section-title" id="section-title">Review Words</div></div>
                <div class="top-right"><div id="progress" class="progress"></div></div>
            </div>
    </div>

    <div class="container">
        <div id="wordContainer" style="position:relative">
            <div id="wordLarge" class="word-large">Loading...</div>
            <div id="wordSmall" class="word-small" style="display:none"></div>
            <div id="translationSticky" class="translation-sticky" aria-hidden="true"></div>
        </div>
        <div id="hint" class="bottom-hint hidden-ui"></div>
    </div>

    <script>
    // Restored working backup behavior (no server required for basic functionality)

    const urlParams = new URLSearchParams(window.location.search);
    const listId = urlParams.get('list');
    const sessionId = urlParams.get('session');

    const wordLarge = document.getElementById('wordLarge');
    const wordSmall = document.getElementById('wordSmall');
    const progressEl = document.getElementById('progress');
    const backButton = document.getElementById('back-button');
    const topArea = document.getElementById('top-area');
    const sectionTitle = document.getElementById('section-title');
    const gradientKnown = document.getElementById('gradient-known');
    const gradientReview = document.getElementById('gradient-review');
    const hintEl = document.getElementById('hint');

    let wordQueue = [];
    let currentIndex = 0;
    let currentWord = null;
    let currentList = null;
    let isCombined = false;

    // UI visibility
    let isUIHidden = true;
    function updateUIVisibility(){
        if(isUIHidden){ topArea.classList.add('hidden-ui'); topArea.classList.remove('visible-ui'); hintEl.classList.add('hidden-ui'); hintEl.classList.remove('visible-ui'); progressEl.classList.add('hidden-ui'); progressEl.classList.remove('visible-ui'); }
        else { topArea.classList.remove('hidden-ui'); topArea.classList.add('visible-ui'); hintEl.classList.remove('hidden-ui'); hintEl.classList.add('visible-ui'); progressEl.classList.remove('hidden-ui'); progressEl.classList.add('visible-ui'); }
    }

    // small mobile detect
    const isMobile = window.innerWidth <= 768 || 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // Set hint text like review.html
    function setHintText(){ if(isMobile) hintEl.textContent = 'Вверх — слово знаете, вниз — для повтора'; else hintEl.textContent = 'Влево — слово знаете, вправо — для повтора'; }
    setHintText();

    // WordDB helpers
    const WordDB = {
        saveWordStatus(listId, english, status) {
            const key = `word_${listId}_${english}`;
            localStorage.setItem(key, status);
        },
        getWordStatus(listId, english) {
            const key = `word_${listId}_${english}`;
            return localStorage.getItem(key) || 'new';
        },
        updateListStatus(listData) {
            if (!listData || !Array.isArray(listData.words)) return listData;
            listData.words.forEach(word => {
                const status = this.getWordStatus(listData.filename, word.english);
                word.status = status;
            });
            return listData;
        },
        getWordsForReview(listData) {
            const reviewed = [];
            const fresh = [];
            listData.words.forEach(word => {
                const status = this.getWordStatus(listData.filename, word.english);
                word.status = status;
                if (status === 'review') reviewed.push(word);
                else if (status === 'new') fresh.push(word);
            });
            return reviewed.concat(fresh);
        }
    };

    const AudioManager = {
        audioElements: new Map(),
        async play(word){
            if(!word) return;
            try{
                let src = (word.audio && word.audio[0]) || `audio/${word.english.toLowerCase().replace(/[^a-z0-9]/g,'_')}.wav`;
                if(src && !src.startsWith('audio/') && !src.startsWith('http')) src = `audio/${src}`;
                if(this.audioElements.has(word.english)){
                    const a = this.audioElements.get(word.english);
                    try{ a.currentTime = 0; await a.play(); }catch(e){}
                    return;
                }
                const a = new Audio(src);
                a.preload = 'auto';
                // store immediately so scheduleNextAfterAudio can find it
                this.audioElements.set(word.english, a);
                a.addEventListener('canplaythrough', ()=>{ try{ a.play().catch(()=>{}); }catch(e){} });
                a.addEventListener('error', ()=>{});
                // Try to play now — browsers may block until user gesture
                a.play().catch(()=>{});
            }catch(e){}
        }
    };

    async function fetchJson(path){ try{ const r=await fetch(path); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }

    async function loadList(){
        try{
            if(sessionId){ const session = JSON.parse(localStorage.getItem(sessionId)||'{}'); wordQueue = session.words || []; isCombined = true; currentList = { filename: 'combined', name: 'Multiple Lists' }; }
            else if(listId){
                const requested = decodeURIComponent(listId);
                let list = await fetchJson(requested);
                if(!list && !requested.startsWith('english/')) list = await fetchJson(`english/${requested}`) || null;
                if(!list){ try{ const idx = await fetchJson('english/list.json'); if(Array.isArray(idx)){ const found = idx.find(f => f === requested || f.endsWith(requested) || f === requested.replace(/^english\//,'')); if(found){ const candidate=`english/${found}`; const fetched = await fetchJson(candidate); if(fetched){ list = fetched; list.filename = candidate; } } } }catch(e){ console.warn('Failed reading english/list.json', e); } }
                if(!list){ const defaults = ['english/list_basic_1.json','english/list_intermediate_1.json','english/list_advanced_1.json']; for(const d of defaults){ const l = await fetchJson(d); if(l){ list = l; list.filename = d; break; } } }
                if(!list){ wordLarge.textContent = 'Error loading list. Please check path.'; console.error('review: could not resolve list param', requested); return; }
                if(!list.filename) list.filename = requested.startsWith('english/') ? requested : `english/${requested}`;
                currentList = list;
                 // prefer theme for header title
                 sectionTitle.textContent = currentList.theme || currentList.name || 'Review Words';
                 WordDB.updateListStatus(list);
                wordQueue = WordDB.getWordsForReview(list);
                // Shuffle each session so order is different each start
                for (let i = wordQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [wordQueue[i], wordQueue[j]] = [wordQueue[j], wordQueue[i]];
                }
             }

            if(!wordQueue || wordQueue.length === 0){ wordLarge.textContent = 'No words'; return; }
            currentIndex = 0; showWord(); updateProgress();
        }catch(e){ console.error('review loadList error', e); wordLarge.textContent = 'Error loading list.'; }
    }

    function showWord(){
        // Set current word and fully reset any visual state carried over from previous interactions
        currentWord = wordQueue[currentIndex];
        // clear sticky/overlay translation
        const tSticky = document.getElementById('translationSticky');
        tSticky.style.opacity = '0'; tSticky.textContent = ''; tSticky.style.fontSize = '';
        // reset word element visual properties so it's neutral (white, normal scale)
        wordLarge.textContent = currentWord.english;
        wordLarge.classList.remove('dragging');
        wordSmall.style.display = 'none';
        wordLarge.style.transform = '';
        wordLarge.style.transition = '';
        wordLarge.style.opacity = '1';
        // clear any inline color/size left from previous drag
        wordLarge.style.color = '';
        wordLarge.style.fontSize = '';
        // reset drag/translation state variables
        translationShownDuringDrag = false;
        originalEnglish = '';
        stickyVisible = false;
        // play audio once on appearance
        try { AudioManager.play(currentWord); } catch (e) { /* ignore */ }
        // timing debug: record and log when a word is shown
        try{
            const now = Date.now();
            if(window.__lastShowTime){ const delta = now - window.__lastShowTime; console.debug('[review] showWord:', currentWord && (currentWord.english||currentWord.English), 'index', currentIndex, 'deltaFromPrevMs', delta); }
            else { console.debug('[review] showWord:', currentWord && (currentWord.english||currentWord.English), 'index', currentIndex); }
            window.__lastShowTime = now;
        }catch(e){}
    }
    function updateProgress(){ progressEl.textContent = `${currentIndex+1}/${wordQueue.length}`; }

    // Drag handling: don't show translation on click. Only start dragging when movement exceeds START_DRAG threshold.
    let isPointerActive = false; let startX=0, startY=0, lastX=0, lastY=0; let draggingStarted=false;
    let downTime = 0; const TAP_MAX_MS = 150; // quick tap threshold
    const START_DRAG = 2; // px: require a small movement to start dragging so taps still toggle UI
     const DRAG_THRESHOLD = 40; // px to count as action on release

     function onPointerDown(e){ const p=(e.touches&&e.touches[0])||e; startX=p.clientX; startY=p.clientY; lastX=startX; lastY=startY; isPointerActive=true; draggingStarted=false; /* do not change word on down */
        // remove transitions so movement feels instant
        try{ wordLarge.style.transition = 'none'; }catch(ex){}
        downTime = Date.now();
        // DO NOT set draggingStarted=true here — require small movement (START_DRAG) to start dragging.
        // prepare for dragging: ensure translation sticky hidden during drag
        const tSticky = document.getElementById('translationSticky'); tSticky.style.opacity = '0'; tSticky.textContent = '';
        e.preventDefault && e.preventDefault(); }

     // translation display control during drag
    let stickyVisible = false;
    let translationShownDuringDrag = false;
    let originalEnglish = '';
    function fitTextToContainer(elem, initialSize=64){ // reduce font-size until text fits within wordContainer
        try{
            const wc = document.getElementById('wordContainer');
            const maxW = Math.max(20, wc.clientWidth - 40);
            let fs = initialSize; elem.style.fontSize = fs + 'px';
            while(elem.scrollWidth > maxW && fs > 12){ fs -= 2; elem.style.fontSize = fs + 'px'; }
        }catch(e){}
    }

     function onPointerMove(e){ if(!isPointerActive) return; const p=(e.touches&&e.touches[0])||e; const dx=p.clientX-startX; const dy=p.clientY-startY; lastX=p.clientX; lastY=p.clientY; const moved = Math.max(Math.abs(dx), Math.abs(dy)); if(!draggingStarted && moved >= START_DRAG){ // start dragging
            draggingStarted = true;
            wordLarge.classList.add('dragging');
            isUIHidden = true; updateUIVisibility();
         }
        if(draggingStarted){ // move the English word with pointer and apply progressive color/scale
            const absX=Math.abs(dx), absY=Math.abs(dy); const primary=Math.max(absX,absY); const ratio=Math.min(primary/200,1);
            // Gradients (existing visual overlay)
            if(Math.abs(dx) > Math.abs(dy)){ if(dx>0){ gradientReview.style.opacity = String(ratio); gradientKnown.style.opacity='0'; } else { gradientKnown.style.opacity = String(ratio); gradientReview.style.opacity='0'; } } else { if(dy>0){ gradientReview.style.opacity = String(ratio); gradientKnown.style.opacity='0'; } else { gradientKnown.style.opacity = String(ratio); gradientReview.style.opacity='0'; } }

            // compute scale and color interpolation between white and target
            const scale = 1 + 0.14 * ratio; // up to ~14% larger
            // Determine target color: known (green) or review (orange) depending on primary direction
            let target = {r:76,g:175,b:80}; // green default
            if(Math.abs(dx) > Math.abs(dy)){
                // horizontal drag: right -> review (orange), left -> known (green)
                if(dx > 0) target = {r:255,g:152,b:0}; else target = {r:76,g:175,b:80};
            } else {
                // vertical drag: down -> review, up -> known
                if(dy > 0) target = {r:255,g:152,b:0}; else target = {r:76,g:175,b:80};
            }
            // interpolate between white (255,255,255) and target
            const t = ratio; const r = Math.round(255 + (target.r - 255) * t); const g = Math.round(255 + (target.g - 255) * t); const b = Math.round(255 + (target.b - 255) * t);
            wordLarge.style.transform = `translate(${dx}px, ${dy}px) scale(${scale})`;
            wordLarge.style.color = `rgb(${r},${g},${b})`;

            // Decide axis depending on device: check the word element's position relative to the screen edges.
            // Use thresholdFraction as portion of screen (changed to 20%). We'll show translation when the word's bounding box
            // is within that fraction of the corresponding edge — this detects when the word itself reaches the edge,
            // regardless of where the pointer started the drag.
            const thresholdFraction = 0.20; // 20% of screen
            let showNow = false;
            try{
                const wr = wordLarge.getBoundingClientRect();
                if(isMobile){ // vertical: check top/bottom distances of the word itself
                    const topDist = wr.top; // distance from top of viewport to top of word
                    const bottomDist = window.innerHeight - wr.bottom; // distance from bottom of viewport to bottom of word
                    if(topDist <= window.innerHeight * thresholdFraction) showNow = true;
                    if(bottomDist <= window.innerHeight * thresholdFraction) showNow = true;
                } else { // desktop: horizontal: check left/right distances of the word itself
                    const leftDist = wr.left; // distance from left edge to left of word
                    const rightDist = window.innerWidth - wr.right; // distance from right edge to right of word
                    if(leftDist <= window.innerWidth * thresholdFraction) showNow = true;
                    if(rightDist <= window.innerWidth * thresholdFraction) showNow = true;
                }
            }catch(e){ /* fallback to pointer position if bounding rect fails */
                if(isMobile){ if(dy < 0){ const dist = p.clientY; if(dist <= window.innerHeight * thresholdFraction) showNow = true; } else if(dy > 0){ const dist = window.innerHeight - p.clientY; if(dist <= window.innerHeight * thresholdFraction) showNow = true; } }
                else { if(dx < 0){ const dist = p.clientX; if(dist <= window.innerWidth * thresholdFraction) showNow = true; } else if(dx > 0){ const dist = window.innerWidth - p.clientX; if(dist <= window.innerWidth * thresholdFraction) showNow = true; } }
            }

            if(showNow && !translationShownDuringDrag){ // enter edge zone => show translation IN PLACE (replace English)
                 originalEnglish = wordLarge.textContent;
                 const translation = currentWord.russian || currentWord.translation || '';
                 wordLarge.textContent = translation;
                 // keep color/scale effect while showing translation
                 fitTextToContainer(wordLarge, 64);
                 translationShownDuringDrag = true;
             } else if(!showNow && translationShownDuringDrag){ // moved away from edge zone -> restore English
                 wordLarge.textContent = originalEnglish || (currentWord && currentWord.english) || '';
                 wordLarge.style.fontSize = '';
                 translationShownDuringDrag = false;
                 // reset color and scale when leaving
                 wordLarge.style.color = '';
                 wordLarge.style.transform = `translate(${dx}px, ${dy}px) scale(1)`;
             }
         }
          e.preventDefault && e.preventDefault(); }

     function onPointerUp(e){ if(!isPointerActive) return; isPointerActive=false; if(!draggingStarted){ // treat as tap - toggle UI visibility
            // Handle quick tap: toggle UI
            if (Date.now() - downTime < TAP_MAX_MS) { isUIHidden = !isUIHidden; updateUIVisibility(); return; }
            // otherwise fall through
        }
         // if draggingStarted handle release
        wordLarge.style.transition = 'transform 0.25s ease, opacity 0.2s ease';
        const dx = lastX - startX; const dy = lastY - startY; gradientKnown.style.opacity='0'; gradientReview.style.opacity='0';
        if(Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD){ // too small - restore english
            // hide any sticky / translation shown during drag
            try{ const tSticky = document.getElementById('translationSticky'); tSticky.style.opacity = '0'; stickyVisible = false; }catch(e){}
            if(translationShownDuringDrag){ wordLarge.textContent = originalEnglish || (currentWord && currentWord.english) || ''; wordLarge.style.fontSize = ''; wordLarge.classList.remove('dragging'); translationShownDuringDrag = false; }
            wordLarge.classList.remove('dragging'); wordLarge.style.transform = ''; return; }
        // Determine action and primary axis
        let action = null; const primaryIsHorizontal = Math.abs(dx) > Math.abs(dy);
        if(primaryIsHorizontal) action = dx > 0 ? 'review' : 'known'; else action = dy > 0 ? 'review' : 'known';
        // Compute fly-away direction strictly along primary axis:
        const signX = dx > 0 ? 1 : -1; const signY = dy > 0 ? 1 : -1;
        let offX = 0, offY = 0;
        if(primaryIsHorizontal){
            // on desktop (primary horizontal) fly strictly left/right
            offX = signX * (window.innerWidth + 200); // a bit beyond the screen
            offY = 0;
        } else {
            // on mobile/vertical action fly strictly up/down
            offX = 0;
            offY = signY * (window.innerHeight + 200);
        }
        // Animate english word flying away strictly along the primary axis
        wordLarge.style.transform = `translate(${offX}px, ${offY}px) scale(0.95)`; wordLarge.style.opacity = '0';
        if(!isCombined) WordDB.saveWordStatus(currentWord.filename || listId || 'local', currentWord.english, action);
        // Do NOT show translation on release — translations are shown only while dragging near the edge.
        // If we had swapped English for translation during drag, restore English now before flying away.
        try{
            if(translationShownDuringDrag){ wordLarge.textContent = originalEnglish || (currentWord && currentWord.english) || ''; wordLarge.style.fontSize = ''; wordLarge.classList.remove('dragging'); translationShownDuringDrag = false; }
        }catch(e){}
        try{ const tSticky = document.getElementById('translationSticky'); tSticky.style.opacity = '0'; stickyVisible = false; }catch(e){}
         // After fly-away, schedule next word; but wait for audio end + 1s if audio is playing
         setTimeout(()=>{
             scheduleNextAfterAudio();
         }, 320);
     }

     function scheduleNextAfterAudio(){
        // Variant A: do NOT wait for audio at all. Immediately show the next word.
        currentIndex++;
        if(currentIndex >= wordQueue.length){ window.location.href = 'index.html'; return; }
        // reset transforms and show next
        wordLarge.style.transition=''; wordLarge.style.transform=''; wordLarge.style.opacity='1'; showWord(); updateProgress();
     }

    // Back button (support touch devices reliably)
     backButton.addEventListener('click', ()=>{ window.location.href = 'index.html'; });
     backButton.addEventListener('touchend', (e)=>{ e.preventDefault && e.preventDefault(); window.location.href = 'index.html'; });

    // Edge back handler (tap near left edge) for phones where header may be hidden
    (function(){
        let tStartX = null, tStartY = null, tStartTime = 0;
        window.addEventListener('touchstart', (ev)=>{
            const t = ev.touches && ev.touches[0];
            if(!t) return;
            tStartX = t.clientX; tStartY = t.clientY; tStartTime = Date.now();
        }, {passive:true});
        window.addEventListener('touchend', (ev)=>{
            try{
                const t = (ev.changedTouches && ev.changedTouches[0]) || {};
                if(tStartX !== null && t.clientX !== undefined){
                    const dx = Math.abs(t.clientX - tStartX || 0);
                    const dy = Math.abs(t.clientY - tStartY || 0);
                    const dt = Date.now() - tStartTime;
                    // if started near left edge, short tap and small movement -> go back
                    if(tStartX <= 60 && dx < 30 && dy < 40 && dt < 500){
                        window.location.href = 'index.html';
                    }
                }
            }catch(e){}
            tStartX = null; tStartY = null; tStartTime = 0;
        }, {passive:true});
    })();

    // Pointer events
    window.addEventListener('mousedown', onPointerDown);
    window.addEventListener('touchstart', onPointerDown, {passive:false});
    window.addEventListener('mousemove', onPointerMove);
    window.addEventListener('touchmove', onPointerMove, {passive:false});
    window.addEventListener('mouseup', onPointerUp);
    window.addEventListener('touchend', onPointerUp);

    // Keyboard
    window.addEventListener('keydown', (e)=>{ if(e.key==='ArrowLeft' || e.key==='a' || e.key==='ArrowUp') applyActionKeyboard('known'); else if(e.key==='ArrowRight' || e.key==='d' || e.key==='ArrowDown') applyActionKeyboard('review'); });
    function applyActionKeyboard(action){ if(!currentWord) return; if(!isCombined) WordDB.saveWordStatus(currentWord.filename || listId || 'local', currentWord.english, action); wordLarge.style.transition='transform .25s ease, opacity .18s'; wordLarge.style.transform = action==='review' ? `translate(${window.innerWidth}px,0)` : `translate(-${window.innerWidth}px,0)`; wordLarge.style.opacity='0'; setTimeout(()=>{ currentIndex++; if(currentIndex>=wordQueue.length){ window.location.href = 'index.html'; return; } wordLarge.style.opacity='1'; wordLarge.style.transform=''; showWord(); updateProgress(); },260); }

    // Initial UI hidden
    updateUIVisibility();
    // load
    loadList();
    </script>
</body>
</html>
