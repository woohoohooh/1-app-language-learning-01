<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minimal Tactics</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: #000;
  touch-action: none;
  font-family: 'Segoe UI', system-ui, sans-serif;
  user-select: none;
}

#game {
  display: block;
  background: #000;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
}

#ui-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 100;
}

#top-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(to bottom, rgba(20,20,20,0.95), rgba(10,10,10,0.9));
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #333;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  color: #fff;
}

#unit-panel {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(to top, rgba(20,20,20,0.95), rgba(10,10,10,0.9));
  backdrop-filter: blur(10px);
  border-top: 1px solid #333;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 15px;
  pointer-events: auto;
}

.unit-button {
  width: 70px;
  height: 70px;
  background: linear-gradient(145deg, #1a1a1a, #0a0a0a);
  border: 2px solid #444;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 12px;
  pointer-events: auto;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}

.unit-button.active {
  border-color: #fff;
  background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.unit-button:active {
  transform: scale(0.95);
}

.unit-cost {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #000;
  color: #fff;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 10px;
  border: 1px solid #444;
}

.unit-icon {
  font-size: 24px;
  margin-bottom: 5px;
  filter: drop-shadow(0 0 2px rgba(255,255,255,0.5));
}

#wave-indicator {
  position: absolute;
  top: 70px;
  left: 0;
  width: 100%;
  height: 30px;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
  font-size: 14px;
  border-bottom: 1px solid #333;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stat-value {
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
}

.stat-label {
  font-size: 10px;
  opacity: 0.7;
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

#selected-unit {
  position: absolute;
  top: 105px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  padding: 8px 20px;
  border-radius: 0 0 15px 15px;
  color: #fff;
  font-size: 12px;
  border: 1px solid #333;
  border-top: none;
  display: none;
}

#selected-unit.show {
  display: block;
}

.health-bar {
  width: 100px;
  height: 3px;
  background: #333;
  border-radius: 2px;
  overflow: hidden;
  margin-top: 5px;
}

.health-fill {
  height: 100%;
  background: #fff;
  transition: width 0.3s ease;
}

#debug {
  position: absolute;
  top: 150px;
  left: 20px;
  color: #fff;
  font-size: 12px;
  background: rgba(0,0,0,0.5);
  padding: 5px;
  border-radius: 5px;
  display: none;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui-overlay">
  <div id="top-bar">
    <div class="stat">
      <div class="stat-value" id="coins">100</div>
      <div class="stat-label">Resources</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="wave">1</div>
      <div class="stat-label">Wave</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="units">0/10</div>
      <div class="stat-label">Units</div>
    </div>
  </div>

  <div id="wave-indicator">
    <span id="wave-text">Wave 1 - Tap to spawn units!</span>
  </div>

  <div id="selected-unit">
    <div id="selected-unit-name">Select a unit</div>
    <div class="health-bar">
      <div class="health-fill" id="selected-unit-health" style="width: 100%"></div>
    </div>
  </div>

  <div id="unit-panel">
    <div class="unit-button" data-unit="soldier" data-cost="30">
      <div class="unit-cost">30</div>
      <div class="unit-icon">⚔️</div>
      <div>Soldier</div>
    </div>
    <div class="unit-button" data-unit="sniper" data-cost="50">
      <div class="unit-cost">50</div>
      <div class="unit-icon">🎯</div>
      <div>Sniper</div>
    </div>
    <div class="unit-button" data-unit="heavy" data-cost="80">
      <div class="unit-cost">80</div>
      <div class="unit-icon">🛡️</div>
      <div>Heavy</div>
    </div>
    <div class="unit-button" data-unit="medic" data-cost="60">
      <div class="unit-cost">60</div>
      <div class="unit-icon">➕</div>
      <div>Medic</div>
    </div>
  </div>
</div>

<script>
// Инициализация canvas
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// Включаем отладку
const debugElement = document.createElement('div');
debugElement.id = 'debug';
document.body.appendChild(debugElement);

// Игровые константы
const UNIT_TYPES = {
  soldier: { cost: 30, health: 100, damage: 15, range: 150, fireRate: 60, speed: 1.2, color: '#fff', size: 8 },
  sniper: { cost: 50, health: 70, damage: 40, range: 300, fireRate: 120, speed: 0.8, color: '#aaa', size: 7 },
  heavy: { cost: 80, health: 200, damage: 25, range: 120, fireRate: 90, speed: 0.6, color: '#888', size: 10 },
  medic: { cost: 60, health: 90, damage: 5, range: 100, fireRate: 180, speed: 1.0, color: '#ddd', size: 7 }
};

// Игровые переменные
let resources = 100;
let wave = 1;
let waveEnemies = 5;
let enemiesKilled = 0;
let selectedUnitType = 'soldier'; // По умолчанию выбран солдат
let gameTime = 0;
let cameraShake = 0;
let lastSpawnTime = 0;

// Коллекции объектов
const particles = [];
const bullets = [];
const units = [];
const enemies = [];
const effects = [];

// UI элементы
const coinsElement = document.getElementById('coins');
const waveElement = document.getElementById('wave');
const unitsElement = document.getElementById('units');
const waveTextElement = document.getElementById('wave-text');
const selectedUnitElement = document.getElementById('selected-unit');
const selectedUnitNameElement = document.getElementById('selected-unit-name');
const selectedUnitHealthElement = document.getElementById('selected-unit-health');

// Класс частиц
class Particle {
  constructor(x, y, vx, vy, size, life, color = '#fff') {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.size = size;
    this.life = life;
    this.maxLife = life;
    this.color = color;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.05;
    this.life--;
    this.size *= 0.95;
  }

  draw() {
    const alpha = this.life / this.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Класс юнита
class Unit {
  constructor(x, y, type, side) {
    this.x = x;
    this.y = y;
    this.type = type;
    this.side = side;
    this.stats = UNIT_TYPES[type];
    this.health = this.stats.health;
    this.maxHealth = this.stats.health;
    this.reload = 0;
    this.target = null;
    this.id = Math.random();
    this.walkOffset = Math.random() * Math.PI * 2;
    this.rotation = 0;
    this.hitFlash = 0;
  }

  findTarget() {
    const targets = this.side === 'player' ? enemies : units;
    if (targets.length === 0) return null;

    let closest = null;
    let closestDist = this.stats.range;

    for (const target of targets) {
      const dx = target.x - this.x;
      const dy = target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < closestDist) {
        closestDist = dist;
        closest = target;
      }
    }

    return closest;
  }

  update() {
    this.walkOffset += 0.1;

    if (this.hitFlash > 0) this.hitFlash--;

    if (!this.target || this.target.health <= 0) {
      this.target = this.findTarget();
    }

    if (this.target) {
      const dx = this.target.x - this.x;
      const dy = this.target.y - this.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > this.stats.range * 0.8) {
        const angle = Math.atan2(dy, dx);
        this.x += Math.cos(angle) * this.stats.speed;
        this.y += Math.sin(angle) * this.stats.speed;
        this.rotation = angle;
      }

      if (this.reload <= 0 && dist <= this.stats.range) {
        this.shoot();
        this.reload = this.stats.fireRate;
      }
    } else if (this.side === 'player') {
      this.x += this.stats.speed * 0.5;
      this.rotation = 0;
    } else {
      this.x -= this.stats.speed * 0.5;
      this.rotation = Math.PI;
    }

    this.x = Math.max(50, Math.min(width - 50, this.x));
    this.y = Math.max(100, Math.min(height - 150, this.y));

    if (this.reload > 0) this.reload--;

    return this.health > 0;
  }

  shoot() {
    if (!this.target) return;

    const dx = this.target.x - this.x;
    const dy = this.target.y - this.y;
    const angle = Math.atan2(dy, dx);

    bullets.push({
      x: this.x + Math.cos(angle) * this.stats.size,
      y: this.y + Math.sin(angle) * this.stats.size,
      vx: Math.cos(angle) * 10,
      vy: Math.sin(angle) * 10,
      damage: this.stats.damage,
      side: this.side,
      type: this.type
    });

    for (let i = 0; i < 5; i++) {
      const speed = 2 + Math.random() * 2;
      const particleAngle = angle + (Math.random() - 0.5) * 0.5;
      particles.push(new Particle(
        this.x + Math.cos(angle) * this.stats.size,
        this.y + Math.sin(angle) * this.stats.size,
        Math.cos(particleAngle) * speed,
        Math.sin(particleAngle) * speed,
        1 + Math.random() * 2,
        15 + Math.random() * 10,
        this.side === 'player' ? '#fff' : '#888'
      ));
    }
  }

  draw() {
    ctx.save();

    if (this.hitFlash > 0) {
      ctx.filter = 'brightness(2)';
    }

    const drawX = this.x + (Math.random() - 0.5) * cameraShake;
    const drawY = this.y + (Math.random() - 0.5) * cameraShake + Math.sin(this.walkOffset) * 2;

    ctx.translate(drawX, drawY);
    ctx.rotate(this.rotation);

    ctx.fillStyle = this.stats.color;
    ctx.beginPath();
    ctx.arc(0, 0, this.stats.size, 0, Math.PI * 2);
    ctx.fill();

    if (this.type === 'soldier') {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-3, -3, 2, 0, Math.PI * 2);
      ctx.arc(3, -3, 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'sniper') {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(this.stats.size, 0);
      ctx.lineTo(this.stats.size + 5, 0);
      ctx.stroke();
    } else if (this.type === 'heavy') {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(0, 0, this.stats.size * 0.7, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === 'medic') {
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(0, 0, this.stats.size * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -this.stats.size * 0.7);
      ctx.lineTo(0, this.stats.size * 0.7);
      ctx.moveTo(-this.stats.size * 0.7, 0);
      ctx.lineTo(this.stats.size * 0.7, 0);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    ctx.restore();

    if (this.health < this.maxHealth) {
      const barWidth = this.stats.size * 2;
      const barHeight = 2;
      const healthPercent = this.health / this.maxHealth;

      ctx.fillStyle = '#333';
      ctx.fillRect(drawX - barWidth/2, drawY - this.stats.size - 8, barWidth, barHeight);
      ctx.fillStyle = this.side === 'player' ? '#fff' : '#888';
      ctx.fillRect(drawX - barWidth/2, drawY - this.stats.size - 8, barWidth * healthPercent, barHeight);
    }
  }

  takeDamage(amount) {
    this.health -= amount;
    this.hitFlash = 5;

    for (let i = 0; i < 5; i++) {
      particles.push(new Particle(
        this.x + (Math.random() - 0.5) * this.stats.size,
        this.y + (Math.random() - 0.5) * this.stats.size,
        (Math.random() - 0.5) * 4,
        (Math.random() - 0.5) * 4,
        1 + Math.random() * 2,
        10 + Math.random() * 10,
        '#fff'
      ));
    }

    if (this.health <= 0) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(
          this.x,
          this.y,
          (Math.random() - 0.5) * 8,
          (Math.random() - 0.5) * 8,
          2 + Math.random() * 3,
          30 + Math.random() * 20,
          '#fff'
        ));
      }
      cameraShake = 15;
    }

    return this.health <= 0;
  }
}

// Инициализация игры
function init() {
  resources = 100;
  wave = 1;
  waveEnemies = 5;
  enemiesKilled = 0;

  units.length = 0;
  enemies.length = 0;
  bullets.length = 0;
  particles.length = 0;
  effects.length = 0;

  updateUI();
  spawnWave();

  // Сразу выберем солдата
  selectedUnitType = 'soldier';
  updateUnitButtons();
}

// Создание волны врагов
function spawnWave() {
  const enemyTypes = ['soldier', 'sniper', 'heavy'];

  for (let i = 0; i < waveEnemies; i++) {
    const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
    const x = width - 100 - Math.random() * 200;
    const y = 150 + Math.random() * (height - 300);
    enemies.push(new Unit(x, y, type, 'enemy'));
  }

  waveTextElement.textContent = `Wave ${wave} - ${waveEnemies} enemies approaching!`;
  setTimeout(() => {
    waveTextElement.textContent = 'Tap on battlefield to spawn units!';
  }, 3000);
}

// Создание юнита игрока
function spawnPlayerUnit(x, y) {
  if (!selectedUnitType) {
    showMessage("Select a unit type first!");
    return false;
  }

  if (units.length >= 10) {
    showMessage("Max units reached!");
    return false;
  }

  if (resources < UNIT_TYPES[selectedUnitType].cost) {
    showMessage("Not enough resources!");
    return false;
  }

  resources -= UNIT_TYPES[selectedUnitType].cost;
  const unit = new Unit(x, y, selectedUnitType, 'player');
  units.push(unit);

  for (let i = 0; i < 10; i++) {
    particles.push(new Particle(
      x,
      y,
      (Math.random() - 0.5) * 4,
      (Math.random() - 0.5) * 4,
      1 + Math.random() * 2,
      20 + Math.random() * 15,
      '#fff'
    ));
  }

  updateUI();
  return true;
}

// Обновление UI
function updateUI() {
  coinsElement.textContent = resources;
  waveElement.textContent = wave;
  unitsElement.textContent = `${units.length}/10`;
  updateUnitButtons();
}

function updateUnitButtons() {
  document.querySelectorAll('.unit-button').forEach(button => {
    const type = button.dataset.unit;
    const cost = parseInt(button.dataset.cost);

    if (resources < cost) {
      button.style.opacity = '0.5';
    } else {
      button.style.opacity = '1';
    }

    if (type === selectedUnitType) {
      button.classList.add('active');
    } else {
      button.classList.remove('active');
    }
  });
}

// Показать сообщение
function showMessage(text) {
  waveTextElement.textContent = text;
  setTimeout(() => {
    waveTextElement.textContent = 'Tap on battlefield to spawn units!';
  }, 2000);
}

// Обновление игрового состояния
function update() {
  gameTime++;

  if (cameraShake > 0) {
    cameraShake *= 0.9;
    if (cameraShake < 0.1) cameraShake = 0;
  }

  // Обновление частиц
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) {
      particles.splice(i, 1);
    }
  }

  // Обновление пуль
  for (let i = bullets.length - 1; i >= 0; i--) {
    const bullet = bullets[i];
    bullet.x += bullet.vx;
    bullet.y += bullet.vy;

    if (bullet.x < 0 || bullet.x > width || bullet.y < 100 || bullet.y > height - 120) {
      bullets.splice(i, 1);
      continue;
    }

    const targets = bullet.side === 'player' ? enemies : units;
    let hit = false;

    for (let j = targets.length - 1; j >= 0; j--) {
      const target = targets[j];
      const dx = target.x - bullet.x;
      const dy = target.y - bullet.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < target.stats.size + 3) {
        if (target.takeDamage(bullet.damage)) {
          if (bullet.side === 'player') {
            enemiesKilled++;
            resources += 20;

            if (enemiesKilled >= waveEnemies) {
              wave++;
              waveEnemies = 5 + wave * 2;
              enemiesKilled = 0;
              resources += 50;
              showMessage(`Wave ${wave} cleared! +50 resources`);
              setTimeout(spawnWave, 2000);
            }
          }

          if (bullet.side === 'player') {
            enemies.splice(j, 1);
          } else {
            units.splice(j, 1);
          }
        }

        for (let k = 0; k < 8; k++) {
          particles.push(new Particle(
            bullet.x,
            bullet.y,
            (Math.random() - 0.5) * 6,
            (Math.random() - 0.5) * 6,
            1 + Math.random() * 2,
            10 + Math.random() * 10,
            bullet.side === 'player' ? '#fff' : '#888'
          ));
        }

        bullets.splice(i, 1);
        hit = true;
        break;
      }
    }
  }

  // Обновление юнитов игрока
  for (let i = units.length - 1; i >= 0; i--) {
    if (!units[i].update()) {
      units.splice(i, 1);
    }
  }

  // Обновление врагов
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (!enemies[i].update()) {
      enemies.splice(i, 1);
    }
  }

  // Автоматическое спавн врагов
  if (gameTime - lastSpawnTime > 300 && enemies.length < waveEnemies * 0.5) {
    const enemyTypes = ['soldier', 'sniper', 'heavy'];
    const type = enemyTypes[Math.floor(Math.random() * enemyTypes.length)];
    enemies.push(new Unit(width - 50, 150 + Math.random() * (height - 300), type, 'enemy'));
    lastSpawnTime = gameTime;
  }

  // Автоматическое получение ресурсов
  if (gameTime % 180 === 0) {
    resources += 5;
    updateUI();
  }

  // Отладка
  debugElement.innerHTML = `Selected: ${selectedUnitType} | Units: ${units.length} | Enemies: ${enemies.length}`;
}

// Отрисовка игры
function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, width, height);

  drawBackground();

  bullets.forEach(bullet => {
    ctx.fillStyle = bullet.side === 'player' ? '#fff' : '#888';
    ctx.beginPath();
    ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
    ctx.fill();
  });

  enemies.forEach(enemy => enemy.draw());
  units.forEach(unit => unit.draw());
  particles.forEach(particle => particle.draw());

  // Отрисовка сетки для отладки
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  for (let i = 100; i < height - 120; i += 50) {
    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(width, i);
    ctx.stroke();
  }
  for (let i = 50; i < width; i += 50) {
    ctx.beginPath();
    ctx.moveTo(i, 100);
    ctx.lineTo(i, height - 120);
    ctx.stroke();
  }
}

// Отрисовка фона
function drawBackground() {
  if (gameTime % 100 === 0) {
    for (let i = 0; i < 2; i++) {
      particles.push(new Particle(
        Math.random() * width,
        Math.random() * (height - 200) + 100,
        0,
        0,
        Math.random() * 0.5 + 0.2,
        100 + Math.random() * 50,
        '#fff'
      ));
    }
  }

  ctx.fillStyle = '#111';
  ctx.fillRect(0, height - 120, width, 120);

  ctx.fillStyle = '#0a0a0a';
  for (let i = 0; i < width; i += 40) {
    ctx.fillRect(i + (gameTime * 0.3) % 40, height - 120, 20, 10);
  }

  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, width, 80);

  for (let i = 0; i < width; i += 40) {
    ctx.fillRect(i - (gameTime * 0.3) % 40, 70, 20, 10);
  }
}

// Игровой цикл
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Обработка кликов
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  console.log('Click at:', x, y);

  // Проверяем, что клик в игровой области (не на UI)
  if (y > 80 && y < height - 120) {
    console.log('Spawning unit:', selectedUnitType, 'at', x, y);
    const success = spawnPlayerUnit(x, y);
    console.log('Spawn success:', success);

    if (success) {
      console.log('Unit spawned successfully!');
    }
  }
});

// Обработка касаний для мобильных
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;

  console.log('Touch at:', x, y);

  if (y > 80 && y < height - 120) {
    console.log('Spawning unit:', selectedUnitType, 'at', x, y);
    const success = spawnPlayerUnit(x, y);
    console.log('Spawn success:', success);

    if (success) {
      console.log('Unit spawned successfully!');
    }
  }
}, { passive: false });

// Обработка выбора юнита
document.querySelectorAll('.unit-button').forEach(button => {
  button.addEventListener('click', (e) => {
    e.stopPropagation();

    const type = button.dataset.unit;
    const cost = parseInt(button.dataset.cost);

    if (resources >= cost) {
      selectedUnitType = type;
      updateUI();

      selectedUnitNameElement.textContent = type.charAt(0).toUpperCase() + type.slice(1);
      selectedUnitElement.classList.add('show');

      setTimeout(() => {
        selectedUnitElement.classList.remove('show');
      }, 2000);

      showMessage(`Selected: ${type}. Click on battlefield to spawn.`);
    } else {
      showMessage(`Need ${cost} resources for ${type}`);
    }
  });
});

// Обработка изменения размера
window.addEventListener('resize', () => {
  width = window.innerWidth;
  height = window.innerHeight;
  canvas.width = width;
  canvas.height = height;
});

// Запуск игры
init();
gameLoop();
</script>
</body>
</html>
