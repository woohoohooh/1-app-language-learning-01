<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Words - Sentences</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .translation {
            position: absolute;
            top: 100px;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            max-width: 80%;
            pointer-events: none;
        }
        .sentence {
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            max-width: 80%;
            min-height: 100px;
            margin: 20px 0;
            line-height: 1.5;
        }
        .blank {
            display: inline-block;
            width: 100px;
            border-bottom: 2px solid #4caf50;
            text-align: center;
            color: #bbbbbb;
            transition: all 0.3s ease;
        }
        .blank.filled {
            border-bottom: none;
            color: #ffffff;
            font-weight: 700;
        }
        .words-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 80%;
            margin: 20px 0;
        }
        .word {
            padding: 10px 20px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .word:hover {
            transform: scale(1.05);
            border-color: #4caf50;
        }
        .errors {
            font-size: 18px;
            color: #f44336;
            margin-top: 20px;
        }
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-button {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            margin-top: 25px;
            margin-left: 25px;
        }
        .top-area:hover .back-button {
            opacity: 1;
            pointer-events: auto;
        }
        .back-icon {
            font-size: 65px;
            color: #2196f3;
            font-weight: 900;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(33, 150, 243, 0.4));
            opacity: 0.7;
        }
        .back-button:hover .back-icon {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.7));
        }
        .progress-section {
            margin-top: 25px;
            margin-right: 25px;
            text-align: right;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 400px;
        }
        .top-area:hover .progress-section {
            opacity: 1;
            pointer-events: auto;
        }
        .progress-info {
            font-size: 24px;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 600;
            color: #bbbbbb;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-known {
            color: #4caf50;
        }
        .stat-review {
            color: #ff9800;
        }
        .stat-new {
            color: #2196f3;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .sentence {
                font-size: 20px;
            }
            .translation {
                font-size: 16px;
                top: 80px;
            }
            .word {
                font-size: 16px;
                padding: 8px 16px;
            }
            .errors {
                font-size: 16px;
            }
            .progress-info {
                font-size: 20px;
            }
            .progress-stats {
                font-size: 16px;
                gap: 10px;
            }
            .back-button {
                margin-top: 20px;
                margin-left: 20px;
                width: 60px;
                height: 60px;
            }
            .back-icon {
                font-size: 55px;
            }
            .progress-section {
                margin-top: 20px;
                margin-right: 20px;
            }
            .loader-spinner {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>
        <div class="top-area">
            <div class="back-button" id="back-button">
                <div class="back-icon">←</div>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-info" id="progress-info"></div>
                <div class="progress-stats" id="progress-stats"></div>
            </div>
        </div>
        <div class="translation" id="translation"></div>
        <div class="sentence" id="sentence"></div>
        <div class="words-container" id="words-container"></div>
        <div class="errors" id="errors">Errors: 0/3</div>
        <div class="loading" id="loading">Loading words...</div>
    </div>
    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            },
            getListProgress(listId, totalWords) {
                let known = 0;
                let review = 0;
                let newWords = totalWords;
                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith(`word_${listId}_`)) {
                        const status = localStorage.getItem(key);
                        if (status === 'known') known++;
                        if (status === 'review') review++;
                    }
                });
                newWords = totalWords - known - review;
                return { known, review, new: newWords };
            }
        };
        const Utils = {
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            let currentList = null;
            let sentences = [];
            let currentIndex = 0;
            let currentSentence = null;
            let filledIndex = 0;
            let errorCount = 0;
            const translationEl = document.getElementById('translation');
            const sentenceEl = document.getElementById('sentence');
            const wordsContainer = document.getElementById('words-container');
            const errorsEl = document.getElementById('errors');
            const backButton = document.getElementById('back-button');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const progressInfo = document.getElementById('progress-info');
            const progressStats = document.getElementById('progress-stats');
            async function loadList() {
                try {
                    const response = await fetch(listId);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const text = await response.text();
                    currentList = JSON.parse(text);
                    if (!currentList.words || !Array.isArray(currentList.words)) {
                        throw new Error('Invalid list format');
                    }
                    currentList.filename = listId;
                    WordDB.updateListStatus(currentList);
                    const wordsForReview = WordDB.getWordsForReview(currentList);
                    if (wordsForReview.length === 0) {
                        showLoader();
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }
                    prepareSentences();
                    if (sentences.length === 0) {
                        loadingEl.textContent = 'No sentences available.';
                        return;
                    }
                    loadingEl.style.display = 'none';
                    currentIndex = 0;
                    showCurrentSentence();
                    updateProgress();
                } catch (error) {
                    loadingEl.textContent = 'Error loading list.';
                }
            }
            function prepareSentences() {
                sentences = [
                    {
                        parts: ["I ", "{blank}", " that this ", "{blank}", " will ", "{blank}", " the project."],
                        words: ["assume", "approach", "benefit"],
                        translation: "Я предполагаю, что этот подход принесет пользу проекту."
                    },
                    {
                        parts: ["The main ", "{blank}", " is to ", "{blank}", " the ", "{blank}", "."],
                        words: ["concern", "define", "context"],
                        translation: "Основная проблема - определить контекст."
                    },
                    {
                        parts: ["We need to ", "{blank}", " to ", "{blank}", " the ", "{blank}", "."],
                        words: ["contribute", "improve", "outcome"],
                        translation: "Нам нужно внести вклад, чтобы улучшить результат."
                    },
                    {
                        parts: ["Please ", "{blank}", " the ", "{blank}", " and ", "{blank}", " the ", "{blank}", "."],
                        words: ["consider", "factor", "estimate", "impact"],
                        translation: "Пожалуйста, рассмотрите фактор и оцените влияние."
                    },
                    {
                        parts: ["The high ", "{blank}", " will ", "{blank}", " on our ", "{blank}", "."],
                        words: ["demand", "depend", "effective"],
                        translation: "Высокий спрос будет зависеть от нашей эффективности."
                    },
                    {
                        parts: ["We have ", "{blank}", " to ", "{blank}", " the ", "{blank}", "."],
                        words: ["evidence", "expectation", "focus"],
                        translation: "У нас есть доказательства, чтобы ожидать фокуса."
                    },
                    {
                        parts: ["The ", "{blank}", " is to ", "{blank}", " the ", "{blank}", "."],
                        words: ["issue", "limit", "maintain"],
                        translation: "Проблема в том, чтобы ограничить поддержку."
                    },
                    {
                        parts: ["We must ", "{blank}", " the ", "{blank}", " as a ", "{blank}", "."],
                        words: ["measure", "objective", "overall"],
                        translation: "Мы должны измерить цель в целом."
                    },
                    {
                        parts: ["The ", "{blank}", " shows a ", "{blank}", " in the ", "{blank}", "."],
                        words: ["pattern", "priority", "process"],
                        translation: "Шаблон показывает приоритет в процессе."
                    },
                    {
                        parts: ["The ", "{blank}", " includes every ", "{blank}", " and ", "{blank}", "."],
                        words: ["requirement", "resource", "result"],
                        translation: "Требование включает каждый ресурс и результат."
                    },
                    {
                        parts: ["We need to ", "{blank}", " the ", "{blank}", " in this ", "{blank}", "."],
                        words: ["risk", "role", "scope"],
                        translation: "Нам нужно рисковать ролью в этих рамках."
                    },
                    {
                        parts: ["The ", "{blank}", " has a ", "{blank}", " in the ", "{blank}", "."],
                        words: ["strategy", "structure", "support"],
                        translation: "Стратегия имеет структуру в поддержке."
                    },
                    {
                        parts: ["There is a ", "{blank}", " towards ", "{blank}", " and ", "{blank}", "."],
                        words: ["tendency", "trade-off", "trend"],
                        translation: "Есть тенденция к компромиссу и тренду."
                    },
                    {
                        parts: ["The ", "{blank}", " causes ", "{blank}", " in ", "{blank}", "."],
                        words: ["uncertainty", "value", "variation"],
                        translation: "Неопределенность вызывает ценность в вариации."
                    },
                    {
                        parts: ["Our ", "{blank}", " improves the ", "{blank}", "."],
                        words: ["vision", "workflow"],
                        translation: "Наше видение улучшает рабочий процесс."
                    }
                ];
            }
            function showLoader() {
                loaderOverlay.classList.add('active');
            }
            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }
            function showCurrentSentence() {
                if (currentIndex >= sentences.length) {
                    showLoader();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                }
                currentSentence = sentences[currentIndex];
                translationEl.textContent = currentSentence.translation;
                let sentenceHtml = '';
                let blankCount = 0;
                currentSentence.parts.forEach(part => {
                    if (part === "{blank}") {
                        sentenceHtml += `<span class="blank" data-index="${blankCount}">___</span>`;
                        blankCount++;
                    } else {
                        sentenceHtml += `<span>${part}</span>`;
                    }
                });
                sentenceEl.innerHTML = sentenceHtml;
                const shuffledWords = Utils.shuffleArray([...currentSentence.words]);
                wordsContainer.innerHTML = '';
                shuffledWords.forEach(word => {
                    const wordDiv = document.createElement('div');
                    wordDiv.className = 'word';
                    wordDiv.dataset.word = word;
                    wordDiv.textContent = word;
                    wordsContainer.appendChild(wordDiv);
                });
                filledIndex = 0;
                errorCount = 0;
                updateErrors();
                hideLoader();
            }
            function updateErrors() {
                errorsEl.textContent = `Errors: ${errorCount}/3`;
            }
            function updateProgress() {
                if (!currentList) return;
                const total = currentList.words.length;
                const progress = WordDB.getListProgress(currentList.filename, total);
                const remaining = sentences.length - currentIndex;
                const currentPosition = currentIndex + 1;
                progressInfo.textContent = `${currentPosition}/${sentences.length} (${remaining} left)`;
                progressStats.innerHTML = `
                    <div class="stat-item stat-known">
                        <span>✓</span>
                        <span>Known: ${progress.known}</span>
                    </div>
                    <div class="stat-item stat-review">
                        <span>↻</span>
                        <span>Review: ${progress.review}</span>
                    </div>
                    <div class="stat-item stat-new">
                        <span>+</span>
                        <span>New: ${progress.new}</span>
                    </div>
                `;
            }
            function animateFly(fromElem, toElem) {
                const clone = fromElem.cloneNode(true);
                document.body.appendChild(clone);
                const fromRect = fromElem.getBoundingClientRect();
                const toRect = toElem.getBoundingClientRect();
                clone.style.position = 'absolute';
                clone.style.left = `${fromRect.left}px`;
                clone.style.top = `${fromRect.top}px`;
                clone.style.zIndex = '1000';
                clone.style.transition = 'all 0.5s ease';
                setTimeout(() => {
                    clone.style.left = `${toRect.left}px`;
                    clone.style.top = `${toRect.top}px`;
                    clone.style.transform = 'scale(0.8)';
                    clone.style.opacity = '0.5';
                }, 10);
                setTimeout(() => {
                    clone.remove();
                }, 500);
            }
            function fillNextBlank(word) {
                const blanks = sentenceEl.querySelectorAll('.blank');
                const blank = blanks[filledIndex];
                blank.textContent = word;
                blank.classList.add('filled');
                filledIndex++;
                if (filledIndex === currentSentence.words.length) {
                    completeSentence();
                }
            }
            function completeSentence() {
                const fullSentenceSpans = sentenceEl.querySelectorAll('span');
                const fullSentence = Array.from(fullSentenceSpans).map(span => span.textContent).join('');
                const utterance = new SpeechSynthesisUtterance(fullSentence);
                utterance.lang = 'en-US';
                utterance.onend = () => {
                    setTimeout(() => {
                        currentSentence.words.forEach(w => {
                            WordDB.saveWordStatus(currentList.filename, w, 'known');
                        });
                        currentIndex++;
                        updateProgress();
                        showCurrentSentence();
                    }, 1000);
                };
                speechSynthesis.speak(utterance);
            }
            function resetSentence() {
                errorCount = 0;
                filledIndex = 0;
                showCurrentSentence();
            }
            wordsContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('word')) {
                    const clickedWord = e.target.dataset.word;
                    const nextWord = currentSentence.words[filledIndex];
                    const blanks = sentenceEl.querySelectorAll('.blank');
                    const nextBlank = blanks[filledIndex];
                    let flyElem;
                    if (clickedWord === nextWord) {
                        flyElem = e.target;
                        animateFly(flyElem, nextBlank);
                        fillNextBlank(clickedWord);
                    } else {
                        errorCount++;
                        updateErrors();
                        if (errorCount >= 3) {
                            resetSentence();
                            return;
                        }
                        const correctDiv = wordsContainer.querySelector(`.word[data-word="${nextWord}"]`);
                        flyElem = correctDiv;
                        animateFly(flyElem, nextBlank);
                        fillNextBlank(nextWord);
                    }
                    flyElem.remove();
                }
            });
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            loadList();
        });
    </script>
</body>
</html>
