<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Dialogues — Learn English</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        :root{ --header-offset: 0.5cm; --hint-offset: 2cm }

        .container{
            position:relative;
            z-index:2;
            height:100vh;
            display:flex;
            flex-direction:column;
            background:#121212;
        }

        /* Header - скрыт по умолчанию, появляется по клику */
        .header{
            position:fixed;
            top:0;
            left:0;
            right:0;
            height:70px;
            background:rgba(18,18,18,0.95);
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.08);
            display:flex;
            align-items:center;
            justify-content:space-between;
            padding:0 20px;
            z-index:100;
            transform:translateY(-100%);
            transition:transform 0.3s ease;
            padding-top:env(safe-area-inset-top,0px);
        }

        .header.visible{
            transform:translateY(0);
        }

        .nav-button{
            width:44px;
            height:44px;
            border-radius:10px;
            background:rgba(255,255,255,0.05);
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            border:1px solid rgba(255,255,255,0.08);
            transition:all 0.2s;
        }

        .nav-button:hover{
            background:rgba(255,255,255,0.1);
        }

        .nav-button.left:before{
            content:'';
            width:10px;
            height:10px;
            border-left:2px solid #fff;
            border-bottom:2px solid #fff;
            transform:translateX(2px) rotate(45deg);
            display:block;
        }

        .nav-button.right:before{
            content:'';
            width:10px;
            height:10px;
            border-right:2px solid #fff;
            border-bottom:2px solid #fff;
            transform:translateX(-2px) rotate(-45deg);
            display:block;
        }

        .dialogue-title{
            font-weight:700;
            font-size:16px;
            text-align:center;
            flex:1;
            margin:0 15px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .progress{
            color:#aaa;
            font-size:14px;
            font-weight:600;
        }

        /* Основная область диалога */
        .dialogue-container{
            flex:1;
            overflow-y:auto;
            padding:20px;
            padding-top:70px;
            padding-bottom:70px;
            scroll-behavior:smooth;
            -webkit-overflow-scrolling:touch;
        }

        /* Сообщения в стиле чата */
        .message-block{
            margin-bottom:30px;
            opacity:0;
            transform:translateY(20px);
            animation:fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp{
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .message-block.left{
            text-align:left;
        }

        .message-block.right{
            text-align:right;
        }

        .speaker-info{
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:8px;
        }

        .speaker-info.left{
            justify-content:flex-start;
        }

        .speaker-info.right{
            justify-content:flex-end;
            flex-direction:row-reverse;
        }

        .avatar{
            width:40px;
            height:40px;
            border-radius:50%;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            font-size:16px;
            color:white;
            flex-shrink:0;
        }

        .speaker-details{
            display:flex;
            flex-direction:column;
        }

        .speaker-name{
            font-weight:700;
            font-size:15px;
        }

        .speaker-role{
            font-size:12px;
            color:#aaa;
        }

        .message-bubble{
            max-width:85%;
            padding:16px 20px;
            border-radius:20px;
            position:relative;
            line-height:1.5;
            font-size:16px;
        }

        .message-bubble.left{
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            margin-left:52px;
        }

        .message-bubble.right{
            background:linear-gradient(135deg,rgba(76,175,80,0.15),rgba(76,175,80,0.08));
            border:1px solid rgba(76,175,80,0.15);
            margin-right:52px;
        }

        .message-text{
            cursor:pointer;
            user-select:none;
        }

        .message-translation{
            margin-top:10px;
            padding-top:10px;
            border-top:1px solid rgba(255,255,255,0.1);
            color:#4caf50;
            font-style:italic;
            font-size:15px;
            display:none;
        }

        .message-translation.visible{
            display:block;
        }

        /* Футер с подсказками - скрыт по умолчанию */
        .footer{
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            padding:15px 20px;
            background:rgba(18,18,18,0.95);
            backdrop-filter:blur(10px);
            border-top:1px solid rgba(255,255,255,0.08);
            text-align:center;
            z-index:100;
            transform:translateY(100%);
            transition:transform 0.3s ease;
            padding-bottom:calc(15px + env(safe-area-inset-bottom,0px));
        }

        .footer.visible{
            transform:translateY(0);
        }

        .hint-text{
            color:#aaa;
            font-size:14px;
            margin-bottom:10px;
        }

        .target-words{
            display:flex;
            gap:8px;
            justify-content:center;
            flex-wrap:wrap;
        }

        .word-tag{
            padding:4px 12px;
            background:rgba(255,152,0,0.15);
            border-radius:12px;
            font-size:13px;
            color:#ff9800;
            border:1px solid rgba(255,152,0,0.3);
        }

        /* Loading */
        .loading{
            position:fixed;
            top:0;
            left:0;
            right:0;
            bottom:0;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:18px;
            color:#aaa;
            z-index:1000;
            background:#121212;
        }

        /* Анимация появления сообщений с задержкой */
        .message-block:nth-child(1){ animation-delay:0.1s; }
        .message-block:nth-child(2){ animation-delay:0.2s; }
        .message-block:nth-child(3){ animation-delay:0.3s; }
        .message-block:nth-child(4){ animation-delay:0.4s; }
        .message-block:nth-child(5){ animation-delay:0.5s; }
        .message-block:nth-child(6){ animation-delay:0.6s; }
        .message-block:nth-child(7){ animation-delay:0.7s; }
        .message-block:nth-child(8){ animation-delay:0.8s; }

        /* Адаптив */
        @media (max-width:768px){
            .message-bubble{
                max-width:90%;
                padding:14px 18px;
                font-size:15px;
            }

            .dialogue-container{
                padding:15px;
                padding-top:70px;
                padding-bottom:70px;
            }

            .avatar{
                width:36px;
                height:36px;
                font-size:14px;
            }

            .message-bubble.left{
                margin-left:48px;
            }

            .message-bubble.right{
                margin-right:48px;
            }
        }
    </style>
</head>
<body>
    <!-- Header - появляется по клику -->
    <div class="header" id="header">
        <div class="nav-button left" id="prev-btn" title="Previous dialogue"></div>
        <div class="dialogue-title" id="dialogue-title">Loading...</div>
        <div class="progress" id="progress">1/1</div>
        <div class="nav-button right" id="next-btn" title="Next dialogue"></div>
    </div>

    <!-- Основной контент - диалог -->
    <div class="container">
        <div class="dialogue-container" id="dialogue-container">
            <!-- Сообщения будут добавлены сюда -->
        </div>
    </div>

    <!-- Footer - появляется по клику -->
    <div class="footer" id="footer">
        <div class="hint-text">Tap on any line to see translation</div>
        <div class="target-words" id="target-words">
            <!-- Целевые слова будут добавлены сюда -->
        </div>
    </div>

    <!-- Загрузка -->
    <div class="loading" id="loading">Loading dialogue...</div>

    <script>
    // Элементы DOM
    const header = document.getElementById('header');
    const footer = document.getElementById('footer');
    const dialogueContainer = document.getElementById('dialogue-container');
    const dialogueTitle = document.getElementById('dialogue-title');
    const progressEl = document.getElementById('progress');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const targetWordsEl = document.getElementById('target-words');
    const loading = document.getElementById('loading');

    // Данные
    let allDialogues = [];
    let currentDialogueIndex = 0;
    let currentDialogue = null;

    // Состояние UI
    let isUIVisible = false;
    let audioEnabled = true;

    // Инициализация
    async function init() {
        try {
            // Загружаем список диалогов
            const response = await fetch('dialogs.json');
            if (!response.ok) throw new Error('Failed to load dialogs.json');

            const dialogsList = await response.json();
            allDialogues = dialogsList.items;

            if (allDialogues.length === 0) {
                showError('No dialogues found');
                return;
            }

            // Загружаем первый диалог
            await loadDialogue(currentDialogueIndex);

            // Скрываем загрузку
            setTimeout(() => {
                loading.style.display = 'none';
            }, 500);

        } catch (error) {
            console.error('Initialization error:', error);
            showError('Failed to load dialogues');
        }
    }

    // Загрузка диалога по индексу
    async function loadDialogue(index) {
        if (index < 0 || index >= allDialogues.length) return;

        loading.style.display = 'flex';
        currentDialogueIndex = index;

        try {
            const dialogueInfo = allDialogues[index];
            const response = await fetch(dialogueInfo.file);
            if (!response.ok) throw new Error('Failed to load dialogue file');

            currentDialogue = await response.json();
            renderDialogue();
            updateUI();

            // Автовоспроизведение аудио
            if (audioEnabled) {
                setTimeout(() => {
                    playDialogueAudio();
                }, 800);
            }

        } catch (error) {
            console.error('Error loading dialogue:', error);
            showError('Failed to load dialogue');
        } finally {
            loading.style.display = 'none';
        }
    }

    // Отображение диалога
    function renderDialogue() {
        if (!currentDialogue) return;

        // Очищаем контейнер
        dialogueContainer.innerHTML = '';

        // Устанавливаем заголовок
        dialogueTitle.textContent = currentDialogue.theme || 'Dialogue';

        // Определяем персонажей
        const characters = currentDialogue.characters || {};
        const charNames = Object.keys(characters);

        // Рендерим каждую реплику
        currentDialogue.dialogue.forEach((line, index) => {
            const isLeft = line.speaker === charNames[0];

            const messageBlock = document.createElement('div');
            messageBlock.className = `message-block ${isLeft ? 'left' : 'right'}`;
            messageBlock.style.animationDelay = `${(index * 0.1) + 0.2}s`;

            const speakerInfo = document.createElement('div');
            speakerInfo.className = `speaker-info ${isLeft ? 'left' : 'right'}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = line.speaker ? line.speaker.charAt(0) : '?';

            const speakerDetails = document.createElement('div');
            speakerDetails.className = 'speaker-details';

            const speakerName = document.createElement('div');
            speakerName.className = 'speaker-name';
            speakerName.textContent = line.speaker || 'Unknown';

            const speakerRole = document.createElement('div');
            speakerRole.className = 'speaker-role';
            const charInfo = characters[line.speaker];
            speakerRole.textContent = charInfo ? charInfo.role : '';

            speakerDetails.appendChild(speakerName);
            speakerDetails.appendChild(speakerRole);
            speakerInfo.appendChild(avatar);
            speakerInfo.appendChild(speakerDetails);

            const messageBubble = document.createElement('div');
            messageBubble.className = `message-bubble ${isLeft ? 'left' : 'right'}`;

            const messageText = document.createElement('div');
            messageText.className = 'message-text';
            messageText.textContent = line.en;
            messageText.dataset.translation = line.ru || '';

            // Обработчик клика для показа перевода
            messageText.addEventListener('click', function() {
                const translation = this.nextElementSibling;
                translation.classList.toggle('visible');

                // Прокручиваем к переводу
                setTimeout(() => {
                    translation.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 10);
            });

            const messageTranslation = document.createElement('div');
            messageTranslation.className = 'message-translation';
            messageTranslation.textContent = line.ru || '';

            messageBubble.appendChild(messageText);
            messageBubble.appendChild(messageTranslation);

            messageBlock.appendChild(speakerInfo);
            messageBlock.appendChild(messageBubble);
            dialogueContainer.appendChild(messageBlock);
        });

        // Рендерим целевые слова
        renderTargetWords();
    }

    // Рендерим целевые слова в футере
    function renderTargetWords() {
        if (!currentDialogue) return;

        targetWordsEl.innerHTML = '';
        const targetWords = currentDialogue.target_words || [];

        targetWords.forEach(word => {
            const wordTag = document.createElement('div');
            wordTag.className = 'word-tag';
            wordTag.textContent = word;
            targetWordsEl.appendChild(wordTag);
        });
    }

    // Обновление UI
    function updateUI() {
        // Прогресс
        progressEl.textContent = `${currentDialogueIndex + 1}/${allDialogues.length}`;

        // Кнопки навигации
        prevBtn.style.opacity = currentDialogueIndex === 0 ? '0.3' : '1';
        prevBtn.style.pointerEvents = currentDialogueIndex === 0 ? 'none' : 'auto';

        nextBtn.style.opacity = currentDialogueIndex === allDialogues.length - 1 ? '0.3' : '1';
        nextBtn.style.pointerEvents = currentDialogueIndex === allDialogues.length - 1 ? 'none' : 'auto';
    }

    // Воспроизведение аудио диалога
    async function playDialogueAudio() {
        if (!currentDialogue || !audioEnabled) return;

        // Временная заглушка - будет заменена на реальное аудио
        console.log('Playing dialogue audio...');

        // Здесь будет логика воспроизведения аудиофайлов диалога
        // Например, последовательное воспроизведение каждой реплики
    }

    // Показать ошибку
    function showError(message) {
        dialogueContainer.innerHTML = `
            <div style="text-align:center; padding:50px 20px; color:#ff6b6b;">
                <div style="font-size:24px; margin-bottom:20px;">⚠️</div>
                <div style="font-size:18px; margin-bottom:10px;">Error</div>
                <div style="color:#aaa;">${message}</div>
                <button onclick="window.location.href='index.html'" style="margin-top:30px; padding:10px 20px; background:#4caf50; border:none; border-radius:10px; color:white; cursor:pointer;">Go Back</button>
            </div>
        `;
        loading.style.display = 'none';
    }

    // Обработчики событий

    // Переключение видимости UI по клику на диалог
    dialogueContainer.addEventListener('click', (e) => {
        // Не показываем UI если кликнули на текст сообщения (там свой обработчик)
        if (e.target.classList.contains('message-text')) return;

        isUIVisible = !isUIVisible;
        if (isUIVisible) {
            header.classList.add('visible');
            footer.classList.add('visible');
        } else {
            header.classList.remove('visible');
            footer.classList.remove('visible');
        }
    });

    // Навигация
    prevBtn.addEventListener('click', () => {
        if (currentDialogueIndex > 0) {
            loadDialogue(currentDialogueIndex - 1);
        }
    });

    nextBtn.addEventListener('click', () => {
        if (currentDialogueIndex < allDialogues.length - 1) {
            loadDialogue(currentDialogueIndex + 1);
        }
    });

    // Горячие клавиши
    document.addEventListener('keydown', (e) => {
        // Стрелки влево/вправо для навигации
        if (e.key === 'ArrowLeft' || e.key === 'a') {
            if (currentDialogueIndex > 0) {
                loadDialogue(currentDialogueIndex - 1);
            }
        } else if (e.key === 'ArrowRight' || e.key === 'd') {
            if (currentDialogueIndex < allDialogues.length - 1) {
                loadDialogue(currentDialogueIndex + 1);
            }
        }

        // Пробел для показа/скрытия UI
        if (e.key === ' ') {
            e.preventDefault();
            isUIVisible = !isUIVisible;
            if (isUIVisible) {
                header.classList.add('visible');
                footer.classList.add('visible');
            } else {
                header.classList.remove('visible');
                footer.classList.remove('visible');
            }
        }
    });

    // Swipe для мобильных устройств
    let touchStartX = 0;
    let touchEndX = 0;

    dialogueContainer.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    dialogueContainer.addEventListener('touchend', (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    }, { passive: true });

    function handleSwipe() {
        const swipeThreshold = 50;
        const diff = touchStartX - touchEndX;

        if (Math.abs(diff) > swipeThreshold) {
            if (diff > 0) {
                // Swipe left - next dialogue
                if (currentDialogueIndex < allDialogues.length - 1) {
                    loadDialogue(currentDialogueIndex + 1);
                }
            } else {
                // Swipe right - previous dialogue
                if (currentDialogueIndex > 0) {
                    loadDialogue(currentDialogueIndex - 1);
                }
            }
        }
    }

    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', init);

    // Edge swipe для возврата назад
    document.addEventListener('touchstart', (e) => {
        if (e.touches[0].clientX <= 20) {
            touchStartX = e.touches[0].clientX;
        }
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        if (touchStartX <= 20 && e.changedTouches[0].clientX <= 60) {
            window.location.href = 'index.html';
        }
        touchStartX = 0;
    }, { passive: true });
    </script>
</body>
</html>
