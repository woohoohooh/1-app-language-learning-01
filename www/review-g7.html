<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Tic-Tac-Toe | Крестики-нолики</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --accent: #fd79a8;
            --dark: #2d3436;
            --light: #f9f9f9;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e17055;
            --cell-size: min(28vw, 120px);
            --neon-glow: 0 0 10px, 0 0 20px, 0 0 30px;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a1a2e 100%);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 20% 30%, rgba(108, 92, 231, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(253, 121, 168, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.8rem;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(108, 92, 231, 0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-bottom: 10px;
            font-weight: 300;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .player.active {
            background: rgba(108, 92, 231, 0.2);
            box-shadow: 0 0 15px rgba(108, 92, 231, 0.4);
        }

        .player-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .player-x .player-icon {
            color: var(--accent);
            text-shadow: var(--neon-glow) rgba(253, 121, 168, 0.7);
        }

        .player-o .player-icon {
            color: var(--success);
            text-shadow: var(--neon-glow) rgba(0, 184, 148, 0.7);
        }

        .player-name {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .player-score {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            margin-top: 5px;
        }

        .vs {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--warning);
            padding: 0 10px;
            font-size: 1.2rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 20px;
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .cell.x {
            color: var(--accent);
            text-shadow: var(--neon-glow) rgba(253, 121, 168, 0.7);
        }

        .cell.o {
            color: var(--success);
            text-shadow: var(--neon-glow) rgba(0, 184, 148, 0.7);
        }

        .cell.win {
            animation: pulse-win 1.5s infinite alternate;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-win {
            0% { box-shadow: 0 0 10px rgba(0, 184, 148, 0.5); }
            100% { box-shadow: 0 0 30px rgba(0, 184, 148, 0.8); }
        }

        .win-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--warning), transparent);
            z-index: 10;
            opacity: 0;
            border-radius: 10px;
            box-shadow: 0 0 20px var(--warning);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex: 1;
            max-width: 200px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-reset {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
        }

        .btn-reset:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-new-game {
            background: linear-gradient(to right, var(--accent), #ff7675);
            color: white;
        }

        .btn-new-game:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(253, 121, 168, 0.4);
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(45, 52, 54, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            width: 85%;
            max-width: 400px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .message h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            background: linear-gradient(to right, var(--warning), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .message p {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .message .winner-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .message-x .winner-icon {
            color: var(--accent);
            text-shadow: var(--neon-glow) rgba(253, 121, 168, 0.7);
        }

        .message-o .winner-icon {
            color: var(--success);
            text-shadow: var(--neon-glow) rgba(0, 184, 148, 0.7);
        }

        .message-draw .winner-icon {
            color: var(--warning);
            text-shadow: var(--neon-glow) rgba(253, 203, 110, 0.7);
        }

        .btn-close {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-family: 'Exo 2', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-close:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Анимации для символов */
        @keyframes pop-in {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        .cell.x::before, .cell.o::before {
            animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Адаптация для очень маленьких экранов */
        @media (max-height: 700px) {
            h1 { font-size: 2.2rem; }
            .cell { font-size: 2.8rem; }
            .game-info { margin-bottom: 15px; padding: 12px; }
            .game-board { margin-bottom: 20px; padding: 15px; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 2.2rem; }
            .cell { font-size: 2.8rem; }
            .btn { padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NEON TIC-TAC-TOE</h1>
            <p class="subtitle">Современная версия классической игры</p>
        </header>

        <div class="game-info">
            <div class="player player-x active" id="player-x">
                <div class="player-icon"><i class="fas fa-times"></i></div>
                <div class="player-name">Игрок X</div>
                <div class="player-score" id="score-x">0</div>
            </div>

            <div class="vs">VS</div>

            <div class="player player-o" id="player-o">
                <div class="player-icon"><i class="far fa-circle"></i></div>
                <div class="player-name">Игрок O</div>
                <div class="player-score" id="score-o">0</div>
            </div>
        </div>

        <div class="game-board" id="game-board">
            <!-- Игровое поле будет сгенерировано через JS -->
            <div class="win-line" id="win-line"></div>
        </div>

        <div class="controls">
            <button class="btn btn-reset" id="reset-round">
                <i class="fas fa-redo"></i> Новый раунд
            </button>
            <button class="btn btn-new-game" id="new-game">
                <i class="fas fa-gamepad"></i> Новая игра
            </button>
        </div>

        <div class="footer">
            Создано специально для Play Google | Адаптивный дизайн
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="message" id="message">
        <div class="winner-icon" id="winner-icon"></div>
        <h2 id="message-title">Победа!</h2>
        <p id="message-text">Игрок X победил в этом раунде!</p>
        <button class="btn-close" id="close-message">Продолжить игру</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Элементы DOM
            const gameBoard = document.getElementById('game-board');
            const cells = [];
            const playerX = document.getElementById('player-x');
            const playerO = document.getElementById('player-o');
            const scoreX = document.getElementById('score-x');
            const scoreO = document.getElementById('score-o');
            const resetRoundBtn = document.getElementById('reset-round');
            const newGameBtn = document.getElementById('new-game');
            const message = document.getElementById('message');
            const overlay = document.getElementById('overlay');
            const closeMessageBtn = document.getElementById('close-message');
            const messageTitle = document.getElementById('message-title');
            const messageText = document.getElementById('message-text');
            const winnerIcon = document.getElementById('winner-icon');
            const winLine = document.getElementById('win-line');

            // Состояние игры
            let gameState = ['', '', '', '', '', '', '', '', ''];
            let currentPlayer = 'X';
            let gameActive = true;
            let scores = { X: 0, O: 0, draws: 0 };
            let winCombo = null;

            // Комбинации для победы
            const winConditions = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Горизонтали
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Вертикали
                [0, 4, 8], [2, 4, 6]             // Диагонали
            ];

            // Инициализация игрового поля
            function initBoard() {
                gameBoard.innerHTML = '';
                cells.length = 0;

                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.setAttribute('data-index', i);

                    cell.addEventListener('click', () => handleCellClick(i));

                    gameBoard.appendChild(cell);
                    cells.push(cell);
                }

                // Добавляем линию победы обратно
                gameBoard.appendChild(winLine);

                resetGameState();
            }

            // Сброс состояния игры
            function resetGameState() {
                gameState = ['', '', '', '', '', '', '', '', ''];
                gameActive = true;
                winCombo = null;

                cells.forEach(cell => {
                    cell.classList.remove('x', 'o', 'win');
                    cell.textContent = '';
                });

                winLine.style.opacity = '0';
                updatePlayerIndicator();
            }

            // Обработка клика по ячейке
            function handleCellClick(index) {
                if (!gameActive || gameState[index] !== '') return;

                // Добавляем символ в состояние игры
                gameState[index] = currentPlayer;
                cells[index].textContent = currentPlayer;
                cells[index].classList.add(currentPlayer.toLowerCase());

                // Проверяем на победу
                if (checkWin()) {
                    handleWin();
                    return;
                }

                // Проверяем на ничью
                if (checkDraw()) {
                    handleDraw();
                    return;
                }

                // Меняем игрока
                currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                updatePlayerIndicator();
            }

            // Проверка на победу
            function checkWin() {
                for (let condition of winConditions) {
                    const [a, b, c] = condition;

                    if (
                        gameState[a] &&
                        gameState[a] === gameState[b] &&
                        gameState[a] === gameState[c]
                    ) {
                        winCombo = condition;
                        return true;
                    }
                }
                return false;
            }

            // Проверка на ничью
            function checkDraw() {
                return !gameState.includes('');
            }

            // Обработка победы
            function handleWin() {
                gameActive = false;

                // Подсвечиваем выигрышную комбинацию
                winCombo.forEach(index => {
                    cells[index].classList.add('win');
                });

                // Рисуем линию победы
                drawWinLine();

                // Обновляем счет
                scores[currentPlayer]++;
                updateScoreDisplay();

                // Показываем сообщение о победе
                showMessage(
                    'Победа!',
                    `Игрок ${currentPlayer} победил в этом раунде!`,
                    currentPlayer
                );
            }

            // Обработка ничьи
            function handleDraw() {
                gameActive = false;
                scores.draws++;

                showMessage(
                    'Ничья!',
                    'Никто не победил. Попробуйте еще раз!',
                    'draw'
                );
            }

            // Рисуем линию победы
            function drawWinLine() {
                if (!winCombo) return;

                // Определяем ориентацию линии
                const [a, b, c] = winCombo;
                const isHorizontal = (a >= 0 && a <= 2 && b >= 0 && b <= 2 && c >= 0 && c <= 2) ||
                                   (a >= 3 && a <= 5 && b >= 3 && b <= 5 && c >= 3 && c <= 5) ||
                                   (a >= 6 && a <= 8 && b >= 6 && b <= 8 && c >= 6 && c <= 8);

                const isVertical = (a % 3 === 0 && b % 3 === 0 && c % 3 === 0) ||
                                 (a % 3 === 1 && b % 3 === 1 && c % 3 === 1) ||
                                 (a % 3 === 2 && b % 3 === 2 && c % 3 === 2);

                const cellRect = cells[a].getBoundingClientRect();
                const boardRect = gameBoard.getBoundingClientRect();

                // Настройки линии
                let width, height, top, left;

                if (isHorizontal) {
                    width = cells[c].getBoundingClientRect().right - cells[a].getBoundingClientRect().left;
                    height = 8;
                    top = cellRect.top + cellRect.height / 2 - height / 2 - boardRect.top;
                    left = cells[a].getBoundingClientRect().left - boardRect.left;
                } else if (isVertical) {
                    width = 8;
                    height = cells[c].getBoundingClientRect().bottom - cells[a].getBoundingClientRect().top;
                    top = cells[a].getBoundingClientRect().top - boardRect.top;
                    left = cellRect.left + cellRect.width / 2 - width / 2 - boardRect.left;
                } else {
                    // Диагональ
                    width = Math.sqrt(
                        Math.pow(cells[c].getBoundingClientRect().left - cells[a].getBoundingClientRect().left, 2) +
                        Math.pow(cells[c].getBoundingClientRect().top - cells[a].getBoundingClientRect().top, 2)
                    );
                    height = 8;

                    const angle = Math.atan2(
                        cells[c].getBoundingClientRect().top - cells[a].getBoundingClientRect().top,
                        cells[c].getBoundingClientRect().left - cells[a].getBoundingClientRect().left
                    ) * 180 / Math.PI;

                    top = cells[a].getBoundingClientRect().top + cellRect.height / 2 - boardRect.top;
                    left = cells[a].getBoundingClientRect().left - boardRect.left;

                    winLine.style.transform = `rotate(${angle}deg)`;
                    winLine.style.transformOrigin = 'top left';
                }

                // Применяем стили
                winLine.style.width = `${width}px`;
                winLine.style.height = `${height}px`;
                winLine.style.top = `${top}px`;
                winLine.style.left = `${left}px`;
                winLine.style.opacity = '1';
            }

            // Обновление индикатора текущего игрока
            function updatePlayerIndicator() {
                if (currentPlayer === 'X') {
                    playerX.classList.add('active');
                    playerO.classList.remove('active');
                } else {
                    playerO.classList.add('active');
                    playerX.classList.remove('active');
                }
            }

            // Обновление счета
            function updateScoreDisplay() {
                scoreX.textContent = scores.X;
                scoreO.textContent = scores.O;
            }

            // Показать сообщение
            function showMessage(title, text, winner) {
                messageTitle.textContent = title;
                messageText.textContent = text;

                // Устанавливаем иконку победителя
                if (winner === 'X') {
                    winnerIcon.innerHTML = '<i class="fas fa-times"></i>';
                    message.classList.remove('message-o', 'message-draw');
                    message.classList.add('message-x');
                } else if (winner === 'O') {
                    winnerIcon.innerHTML = '<i class="far fa-circle"></i>';
                    message.classList.remove('message-x', 'message-draw');
                    message.classList.add('message-o');
                } else {
                    winnerIcon.innerHTML = '<i class="fas fa-handshake"></i>';
                    message.classList.remove('message-x', 'message-o');
                    message.classList.add('message-draw');
                }

                // Показываем сообщение
                message.classList.add('show');
                overlay.classList.add('show');
            }

            // Закрыть сообщение
            function closeMessage() {
                message.classList.remove('show');
                overlay.classList.remove('show');
                resetGameState();
            }

            // Новая игра (сброс счета)
            function newGame() {
                scores = { X: 0, O: 0, draws: 0 };
                updateScoreDisplay();
                resetGameState();
            }

            // Обработчики событий
            resetRoundBtn.addEventListener('click', resetGameState);
            newGameBtn.addEventListener('click', newGame);
            closeMessageBtn.addEventListener('click', closeMessage);
            overlay.addEventListener('click', closeMessage);

            // Инициализация
            initBoard();
            updateScoreDisplay();

            // Добавляем эффект наведения для кнопок на мобильных устройствах
            document.querySelectorAll('.btn, .cell').forEach(element => {
                element.addEventListener('touchstart', function() {
                    this.style.transform = 'translateY(-3px)';
                });

                element.addEventListener('touchend', function() {
                    this.style.transform = 'translateY(0)';
                });
            });
        });
    </script>
</body>
</html>
