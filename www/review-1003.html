<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review — variant 1003 (tiny english + big translation on drag)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        .container{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .word-small{font-size:28px;font-weight:700;color:#ddd}
        .word-big{font-size:64px;font-weight:800;opacity:0;transition:opacity .12s;color:#4caf50}
        .top-area{position:absolute;top:0;left:0;right:0;height:72px;display:flex;align-items:center;z-index:3}
    </style>
</head>
<body>
    <div class="top-area"><div style="width:48px"></div><div style="text-align:center">Review Words</div><div id="progress" style="color:#aaa"></div></div>
    <div class="container">
        <div id="wordSmall" class="word-small">Loading...</div>
        <div id="wordBig" class="word-big"></div>
    </div>
    <script>
    const params = new URLSearchParams(window.location.search); const listId=params.get('list');
    async function fetchJson(p){try{const r=await fetch(p); if(!r.ok) return null; return await r.json();}catch(e){return null}}
    let words=[], i=0; async function load(){ const r=decodeURIComponent(listId||''); let l=await fetchJson(r)||await fetchJson(`english/${r}`); if(!l){ wordSmall.textContent='Error'; return;} words=l.words||[]; show(); }
    function play(w){ try{ let a=new Audio((w.audio&&w.audio[0])||`audio/${w.english.toLowerCase().replace(/[^a-z0-9]/g,'_')}.wav`); a.play().catch(()=>{});}catch(e){} }
    const small=document.getElementById('wordSmall'), big=document.getElementById('wordBig'); function show(){ const w=words[i]; small.textContent=w.english; big.textContent=''; big.style.opacity='0'; play(w); document.getElementById('progress').textContent=`${i+1}/${words.length}`; }
    // drag: on start show big translation center, create draggable token
    let active=false, sx=0, sy=0, lx=0, ly=0; const START=2, TH=40; function down(e){ const p=(e.touches&&e.touches[0])||e; sx=p.clientX; sy=p.clientY; lx=sx; ly=sy; active=false; }
    function mv(e){ if(sx==null) return; const p=(e.touches&&e.touches[0])||e; const dx=p.clientX-sx, dy=p.clientY-sy; lx=p.clientX; ly=p.clientY; if(!active && Math.max(Math.abs(dx),Math.abs(dy))>=START){ active=true; const w=words[i]; big.textContent=w.translation||w.russian||''; big.style.opacity='1'; createToken(w.english); } if(active){ moveToken(lx,ly); }}
    function up(e){ if(sx==null) return; if(!active){ document.querySelector('.top-area').classList.toggle('hidden-ui'); sx=null; return;} const dx=lx-sx, dy=ly-sy; if(Math.abs(dx)<TH && Math.abs(dy)<TH){ hideToken(); big.style.opacity='1'; sx=null; return; } flyAway(dx,dy); setTimeout(()=>{ i++; if(i>=words.length){ small.textContent='Done'; return;} hideToken(); show(); },320); sx=null; }
    // token helpers
    let token=null; function createToken(text){ if(token) return; token=document.createElement('div'); token.style.position='fixed'; token.style.pointerEvents='none'; token.style.zIndex=9999; token.style.left='50%'; token.style.top='50%'; token.style.transform='translate(-50%,-50%)'; token.style.fontSize='28px'; token.style.fontWeight='800'; token.style.color='#fff'; token.textContent=text; document.body.appendChild(token); token.style.opacity='1'; }
    function moveToken(x,y){ if(!token) return; token.style.left=`${x}px`; token.style.top=`${y}px`; }
    function hideToken(){ if(token){ token.style.opacity='0'; setTimeout(()=>{ token.remove(); token=null; },180); }}
    function flyAway(dx,dy){ if(!token) return; token.style.transition='transform .32s ease,opacity .22s'; const ox=(dx>0?1:-1)*(window.innerWidth+200); const oy=(dy>0?1:-1)*(window.innerHeight+200); token.style.transform=`translate(${ox}px, ${oy}px)`; token.style.opacity='0'; }
    window.addEventListener('mousedown',down); window.addEventListener('touchstart',down,{passive:false}); window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:false}); window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    load();
    </script>
</body>
</html>
