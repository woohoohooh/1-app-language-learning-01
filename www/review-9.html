    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Words - Sentence Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 20px;
        }
        .translation-behind {
            position: relative;
            font-size: 20px;
            font-weight: 600;
            color: #4caf50;
            opacity: 0.4;
            transition: opacity 0.2s ease;
            pointer-events: none;
            text-align: center;
            width: 80%;
            max-width: 600px;
            margin: 20px 0;
            padding: 10px;
            z-index: 3;
        }
        .translation-behind.show {
            opacity: 0.4;
        }
        .sentence-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100px;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin: 20px 0;
            width: 80%;
            max-width: 600px;
            gap: 5px;
            text-align: center;
        }
        .word-in-sentence {
            margin: 0 3px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .words-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            width: 80%;
            max-width: 600px;
        }
        .word-option {
            padding: 10px 20px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .word-option:hover {
            transform: scale(1.05);
            border-color: #4caf50;
        }
        .error-counter {
            font-size: 18px;
            font-weight: 600;
            color: #bbbbbb;
            margin: 20px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .error-counter span.icon {
            font-size: 22px;
            color: #f44336;
        }
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-button {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            margin-top: 25px;
            margin-left: 25px;
        }
        .top-area:hover .back-button {
            opacity: 1;
            pointer-events: auto;
        }
        .back-icon {
            font-size: 65px;
            color: #2196f3;
            font-weight: 900;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(33, 150, 243, 0.4));
            opacity: 0.7;
        }
        .back-button:hover .back-icon {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.7));
        }
        .progress-section {
            margin-top: 25px;
            margin-right: 25px;
            text-align: right;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 400px;
        }
        .top-area:hover .progress-section {
            opacity: 1;
            pointer-events: auto;
        }
        .progress-info {
            font-size: 24px;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 600;
            color: #bbbbbb;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-known {
            color: #4caf50;
        }
        .stat-review {
            color: #ff9800;
        }
        .stat-new {
            color: #2196f3;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .sentence-container {
                font-size: 20px;
            }
            .word-option {
                font-size: 18px;
                padding: 8px 16px;
            }
            .translation-behind {
                font-size: 18px;
            }
            .progress-info {
                font-size: 20px;
            }
            .progress-stats {
                font-size: 16px;
                gap: 10px;
            }
            .back-button {
                margin-top: 20px;
                margin-left: 20px;
                width: 60px;
                height: 60px;
            }
            .back-icon {
                font-size: 55px;
            }
            .progress-section {
                margin-top: 20px;
                margin-right: 20px;
            }
            .loader-spinner {
                width: 50px;
                height: 50px;
            }
            .error-counter {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>
        <div class="top-area">
            <div class="back-button" id="back-button">
                <div class="back-icon">←</div>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-info" id="progress-info"></div>
                <div class="progress-stats" id="progress-stats"></div>
            </div>
        </div>
        <div class="translation-behind" id="translation-behind"></div>
        <div class="sentence-container" id="sentence-container"></div>
        <div class="error-counter" id="error-counter"><span class="icon">❌</span>Errors: 0/3</div>
        <div class="words-pool" id="words-pool"></div>
        <div class="loading" id="loading">Loading words...</div>
    </div>
    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            },
            getListProgress(listId, totalWords) {
                let known = 0;
                let review = 0;
                let newWords = totalWords;
                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith(`word_${listId}_`)) {
                        const status = localStorage.getItem(key);
                        if (status === 'known') known++;
                        if (status === 'review') review++;
                    }
                });
                newWords = totalWords - known - review;
                return { known, review, new: newWords };
            }
        };
        const Utils = {
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },
            getRandomAudioFile(audioArray) {
                if (!audioArray || audioArray.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * audioArray.length);
                return audioArray[randomIndex];
            }
        };
        const AudioManager = {
            currentAudio: null,
            isPlaying: false,
            async playAudio(audioFiles) {
                await this.stopAudio();
                const audioFile = Utils.getRandomAudioFile(audioFiles);
                if (!audioFile) return;
                this.currentAudio = new Audio(audioFile);
                return new Promise((resolve, reject) => {
                    this.currentAudio.addEventListener('ended', () => {
                        this.isPlaying = false;
                        resolve();
                    });
                    this.currentAudio.addEventListener('error', (error) => {
                        this.isPlaying = false;
                        reject(error);
                    });
                    const playPromise = this.currentAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            this.isPlaying = true;
                        }).catch(error => {
                            this.isPlaying = false;
                            reject(error);
                        });
                    }
                });
            },
            async stopAudio() {
                if (this.currentAudio) {
                    this.currentAudio.pause();
                    this.currentAudio.currentTime = 0;
                    this.isPlaying = false;
                }
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            let wordQueue = [];
            let currentList = null;
            const translationBehind = document.getElementById('translation-behind');
            const sentenceContainer = document.getElementById('sentence-container');
            const wordsPool = document.getElementById('words-pool');
            const errorCounter = document.getElementById('error-counter');
            const backButton = document.getElementById('back-button');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const progressInfo = document.getElementById('progress-info');
            const progressStats = document.getElementById('progress-stats');
            let currentWord = null;
            let currentIndex = 0;
            let currentPosition = 0;
            let errors = 0;
            let correctOrder = [];
            let isProcessing = false;
            const exampleSentences = {
                "approach": {en: "The approach to the mountain is steep.", ru: "Подход к горе крутой."},
                "assume": {en: "I assume you know the rules.", ru: "Я предполагаю, что ты знаешь правила."},
                "benefit": {en: "This change will benefit everyone.", ru: "Это изменение принесет пользу всем."},
                "concern": {en: "Safety is our main concern.", ru: "Безопасность - наша главная проблема."},
                "context": {en: "Understand the word in context.", ru: "Пойми слово в контексте."},
                "contribute": {en: "Everyone can contribute ideas.", ru: "Каждый может внести идеи."},
                "consider": {en: "Please consider my proposal.", ru: "Пожалуйста, рассмотрите мое предложение."},
                "define": {en: "Can you define this term?", ru: "Можешь определить этот термин?"},
                "demand": {en: "The job has high demands.", ru: "Работа имеет высокие требования."},
                "depend": {en: "Success depends on effort.", ru: "Успех зависит от усилий."},
                "effective": {en: "This method is very effective.", ru: "Этот метод очень эффективный."},
                "estimate": {en: "Estimate the cost first.", ru: "Сначала оцени стоимость."},
                "evidence": {en: "Show me the evidence.", ru: "Покажи мне доказательства."},
                "expectation": {en: "Meet the high expectations.", ru: "Соответствуй высоким ожиданиям."},
                "factor": {en: "Time is a key factor.", ru: "Время - ключевой фактор."},
                "focus": {en: "Focus on your goals.", ru: "Сосредоточься на своих целях."},
                "impact": {en: "The impact was huge.", ru: "Влияние было огромным."},
                "improve": {en: "Practice to improve skills.", ru: "Практикуйся, чтобы улучшить навыки."},
                "issue": {en: "Address the main issue.", ru: "Решите главную проблему."},
                "limit": {en: "Know your limits.", ru: "Знай свои пределы."},
                "maintain": {en: "Maintain good health.", ru: "Поддерживай хорошее здоровье."},
                "measure": {en: "Measure the length accurately.", ru: "Измерь длину точно."},
                "objective": {en: "Set clear objectives.", ru: "Установи ясные цели."},
                "outcome": {en: "The outcome was positive.", ru: "Исход был положительным."},
                "overall": {en: "Overall it is good.", ru: "В целом это хорошо."},
                "pattern": {en: "Follow the pattern.", ru: "Следуй шаблону."},
                "priority": {en: "Safety is priority.", ru: "Безопасность - приоритет."},
                "process": {en: "The process takes time.", ru: "Процесс занимает время."},
                "requirement": {en: "Meet the requirements.", ru: "Соответствуй требованиям."},
                "resource": {en: "Use resources wisely.", ru: "Используй ресурсы мудро."},
                "result": {en: "See the results.", ru: "Увидь результаты."},
                "risk": {en: "Take the risk.", ru: "Рискни."},
                "role": {en: "Play your role.", ru: "Играй свою роль."},
                "scope": {en: "Beyond the scope.", ru: "За пределами объема."},
                "strategy": {en: "Develop a strategy.", ru: "Разработай стратегию."},
                "structure": {en: "The structure is solid.", ru: "Структура прочная."},
                "support": {en: "Need your support.", ru: "Нужна твоя поддержка."},
                "tendency": {en: "He has a tendency to be late.", ru: "У него тенденция опаздывать."},
                "trade-off": {en: "It is a trade-off.", ru: "Это компромисс."},
                "trend": {en: "Follow the trend.", ru: "Следуй тренду."},
                "uncertainty": {en: "Deal with uncertainty.", ru: "Справляйся с неопределенностью."},
                "value": {en: "Know the value.", ru: "Знай ценность."},
                "variation": {en: "There is some variation.", ru: "Есть некоторая вариация."},
                "vision": {en: "Have a vision.", ru: "Имей видение."},
                "workflow": {en: "Optimize the workflow.", ru: "Оптимизируй рабочий процесс."}
            };
            async function loadList() {
                try {
                    const response = await fetch(listId);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const text = await response.text();
                    currentList = JSON.parse(text);
                    if (!currentList.words || !Array.isArray(currentList.words)) {
                        throw new Error('Invalid list format');
                    }
                    currentList.filename = listId;
                    WordDB.updateListStatus(currentList);
                    const wordsForReview = WordDB.getWordsForReview(currentList);
                    wordsForReview.forEach(word => {
                        const ex = exampleSentences[word.english];
                        if (ex) {
                            word.example_en = ex.en;
                            word.example_ru = ex.ru;
                        }
                    });
                    wordQueue = Utils.shuffleArray(wordsForReview.filter(word => word.example_en));
                    if (wordQueue.length === 0) {
                        showLoader();
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }
                    loadingEl.style.display = 'none';
                    currentIndex = 0;
                    showNextSentence();
                    updateProgress();
                } catch (error) {
                    loadingEl.textContent = 'Error loading list.';
                }
            }
            function showLoader() {
                loaderOverlay.classList.add('active');
            }
            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }
            async function showNextSentence() {
                if (currentIndex >= wordQueue.length) {
                    showLoader();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                }
                currentWord = wordQueue[currentIndex];
                translationBehind.textContent = currentWord.example_ru;
                translationBehind.classList.add('show');
                sentenceContainer.innerHTML = '';
                wordsPool.innerHTML = '';
                errors = 0;
                currentPosition = 0;
                updateErrorCounter();
                correctOrder = currentWord.example_en.split(' ');
                const shuffled = Utils.shuffleArray([...correctOrder]);
                shuffled.forEach(w => {
                    const option = document.createElement('div');
                    option.className = 'word-option';
                    option.textContent = w;
                    option.addEventListener('click', handleWordClick);
                    wordsPool.appendChild(option);
                });
                if (currentWord.audio && currentWord.audio.length > 0) {
                    try {
                        await AudioManager.playAudio(currentWord.audio);
                    } catch (error) {
                        console.warn('Audio play failed:', error);
                    }
                }
                hideLoader();
            }
            function updateErrorCounter() {
                errorCounter.innerHTML = `<span class="icon">❌</span>Errors: ${errors}/3`;
            }
            function resetCurrentSentence() {
                sentenceContainer.innerHTML = '';
                wordsPool.innerHTML = '';
                errors = 0;
                currentPosition = 0;
                updateErrorCounter();
                const shuffled = Utils.shuffleArray([...correctOrder]);
                shuffled.forEach(w => {
                    const option = document.createElement('div');
                    option.className = 'word-option';
                    option.textContent = w;
                    option.addEventListener('click', handleWordClick);
                    wordsPool.appendChild(option);
                });
            }
            function updateProgress() {
                if (!currentList) return;
                const total = currentList.words.length;
                const progress = WordDB.getListProgress(currentList.filename, total);
                const remaining = wordQueue.length - currentIndex;
                const currentPos = currentIndex + 1;
                progressInfo.textContent = `${currentPos}/${wordQueue.length} (${remaining} left)`;
                progressStats.innerHTML = `
                    <div class="stat-item stat-known">
                        <span>✓</span>
                        <span>Known: ${progress.known}</span>
                    </div>
                    <div class="stat-item stat-review">
                        <span>↻</span>
                        <span>Review: ${progress.review}</span>
                    </div>
                    <div class="stat-item stat-new">
                        <span>+</span>
                        <span>New: ${progress.new}</span>
                    </div>
                `;
            }
            function handleWordClick(e) {
                if (isProcessing) return;
                isProcessing = true;
                const clickedWord = e.target.textContent;
                const correctWord = correctOrder[currentPosition];
                if (clickedWord === correctWord) {
                    flyWordToSentence(e.target, true);
                } else {
                    errors++;
                    updateErrorCounter();
                    if (errors >= 3) {
                        resetCurrentSentence();
                        isProcessing = false;
                        return;
                    }
                    const correctElement = Array.from(wordsPool.children).find(el => el.textContent === correctWord);
                    if (correctElement) {
                        flyWordToSentence(correctElement, false);
                    }
                }
            }
            function flyWordToSentence(element, isUserCorrect) {
                const placeholder = document.createElement('span');
                placeholder.className = 'word-in-sentence';
                placeholder.textContent = element.textContent;
                placeholder.style.opacity = '0';
                sentenceContainer.appendChild(placeholder);
                const targetRect = placeholder.getBoundingClientRect();
                const fromRect = element.getBoundingClientRect();
                const clone = element.cloneNode(true);
                document.body.appendChild(clone);
                clone.style.position = 'absolute';
                clone.style.left = `${fromRect.left}px`;
                clone.style.top = `${fromRect.top}px`;
                clone.style.transition = 'all 0.5s ease';
                setTimeout(() => {
                    clone.style.left = `${targetRect.left}px`;
                    clone.style.top = `${targetRect.top}px`;
                    clone.style.transform = 'scale(1.1)';
                }, 10);
                setTimeout(() => {
                    placeholder.style.opacity = '1';
                    placeholder.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        placeholder.style.transform = 'scale(1)';
                    }, 300);
                    clone.remove();
                    element.remove();
                    currentPosition++;
                    if (currentPosition === correctOrder.length) {
                        const status = errors === 0 ? 'known' : 'review';
                        WordDB.saveWordStatus(currentList.filename, currentWord.english, status);
                        currentIndex++;
                        updateProgress();
                        speakSentence(currentWord.example_en);
                    } else {
                        isProcessing = false;
                    }
                }, 500);
            }
            function speakSentence(text) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    speechSynthesis.speak(utterance);
                    utterance.onend = () => {
                        setTimeout(showNextSentence, 1000);
                    };
                    utterance.onerror = () => {
                        setTimeout(showNextSentence, 1000);
                    };
                } else {
                    setTimeout(showNextSentence, 1000);
                }
            }
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });
            window.addEventListener('beforeunload', () => {
                AudioManager.stopAudio();
            });
            loadList();
        });
    </script>
</body>
</html>
