<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Nunito', Arial, sans-serif;
    background-color: #121212;
    color: #ffffff;
    height: 100vh;
    overflow: hidden;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 30px 20px;
    height: 100%;
    display: flex;
    flex-direction: column;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.back-btn {
    font-size: 42px;
    cursor: pointer;
    color: #2196f3;
    transition: transform 0.2s, opacity 0.2s;
    opacity: 0.7;
}
.back-btn:hover {
    transform: scale(1.15);
    opacity: 1;
}

.progress {
    font-size: 18px;
    color: #4caf50;
    font-weight: 700;
}

.ru-hint {
    text-align: center;
    font-size: 20px;
    color: #bbbbbb;
    opacity: 0.6;
    margin-bottom: 20px;
}

.sentence-area {
    min-height: 90px;
    background: #1e1e1e;
    border: 2px dashed #333;
    border-radius: 12px;
    padding: 15px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 30px;
}

.sentence-slot {
    padding: 8px 12px;
    border-bottom: 2px solid #555;
    min-width: 60px;
    text-align: center;
    font-size: 18px;
}

.word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
}

.word {
    padding: 10px 16px;
    background: #2a2a2a;
    border-radius: 10px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 600;
    transition: all 0.25s ease;
    border: 2px solid #333;
}

.word:hover {
    transform: translateY(-3px);
    border-color: #4caf50;
}

.word.used {
    opacity: 0.4;
    pointer-events: none;
}

.word.correct {
    background: #2e7d32;
    border-color: #4caf50;
}

.word.wrong {
    background: #b71c1c;
    border-color: #f44336;
}

.loader {
    position: absolute;
    inset: 0;
    background: rgba(18,18,18,0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    z-index: 50;
    display: none;
}

@media (max-width: 768px) {
    .sentence-slot {
        font-size: 16px;
    }
    .word {
        font-size: 16px;
        padding: 8px 14px;
    }
}
</style>
</head>

<body>
<div class="container">
    <div class="top-bar">
        <div class="back-btn" id="backBtn">←</div>
        <div class="progress" id="progress"></div>
    </div>

    <div class="ru-hint" id="ruHint"></div>

    <div class="sentence-area" id="sentenceArea"></div>

    <div class="word-bank" id="wordBank"></div>
</div>

<div class="loader" id="loader">Loading…</div>

<script>
const AudioManager = {
    play(src) {
        if (!src) return;
        const audio = new Audio(src);
        audio.play().catch(()=>{});
    }
};

const SENTENCES = [
    {
        en: "This approach can improve the overall outcome",
        ru: "Этот подход может улучшить общий результат",
        audio: "audio/sentence1.wav"
    },
    {
        en: "The strategy depends on available resources",
        ru: "Стратегия зависит от доступных ресурсов",
        audio: "audio/sentence2.wav"
    },
    {
        en: "Effective communication reduces uncertainty",
        ru: "Эффективная коммуникация снижает неопределенность",
        audio: "audio/sentence3.wav"
    }
];

let index = 0;
let errors = 0;
let currentWords = [];
let currentSlots = [];
let sentenceData = null;

const sentenceArea = document.getElementById('sentenceArea');
const wordBank = document.getElementById('wordBank');
const ruHint = document.getElementById('ruHint');
const progress = document.getElementById('progress');
const loader = document.getElementById('loader');

function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

function loadSentence() {
    loader.style.display = 'none';
    errors = 0;
    sentenceArea.innerHTML = '';
    wordBank.innerHTML = '';

    sentenceData = SENTENCES[index];
    ruHint.textContent = sentenceData.ru;
    progress.textContent = `${index + 1} / ${SENTENCES.length}`;

    const words = sentenceData.en.split(' ');
    currentWords = words;
    currentSlots = words.map((_, i) => {
        const slot = document.createElement('div');
        slot.className = 'sentence-slot';
        slot.dataset.index = i;
        sentenceArea.appendChild(slot);
        return slot;
    });

    shuffle(words).forEach(word => {
        const el = document.createElement('div');
        el.className = 'word';
        el.textContent = word;
        el.addEventListener('click', () => handleWordClick(el, word));
        wordBank.appendChild(el);
    });
}

function handleWordClick(el, word) {
    const nextSlot = currentSlots.find(s => !s.textContent);
    if (!nextSlot) return;

    const correctWord = currentWords[nextSlot.dataset.index];

    if (word === correctWord) {
        nextSlot.textContent = word;
        el.classList.add('used', 'correct');
        checkComplete();
    } else {
        el.classList.add('wrong');
        errors++;
        setTimeout(() => el.classList.remove('wrong'), 300);

        if (errors >= 3) {
            autoFillCorrect(nextSlot);
            resetAll();
        }
    }
}

function autoFillCorrect(slot) {
    slot.textContent = currentWords[slot.dataset.index];
}

function resetAll() {
    setTimeout(() => {
        sentenceArea.innerHTML = '';
        wordBank.innerHTML = '';
        loadSentence();
    }, 600);
}

function checkComplete() {
    const done = currentSlots.every(s => s.textContent);
    if (done) {
        AudioManager.play(sentenceData.audio);
        setTimeout(() => {
            index++;
            if (index >= SENTENCES.length) {
                window.location.href = 'index.html';
            } else {
                loadSentence();
            }
        }, 1000);
    }
}

document.getElementById('backBtn').addEventListener('click', () => {
    window.location.href = 'index.html';
});

loadSentence();
</script>
</body>
</html>
