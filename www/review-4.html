<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Text</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: manipulation;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .text-card {
            position: relative;
            width: 90%;
            max-width: 800px;
            height: auto;
            max-height: 60vh;
            padding: 30px;
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: left;
            overflow-y: auto;
            z-index: 4;
            border: 2px solid #333;
            font-size: 22px;
            line-height: 1.6;
            color: #bbbbbb;
            cursor: pointer;
            word-break: break-word;
        }
        .text-card::-webkit-scrollbar {
            width: 8px;
        }
        .text-card::-webkit-scrollbar-track {
            background: #333;
            border-radius: 4px;
        }
        .text-card::-webkit-scrollbar-thumb {
            background: #4caf50;
            border-radius: 4px;
        }
        .text-card span {
            transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            white-space: pre-wrap;
        }
        .text-card .highlight {
            background-color: rgba(76, 175, 80, 0.3);
            color: #ffffff;
            border-radius: 4px;
            padding: 2px 4px;
            animation: pulseHighlight 1s infinite ease-in-out;
        }
        @keyframes pulseHighlight {
            0% {
                box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
                background-color: rgba(76, 175, 80, 0.2);
            }
            50% {
                box-shadow: 0 0 15px rgba(76, 175, 80, 1);
                background-color: rgba(76, 175, 80, 0.4);
            }
            100% {
                box-shadow: 0 0 5px rgba(76, 175, 80, 0.5);
                background-color: rgba(76, 175, 80, 0.2);
            }
        }
        .text-card .word-from-list {
            font-weight: 700;
            color: #ffffff;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 5;
            pointer-events: none;
        }
        .text-card:hover .play-overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .play-icon {
            font-size: 50px;
            color: #4caf50;
            background-color: #ffffff;
            border-radius: 50%;
            padding: 15px;
            opacity: 0.7;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            line-height: 50px;
        }
        .play-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-button {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            margin-top: 25px;
            margin-left: 25px;
        }
        .top-area:hover .back-button {
            opacity: 1;
            pointer-events: auto;
        }
        .back-icon {
            font-size: 65px;
            color: #2196f3;
            font-weight: 900;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(33, 150, 243, 0.4));
            opacity: 0.7;
        }
        .back-button:hover .back-icon {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.7));
        }
        .progress-section {
            margin-top: 25px;
            margin-right: 25px;
            text-align: right;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 400px;
        }
        .top-area:hover .progress-section {
            opacity: 1;
            pointer-events: auto;
        }
        .progress-info {
            font-size: 24px;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 600;
            color: #bbbbbb;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-known {
            color: #4caf50;
        }
        .stat-review {
            color: #ff9800;
        }
        .stat-new {
            color: #2196f3;
        }
        .controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 5;
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        .controls.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .text-card {
                width: 95%;
                font-size: 18px;
                padding: 20px;
            }
            .progress-info {
                font-size: 20px;
            }
            .progress-stats {
                font-size: 16px;
                gap: 10px;
            }
            .back-button {
                margin-top: 20px;
                margin-left: 20px;
                width: 60px;
                height: 60px;
            }
            .back-icon {
                font-size: 55px;
            }
            .progress-section {
                margin-top: 20px;
                margin-right: 20px;
            }
            .loader-spinner {
                width: 50px;
                height: 50px;
            }
            .play-icon {
                font-size: 40px;
                padding: 10px;
                width: 40px;
                height: 40px;
                line-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>
        <div class="top-area">
            <div class="back-button" id="back-button">
                <div class="back-icon">←</div>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-info" id="progress-info"></div>
                <div class="progress-stats" id="progress-stats"></div>
            </div>
        </div>
        <div id="text-card" class="text-card">
            <div class="play-overlay" id="play-overlay">
                <div class="play-icon" id="play-icon">▶</div>
            </div>
        </div>
        <div class="controls" id="controls">
        </div>
        <div class="loading" id="loading">Loading text...</div>
    </div>
    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            },
            getListProgress(listId, totalWords) {
                let known = 0;
                let review = 0;
                let newWords = totalWords;
                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith(`word_${listId}_`)) {
                        const status = localStorage.getItem(key);
                        if (status === 'known') known++;
                        if (status === 'review') review++;
                    }
                });
                newWords = totalWords - known - review;
                return { known, review, new: newWords };
            }
        };
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            let currentList = null;
            let wordSet = new Set();
            const textCard = document.getElementById('text-card');
            const backButton = document.getElementById('back-button');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const progressInfo = document.getElementById('progress-info');
            const progressStats = document.getElementById('progress-stats');
            const playOverlay = document.getElementById('play-overlay');
            const playIcon = document.getElementById('play-icon');
            const controls = document.getElementById('controls');
            let utterance = null;
            let currentTextIndex = 0;
            let isPlaying = false;
            let hideControlsTimeout;
            const texts = [
                "The approach we take can define the outcome. We must consider every factor and assume nothing. The benefit of this strategy is to improve our process and maintain focus. Evidence shows that this will impact the result positively. We need to measure the risk and set priority. The overall vision should guide us through uncertainty.",
                "In this context, the demand for resources is high. We must contribute effectively to meet the requirement. The pattern of variation tends to limit our options. Support is key to achieve the objective. The trade-off involves a tendency toward a certain trend. We estimate the scope and structure accordingly.",
                "To support the value, we must limit uncertainty and focus on the role. The process involves a strategy to improve the outcome. We define the requirement and estimate the impact. The evidence shows a pattern in the trend. Overall, the priority is to maintain the vision through effective measures."
            ];
            async function loadList() {
                try {
                    const response = await fetch(listId);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const text = await response.text();
                    currentList = JSON.parse(text);
                    if (!currentList.words || !Array.isArray(currentList.words)) {
                        throw new Error('Invalid list format');
                    }
                    currentList.filename = listId;
                    WordDB.updateListStatus(currentList);
                    wordSet = new Set(currentList.words.map(w => w.english.toLowerCase()));
                    loadCurrentText();
                    loadingEl.style.display = 'none';
                    textCard.style.display = 'block';
                    updateProgress();
                    startHideControls();
                } catch (error) {
                    loadingEl.textContent = 'Error loading list.';
                }
            }
            function loadCurrentText() {
                const storageKey = `currentTextIndex_${listId}`;
                currentTextIndex = parseInt(localStorage.getItem(storageKey) || '0', 10) % texts.length;
                renderText(texts[currentTextIndex]);
            }
            function renderText(text) {
                const words = text.split(/\s+/);
                textCard.innerHTML = words.map((word, index) => {
                    const cleanWord = word.replace(/[.,!?;:"'()]/g, '').toLowerCase();
                    const isFromList = wordSet.has(cleanWord);
                    return `<span id="word-${index}" class="${isFromList ? 'word-from-list' : ''}">${word}</span>`;
                }).join(' ');
                textCard.appendChild(playOverlay);
            }
            function nextText() {
                currentTextIndex = (currentTextIndex + 1) % texts.length;
                const storageKey = `currentTextIndex_${listId}`;
                localStorage.setItem(storageKey, currentTextIndex);
                renderText(texts[currentTextIndex]);
                stopSpeech();
                updateProgress();
                setTimeout(startSpeech, 1000);
            }
            function updateProgress() {
                if (!currentList) return;
                const total = currentList.words.length;
                const progress = WordDB.getListProgress(currentList.filename, total);
                progressInfo.textContent = `Text ${currentTextIndex + 1}/${texts.length}`;
                progressStats.innerHTML = `
                    <div class="stat-item stat-known">
                        <span>✓</span>
                        <span>Known: ${progress.known}</span>
                    </div>
                    <div class="stat-item stat-review">
                        <span>↻</span>
                        <span>Review: ${progress.review}</span>
                    </div>
                    <div class="stat-item stat-new">
                        <span>+</span>
                        <span>New: ${progress.new}</span>
                    </div>
                `;
            }
            function getFemaleVoice() {
                const voices = speechSynthesis.getVoices();
                return voices.find(voice => voice.lang === 'en-US' && voice.localService && (voice.name.includes('Female') || voice.name.includes('Samantha') || voice.name.toLowerCase().includes('female'))) ||
                       voices.find(voice => voice.lang === 'en-US' && voice.localService) ||
                       voices.find(voice => voice.lang === 'en-US' && (voice.name.includes('Google US English') || voice.name.includes('Female') || voice.name.includes('Samantha') || voice.name.toLowerCase().includes('female'))) ||
                       voices.find(voice => voice.lang === 'en-US');
            }
            function startSpeech() {
                if ('speechSynthesis' in window) {
                    stopSpeech();
                    utterance = new SpeechSynthesisUtterance(texts[currentTextIndex]);
                    const femaleVoice = getFemaleVoice();
                    if (femaleVoice) utterance.voice = femaleVoice;
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    utterance.pitch = 1.1;
                    utterance.volume = 1;
                    utterance.onboundary = (event) => {
                        if (event.name === 'word') {
                            const wordSpans = textCard.querySelectorAll('span');
                            wordSpans.forEach(span => span.classList.remove('highlight'));
                            const charIndex = event.charIndex;
                            let currentChar = 0;
                            for (let i = 0; i < wordSpans.length; i++) {
                                const spanText = wordSpans[i].textContent;
                                if (charIndex >= currentChar && charIndex < currentChar + spanText.length) {
                                    wordSpans[i].classList.add('highlight');
                                    textCard.scrollTop = wordSpans[i].offsetTop - textCard.offsetHeight / 2 + wordSpans[i].offsetHeight / 2;
                                    break;
                                }
                                currentChar += spanText.length + 1; // +1 for space
                            }
                        }
                    };
                    utterance.onend = () => {
                        stopSpeech();
                        setTimeout(nextText, 1000);
                    };
                    speechSynthesis.speak(utterance);
                    isPlaying = true;
                    playIcon.textContent = '■';
                } else {
                    alert('Text-to-speech not supported in this browser.');
                }
            }
            function pauseSpeech() {
                if (speechSynthesis.speaking) {
                    speechSynthesis.pause();
                    isPlaying = false;
                    playIcon.textContent = '▶';
                }
            }
            function resumeSpeech() {
                if (speechSynthesis.paused) {
                    speechSynthesis.resume();
                    isPlaying = true;
                    playIcon.textContent = '■';
                }
            }
            function stopSpeech() {
                if (utterance) {
                    speechSynthesis.cancel();
                    utterance = null;
                }
                const wordSpans = textCard.querySelectorAll('span');
                wordSpans.forEach(span => span.classList.remove('highlight'));
                isPlaying = false;
                playIcon.textContent = '▶';
            }
            function togglePlay() {
                if (isPlaying) {
                    if (speechSynthesis.paused) {
                        resumeSpeech();
                    } else {
                        pauseSpeech();
                    }
                } else {
                    startSpeech();
                }
            }
            function startHideControls() {
                clearTimeout(hideControlsTimeout);
                controls.classList.remove('hidden');
                hideControlsTimeout = setTimeout(() => {
                    controls.classList.add('hidden');
                }, 3000);
            }
            document.addEventListener('mousemove', (e) => {
                const height = window.innerHeight;
                if (e.clientY > height * 0.8) {
                    startHideControls();
                }
            });
            speechSynthesis.onvoiceschanged = () => {
                // Load voices asynchronously
            };
            backButton.addEventListener('click', () => {
                stopSpeech();
                window.location.href = 'index.html';
            });
            textCard.addEventListener('click', togglePlay);
            window.addEventListener('beforeunload', stopSpeech);
            textCard.style.display = 'none';
            loadList();
        });
    </script>
</body>
</html>
