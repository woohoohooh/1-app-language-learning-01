<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Words</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .left-overlay, .right-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            display: flex;
            align-items: center;
            background-color: transparent;
            transition: background-color 0.2s;
            z-index: 1;
        }
        .left-overlay {
            left: 0;
            justify-content: center;
        }
        .right-overlay {
            right: 0;
            justify-content: center;
        }
        .icon {
            font-size: 70px;
            opacity: 0.3;
            transition: opacity 0.2s, transform 0.2s;
            font-weight: 800;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .left-overlay .icon {
            color: #4caf50;
            filter: drop-shadow(0 0 8px rgba(76, 175, 80, 0.5));
        }
        .right-overlay .icon {
            color: #ff9800;
            filter: drop-shadow(0 0 8px rgba(255, 152, 0, 0.5));
        }
        .word-card {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80%;
            max-width: 320px;
            height: 220px;
            padding: 0 20px;
            background-color: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            cursor: grab;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            z-index: 4;
            transition: transform 0.3s ease;
            border: 2px solid #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .word-card:active {
            cursor: grabbing;
        }
        .english {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            transition: transform 0.3s ease;
            margin: 0;
            padding: 0;
            text-align: center;
            line-height: 1.4;
        }
        .translation-behind {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 700;
            color: #4caf50;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
        }
        .translation-behind.show {
            opacity: 1;
        }
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .back-button {
            width: 70px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            margin-top: 25px;
            margin-left: 25px;
        }
        .top-area:hover .back-button {
            opacity: 1;
            pointer-events: auto;
        }
        .back-icon {
            font-size: 65px;
            color: #2196f3;
            font-weight: 900;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 12px rgba(33, 150, 243, 0.4));
            opacity: 0.7;
        }
        .back-button:hover .back-icon {
            opacity: 1;
            transform: scale(1.15);
            filter: drop-shadow(0 0 20px rgba(33, 150, 243, 0.7));
        }
        .progress-section {
            margin-top: 25px;
            margin-right: 25px;
            text-align: right;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            max-width: 400px;
        }
        .top-area:hover .progress-section {
            opacity: 1;
            pointer-events: auto;
        }
        .progress-info {
            font-size: 24px;
            font-weight: 700;
            color: #4caf50;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        .progress-stats {
            font-size: 20px;
            font-weight: 600;
            color: #bbbbbb;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stat-known {
            color: #4caf50;
        }
        .stat-review {
            color: #ff9800;
        }
        .stat-new {
            color: #2196f3;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        @media (max-width: 768px) {
            .word-card {
                width: 90%;
                height: 200px;
            }
            .progress-info {
                font-size: 20px;
            }
            .progress-stats {
                font-size: 16px;
                gap: 10px;
            }
            .back-button {
                margin-top: 20px;
                margin-left: 20px;
                width: 60px;
                height: 60px;
            }
            .back-icon {
                font-size: 55px;
            }
            .progress-section {
                margin-top: 20px;
                margin-right: 20px;
            }
            .loader-spinner {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-overlay">
            <div class="icon">✓</div>
        </div>
        <div class="right-overlay">
            <div class="icon">↻</div>
        </div>

        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>

        <div class="top-area">
            <div class="back-button" id="back-button">
                <div class="back-icon">←</div>
            </div>
            <div class="progress-section" id="progress-section">
                <div class="progress-info" id="progress-info"></div>
                <div class="progress-stats" id="progress-stats"></div>
            </div>
        </div>

        <div class="translation-behind" id="translation-behind"></div>

        <div id="word-card" class="word-card">
            <div class="english"></div>
        </div>

        <div class="loading" id="loading">Loading words...</div>
    </div>

    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },

            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },

            updateListStatus(listData) {
                if (!listData.words) return listData;

                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },

            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];

                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;

                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });

                return [...reviewedWords, ...newWords];
            },

            getListProgress(listId, totalWords) {
                let known = 0;
                let review = 0;
                let newWords = totalWords;

                const keys = Object.keys(localStorage);
                keys.forEach(key => {
                    if (key.startsWith(`word_${listId}_`)) {
                        const status = localStorage.getItem(key);
                        if (status === 'known') known++;
                        if (status === 'review') review++;
                    }
                });

                newWords = totalWords - known - review;

                return { known, review, new: newWords };
            }
        };

        const Utils = {
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },

            getRandomAudioFile(audioArray) {
                if (!audioArray || audioArray.length === 0) return null;
                const randomIndex = Math.floor(Math.random() * audioArray.length);
                return audioArray[randomIndex];
            }
        };

        const AudioManager = {
            currentAudio: null,
            isPlaying: false,
            audioPlayPromise: null,

            async playAudio(audioFiles) {
                // Останавливаем текущее воспроизведение
                await this.stopAudio();

                const audioFile = Utils.getRandomAudioFile(audioFiles);
                if (!audioFile) return;

                this.currentAudio = new Audio(audioFile);

                return new Promise((resolve, reject) => {
                    this.currentAudio.addEventListener('ended', () => {
                        this.isPlaying = false;
                        resolve();
                    });

                    this.currentAudio.addEventListener('error', (error) => {
                        this.isPlaying = false;
                        reject(error);
                    });

                    const playPromise = this.currentAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            this.isPlaying = true;
                        }).catch(error => {
                            this.isPlaying = false;
                            reject(error);
                        });
                    }
                });
            },

            async stopAudio() {
                if (this.currentAudio) {
                    this.currentAudio.pause();
                    this.currentAudio.currentTime = 0;
                    this.isPlaying = false;
                }
                // Ждем немного чтобы остановка точно произошла
                await new Promise(resolve => setTimeout(resolve, 50));
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');


            let wordQueue = [];
            let currentList = null;

            const wordCard = document.getElementById('word-card');
            const englishEl = wordCard.querySelector('.english');
            const translationBehind = document.getElementById('translation-behind');
            const backButton = document.getElementById('back-button');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const progressInfo = document.getElementById('progress-info');
            const progressStats = document.getElementById('progress-stats');
            const leftOverlay = document.querySelector('.left-overlay');
            const rightOverlay = document.querySelector('.right-overlay');
            const leftIcon = leftOverlay.querySelector('.icon');
            const rightIcon = rightOverlay.querySelector('.icon');

            let currentWord = null;
            let isDragging = false;
            let currentIndex = 0;
            let isProcessingAction = false; // Флаг чтобы предотвратить множественные обработки
            let dragStartTime = 0;

            async function loadList() {
                try {
                    const response = await fetch(listId);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const text = await response.text();
                    currentList = JSON.parse(text);

                    if (!currentList.words || !Array.isArray(currentList.words)) {
                        throw new Error('Invalid list format');
                    }

                    currentList.filename = listId;

                    WordDB.updateListStatus(currentList);

                    const wordsForReview = WordDB.getWordsForReview(currentList);

                    wordQueue = Utils.shuffleArray(wordsForReview);

                    if (wordQueue.length === 0) {
                        showLoader();
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }

                    loadingEl.style.display = 'none';
                    wordCard.style.display = 'flex';
                    currentIndex = 0;
                    showNextWord();
                    updateProgress();
                } catch (error) {
                    loadingEl.textContent = 'Error loading list.';
                }
            }

            function showLoader() {
                loaderOverlay.classList.add('active');
            }

            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }

            function showNextWord() {
                if (currentIndex >= wordQueue.length) {
                    showLoader();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                }

                currentWord = wordQueue[currentIndex];
                englishEl.textContent = currentWord.english;
                translationBehind.textContent = currentWord.translation;

                resetCardPosition();
                hideLoader();
            }

            function resetCardPosition() {
                wordCard.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(1)';
                wordCard.style.transition = 'transform 0.3s ease';
                englishEl.style.transform = 'scale(1)';
                translationBehind.classList.remove('show');
                resetZones();
            }

            function updateProgress() {
                if (!currentList) return;

                const total = currentList.words.length;
                const progress = WordDB.getListProgress(currentList.filename, total);
                const remaining = wordQueue.length - currentIndex;
                const currentPosition = currentIndex + 1;

                progressInfo.textContent = `${currentPosition}/${wordQueue.length} (${remaining} left)`;

                progressStats.innerHTML = `
                    <div class="stat-item stat-known">
                        <span>✓</span>
                        <span>Known: ${progress.known}</span>
                    </div>
                    <div class="stat-item stat-review">
                        <span>↻</span>
                        <span>Review: ${progress.review}</span>
                    </div>
                    <div class="stat-item stat-new">
                        <span>+</span>
                        <span>New: ${progress.new}</span>
                    </div>
                `;
            }

            let startX = 0;
            let currentX = 0;
            let initialTranslateX = 0;

            async function startDrag(e) {
                if (isProcessingAction) return;

                e.preventDefault();
                isDragging = true;
                dragStartTime = Date.now();

                const transform = window.getComputedStyle(wordCard).transform;
                const matrix = new DOMMatrix(transform);
                initialTranslateX = matrix.m41;
                startX = (e.type === 'touchstart' ? e.touches[0].clientX : e.clientX) - initialTranslateX;
                wordCard.style.transition = 'none';

                englishEl.style.transform = 'scale(2)';
                translationBehind.classList.add('show');

                // Автоматически проигрываем аудио при начале перетаскивания
                if (currentWord.audio && currentWord.audio.length > 0) {
                    try {
                        await AudioManager.playAudio(currentWord.audio);
                    } catch (error) {
                        console.warn('Audio play failed:', error);
                    }
                }
            }

            function drag(e) {
                if (!isDragging) return;
                currentX = (e.type === 'touchstart' ? e.touches[0].clientX : e.clientX) - startX;
                wordCard.style.transform = `translate(${currentX}px, -50%) rotate(${currentX / 20}deg) scale(0.95)`;
                checkZones();
            }

            async function endDrag() {
                if (!isDragging || isProcessingAction) return;

                // Проверяем минимальное время перетаскивания (чтобы избежать случайных кликов)
                const dragDuration = Date.now() - dragStartTime;
                if (dragDuration < 100) {
                    isDragging = false;
                    resetCardPosition();
                    translationBehind.classList.remove('show');
                    resetZones();
                    return;
                }

                isProcessingAction = true;
                isDragging = false;

                englishEl.style.transform = 'scale(1)';

                const delta = currentX - initialTranslateX;
                const containerRect = document.querySelector('.container').getBoundingClientRect();
                const swipeThreshold = 120;

                let action = null;

                if (delta < -swipeThreshold) {
                    wordCard.style.transform = `translate(-${containerRect.width}px, -50%) rotate(-10deg) scale(0.95)`;
                    action = 'known';
                } else if (delta > swipeThreshold) {
                    wordCard.style.transform = `translate(${containerRect.width}px, -50%) rotate(10deg) scale(0.95)`;
                    action = 'review';
                } else {
                    resetCardPosition();
                    translationBehind.classList.remove('show');
                    resetZones();
                    isProcessingAction = false;
                    return;
                }

                translationBehind.classList.remove('show');
                resetZones();

                // Ждем пока аудио доиграет, если оно еще играет
                if (AudioManager.isPlaying && AudioManager.currentAudio) {
                    await new Promise((resolve) => {
                        AudioManager.currentAudio.addEventListener('ended', resolve, { once: true });
                        // На всякий случай таймаут
                        setTimeout(resolve, 5000);
                    });
                }

                // Сохраняем статус и переходим к следующему слову
                WordDB.saveWordStatus(currentList.filename, currentWord.english, action);

                currentIndex++;
                updateProgress();

                // Ждем немного для плавности анимации
                await new Promise(resolve => setTimeout(resolve, 300));

                showNextWord();
                isProcessingAction = false;
            }

            function checkZones() {
                const delta = currentX - initialTranslateX;
                const overlayThreshold = 50;

                if (delta < -overlayThreshold) {
                    leftOverlay.style.backgroundColor = 'rgba(76, 175, 80, 0.25)';
                    leftIcon.style.opacity = '1';
                    rightOverlay.style.backgroundColor = 'transparent';
                    rightIcon.style.opacity = '0.3';
                } else if (delta > overlayThreshold) {
                    rightOverlay.style.backgroundColor = 'rgba(255, 152, 0, 0.25)';
                    rightIcon.style.opacity = '1';
                    leftOverlay.style.backgroundColor = 'transparent';
                    leftIcon.style.opacity = '0.3';
                } else {
                    resetZones();
                }
            }

            function resetZones() {
                leftOverlay.style.backgroundColor = 'transparent';
                rightOverlay.style.backgroundColor = 'transparent';
                leftIcon.style.opacity = '0.3';
                rightIcon.style.opacity = '0.3';
            }

            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            wordCard.addEventListener('mousedown', startDrag);
            wordCard.addEventListener('touchstart', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);

            wordCard.addEventListener('contextmenu', (e) => e.preventDefault());

            window.addEventListener('beforeunload', () => {
                AudioManager.stopAudio();
            });

            wordCard.style.display = 'none';
            loadList();
        });
    </script>
</body>
</html>
