<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentence Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ffffff;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            z-index: 10;
        }
        .back-button {
            width: 50px;
            height: 50px;
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 24px;
            color: #2196f3;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            transform: scale(1.1);
            border-color: #2196f3;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.3);
        }
        .progress-info {
            font-size: 20px;
            font-weight: 700;
            color: #4caf50;
            background-color: rgba(30, 30, 30, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #333;
        }
        .translation-hint {
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            margin-bottom: 30px;
            max-width: 600px;
            line-height: 1.5;
            padding: 15px;
        }
        .sentence-area {
            width: 90%;
            max-width: 600px;
            min-height: 150px;
            background-color: #1e1e1e;
            border: 3px solid #333;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            transition: all 0.3s ease;
        }
        .sentence-area.error {
            border-color: #f44336;
            box-shadow: 0 0 25px rgba(244, 67, 54, 0.2);
        }
        .sentence-area.success {
            border-color: #4caf50;
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.2);
        }
        .word-gap {
            padding: 15px 20px;
            font-size: 22px;
            font-weight: 700;
            background-color: #2a2a2a;
            border: 2px dashed #555;
            border-radius: 10px;
            min-width: 120px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            color: #777;
        }
        .word-gap.filled {
            background-color: #4caf50;
            color: white;
            border: 2px solid #4caf50;
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .word-gap.incorrect {
            background-color: #f44336;
            color: white;
            border: 2px solid #f44336;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .words-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            max-width: 600px;
        }
        .word-chip {
            padding: 18px 25px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }
        .word-chip:hover:not(.used) {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .word-chip.used {
            opacity: 0.3;
            transform: scale(0.9);
            cursor: not-allowed;
            background: linear-gradient(135deg, #888 0%, #666 100%);
        }
        .word-chip.used:hover {
            transform: scale(0.9);
            box-shadow: none;
        }
        .feedback {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            min-height: 40px;
            margin: 20px 0;
            color: #4caf50;
        }
        .feedback.error {
            color: #f44336;
        }
        .error-dots {
            display: flex;
            gap: 10px;
            position: absolute;
            top: 15px;
            right: 15px;
        }
        .error-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #333;
            border: 2px solid #555;
            transition: all 0.3s ease;
        }
        .error-dot.active {
            background-color: #f44336;
            border-color: #f44336;
            box-shadow: 0 0 10px rgba(244, 67, 54, 0.5);
        }
        .completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
        }
        .completion-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .completion-title {
            font-size: 36px;
            font-weight: 800;
            color: #4caf50;
            margin-bottom: 20px;
        }
        .completion-stats {
            font-size: 24px;
            color: #bbbbbb;
            margin-bottom: 40px;
            text-align: center;
        }
        .completion-button {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .completion-button:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }
        .loading {
            font-size: 24px;
            color: #bbbbbb;
            text-align: center;
            padding: 60px;
        }
        @media (max-width: 768px) {
            .sentence-area {
                padding: 20px;
                min-height: 130px;
            }
            .word-gap {
                padding: 12px 16px;
                font-size: 18px;
                min-width: 100px;
            }
            .word-chip {
                padding: 15px 20px;
                font-size: 18px;
            }
            .translation-hint {
                font-size: 18px;
                padding: 10px;
            }
            .completion-title {
                font-size: 28px;
            }
            .completion-stats {
                font-size: 20px;
            }
        }
        @media (max-width: 480px) {
            .words-pool {
                padding: 15px;
                gap: 10px;
            }
            .word-chip {
                padding: 12px 16px;
                font-size: 16px;
            }
            .word-gap {
                padding: 10px 14px;
                font-size: 16px;
                min-width: 80px;
            }
            .top-bar {
                padding: 15px;
            }
            .back-button {
                width: 45px;
                height: 45px;
                font-size: 22px;
            }
            .progress-info {
                font-size: 16px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="back-button" id="back-button">←</div>
            <div class="progress-info" id="progress-info">Loading...</div>
        </div>

        <div class="translation-hint" id="translation-hint"></div>

        <div class="sentence-area" id="sentence-area">
            <div class="error-dots" id="error-dots">
                <div class="error-dot"></div>
                <div class="error-dot"></div>
                <div class="error-dot"></div>
            </div>
        </div>

        <div class="feedback" id="feedback"></div>

        <div class="words-pool" id="words-pool">
            <!-- Word chips will be added here -->
        </div>

        <div class="completion-overlay" id="completion-overlay">
            <div class="completion-title">Excellent! 🎉</div>
            <div class="completion-stats" id="completion-stats"></div>
            <button class="completion-button" id="completion-button">Finish</button>
        </div>

        <div class="loading" id="loading">Loading sentences...</div>
    </div>

    <script>
        // Sample sentences for demo
        const SAMPLE_SENTENCES = {
            "approach": [
                "We need a new [approach] to solve this.",
                "The [approach] must be strategic.",
                "Her [approach] was very effective."
            ],
            "assume": [
                "Don't [assume] anything.",
                "I [assume] you know the rules.",
                "We can [assume] it's correct."
            ],
            "benefit": [
                "There is a clear [benefit].",
                "The main [benefit] is obvious.",
                "Everyone will [benefit] from this."
            ],
            "concern": [
                "My main [concern] is safety.",
                "This raises serious [concern].",
                "It's a valid [concern]."
            ],
            "context": [
                "In this [context], it makes sense.",
                "Consider the historical [context].",
                "The [context] is very important."
            ],
            "define": [
                "Let me [define] the terms.",
                "The rules are clearly [define]d.",
                "We need to [define] our goals."
            ],
            "focus": [
                "Please [focus] on the task.",
                "The [focus] should be on quality.",
                "Let's [focus] our attention."
            ],
            "impact": [
                "This will have a big [impact].",
                "The [impact] was significant.",
                "Consider the long-term [impact]."
            ],
            "improve": [
                "We must [improve] our methods.",
                "The goal is to [improve].",
                "This will [improve] results."
            ],
            "process": [
                "The [process] is very complex.",
                "We need to streamline the [process].",
                "The entire [process] takes time."
            ]
        };

        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            }
        };

        class SentenceGame {
            constructor(listId) {
                this.listId = listId;
                this.words = [];
                this.sentences = [];
                this.currentSentenceIndex = 0;
                this.currentSentence = null;
                this.currentGaps = [];
                this.availableWords = [];
                this.errorCount = 0;
                this.filledGaps = 0;
                this.totalSentences = 0;
                this.completedSentences = 0;
            }

            async loadGame() {
                try {
                    const response = await fetch(this.listId);
                    const data = await response.json();

                    // Get words for review
                    this.words = WordDB.getWordsForReview(data);
                    if (this.words.length === 0) {
                        throw new Error('No words to review');
                    }

                    // Create sentences (max 10 for demo)
                    const gameWords = this.shuffleArray([...this.words]).slice(0, Math.min(10, this.words.length));
                    this.prepareSentences(gameWords);

                    return true;
                } catch (error) {
                    console.error('Error loading game:', error);
                    return false;
                }
            }

            prepareSentences(words) {
                this.sentences = [];

                words.forEach(word => {
                    const sentences = SAMPLE_SENTENCES[word.english.toLowerCase()] || [
                        `The [${word.english}] is important.`,
                        `We need to consider the [${word.english}].`,
                        `This [${word.english}] matters.`
                    ];

                    const sentence = sentences[Math.floor(Math.random() * sentences.length)];
                    this.sentences.push({
                        sentence: sentence,
                        targetWord: word,
                        gaps: [word.english],
                        translation: `${word.translation} - ${sentence.replace(/\[.*?\]/g, '_____')}`
                    });
                });

                this.totalSentences = this.sentences.length;
                this.sentences = this.shuffleArray(this.sentences);
            }

            startNextSentence() {
                if (this.currentSentenceIndex >= this.totalSentences) {
                    return false;
                }

                this.currentSentence = this.sentences[this.currentSentenceIndex];
                this.currentGaps = [...this.currentSentence.gaps];
                this.availableWords = this.shuffleArray([...this.currentSentence.gaps]);
                this.errorCount = 0;
                this.filledGaps = 0;

                return true;
            }

            selectWord(word) {
                if (this.filledGaps >= this.currentGaps.length) return false;

                const expectedWord = this.currentGaps[this.filledGaps];
                const isCorrect = word === expectedWord;

                if (isCorrect) {
                    this.filledGaps++;
                    return { type: 'correct', word: word };
                } else {
                    this.errorCount++;
                    if (this.errorCount >= 3) {
                        this.fillAllGaps();
                        return { type: 'reset', correctWord: expectedWord };
                    }
                    return { type: 'incorrect', correctWord: expectedWord, selectedWord: word };
                }
            }

            fillAllGaps() {
                this.filledGaps = this.currentGaps.length;
                this.availableWords = [];
            }

            completeCurrentSentence() {
                this.completedSentences++;

                // Update word status based on performance
                const targetWord = this.currentSentence.targetWord;
                let status = 'new';
                if (this.errorCount === 0) {
                    status = 'known';
                } else if (this.errorCount < 3) {
                    status = 'review';
                }

                WordDB.saveWordStatus(this.listId, targetWord.english, status);
                this.currentSentenceIndex++;

                return {
                    errors: this.errorCount,
                    status: status
                };
            }

            isSentenceComplete() {
                return this.filledGaps >= this.currentGaps.length;
            }

            getProgress() {
                return {
                    current: this.currentSentenceIndex + 1,
                    total: this.totalSentences,
                    completed: this.completedSentences,
                    remaining: this.totalSentences - this.currentSentenceIndex
                };
            }

            speakSentence() {
                if (!this.currentSentence) return;

                const fullSentence = this.currentSentence.sentence.replace(/\[.*?\]/g, (match) => {
                    return match.slice(1, -1); // Remove brackets
                });

                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(fullSentence);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    speechSynthesis.speak(utterance);
                }
            }

            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }
        }

        class GameUI {
            constructor() {
                this.game = null;
                this.sentenceArea = document.getElementById('sentence-area');
                this.wordsPool = document.getElementById('words-pool');
                this.translationHint = document.getElementById('translation-hint');
                this.progressInfo = document.getElementById('progress-info');
                this.feedback = document.getElementById('feedback');
                this.errorDots = document.getElementById('error-dots');
                this.backButton = document.getElementById('back-button');
                this.completionOverlay = document.getElementById('completion-overlay');
                this.completionStats = document.getElementById('completion-stats');
                this.completionButton = document.getElementById('completion-button');
                this.loading = document.getElementById('loading');

                this.bindEvents();
            }

            async init() {
                const urlParams = new URLSearchParams(window.location.search);
                const listId = urlParams.get('list');


                this.game = new SentenceGame(listId);
                const loaded = await this.game.loadGame();

                if (!loaded) {
                    this.showError('No words to review. Please select another list.');
                    return;
                }

                this.loading.style.display = 'none';
                this.startGame();
            }

            startGame() {
                if (!this.game.startNextSentence()) {
                    this.showCompletion();
                    return;
                }

                this.updateUI();
            }

            updateUI() {
                this.updateProgress();
                this.updateSentence();
                this.updateWordsPool();
                this.updateErrorDots();
                this.updateFeedback('');
            }

            updateProgress() {
                const progress = this.game.getProgress();
                this.progressInfo.textContent =
                    `${progress.current}/${progress.total}`;
            }

            updateSentence() {
                this.sentenceArea.innerHTML = '';
                this.sentenceArea.classList.remove('error', 'success');

                // Add error dots
                const errorDots = document.createElement('div');
                errorDots.className = 'error-dots';
                for (let i = 0; i < 3; i++) {
                    const dot = document.createElement('div');
                    dot.className = `error-dot ${i < this.game.errorCount ? 'active' : ''}`;
                    errorDots.appendChild(dot);
                }
                this.sentenceArea.appendChild(errorDots);

                // Parse sentence and create gaps
                const sentence = this.game.currentSentence.sentence;
                const parts = sentence.split(/\[(.*?)\]/);

                parts.forEach((part, index) => {
                    if (index % 2 === 1) { // This is a gap
                        const gapIndex = Math.floor(index / 2);
                        const gap = document.createElement('div');
                        gap.className = 'word-gap';

                        if (gapIndex < this.game.filledGaps) {
                            gap.textContent = this.game.currentGaps[gapIndex];
                            gap.classList.add('filled');
                        } else {
                            gap.textContent = '______';
                            gap.addEventListener('click', () => {
                                this.showFeedback('Select a word from below');
                            });
                        }

                        this.sentenceArea.appendChild(gap);
                    } else if (part.trim() !== '') {
                        const text = document.createElement('span');
                        text.textContent = part;
                        text.style.fontSize = '22px';
                        this.sentenceArea.appendChild(text);
                    }
                });

                // Update translation
                this.translationHint.textContent = this.game.currentSentence.translation;
            }

            updateWordsPool() {
                this.wordsPool.innerHTML = '';

                this.game.availableWords.forEach((word, index) => {
                    const chip = document.createElement('div');
                    chip.className = 'word-chip';
                    chip.textContent = word;
                    chip.dataset.word = word;

                    chip.addEventListener('click', () => this.onWordClick(word));

                    this.wordsPool.appendChild(chip);
                });
            }

            updateErrorDots() {
                const dots = this.errorDots.querySelectorAll('.error-dot');
                dots.forEach((dot, index) => {
                    dot.className = 'error-dot';
                    if (index < this.game.errorCount) {
                        dot.classList.add('active');
                    }
                });
            }

            updateFeedback(message, type = '') {
                this.feedback.textContent = message;
                this.feedback.className = 'feedback';
                if (type) {
                    this.feedback.classList.add(type);
                }
            }

            onWordClick(word) {
                const result = this.game.selectWord(word);

                if (result.type === 'correct') {
                    this.updateUI();
                    this.updateFeedback('Correct!', 'success');

                    if (this.game.isSentenceComplete()) {
                        this.onSentenceComplete();
                    }
                }
                else if (result.type === 'incorrect') {
                    this.updateUI();
                    this.updateFeedback(`Wrong! Try: ${result.correctWord}`, 'error');
                }
                else if (result.type === 'reset') {
                    this.sentenceArea.classList.add('error');
                    this.updateFeedback('Too many errors! Sentence completed.', 'error');

                    setTimeout(() => {
                        this.onSentenceComplete();
                    }, 1000);
                }
            }

            onSentenceComplete() {
                this.sentenceArea.classList.add('success');

                // Speak the sentence
                this.game.speakSentence();

                // Complete current sentence
                this.game.completeCurrentSentence();

                // Move to next after delay
                setTimeout(() => {
                    if (!this.game.startNextSentence()) {
                        this.showCompletion();
                    } else {
                        this.updateUI();
                    }
                }, 1500);
            }

            showCompletion() {
                const progress = this.game.getProgress();
                const accuracy = progress.total > 0 ?
                    Math.round((progress.completed / progress.total) * 100) : 0;

                this.completionStats.textContent =
                    `Completed ${progress.completed} of ${progress.total} sentences\nAccuracy: ${accuracy}%`;

                this.completionOverlay.classList.add('active');
            }

            showError(message) {
                this.loading.innerHTML = `
                    <div style="color: #f44336; margin-bottom: 20px;">⚠️</div>
                    <div>${message}</div>
                    <button onclick="window.location.href='index.html'"
                            style="margin-top: 20px; padding: 12px 24px; background: #4caf50; color: white;
                                   border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">
                        Back to Lists
                    </button>
                `;
            }

            bindEvents() {
                this.backButton.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });

                this.completionButton.addEventListener('click', () => {
                    window.location.href = 'index.html';
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const gameUI = new GameUI();
            gameUI.init();
        });
    </script>
</body>
</html>
