<style>
    header {
        background: #333333;
        height: 100vh;
        color: white;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
    }
    .ripple {
        position: absolute;
        width: 150px;
        height: 150px;
        border: 3px solid transparent;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.2), transparent);
        animation: rippleGrow 5s infinite ease-in-out;
    }
    @keyframes rippleGrow {
        0% { transform: scale(0.5); opacity: 0.8; }
        50% { transform: scale(2); opacity: 0.4; }
        100% { transform: scale(3.5); opacity: 0; }
    }
    .drop {
        position: absolute;
        top: -50px;
        width: 2px;
        height: 20px;
        background: rgba(255,255,255,0.5);
        animation: rainFall 1s linear infinite;
    }
    @keyframes rainFall {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(120vh); opacity: 0; }
    }
    header h1 {
        font-size: 4em;
        margin: 0;
        z-index: 1;
    }
    header p {
        font-size: 1.8em;
        z-index: 1;
    }
    button {
        background: linear-gradient(135deg, #007bff, #00bfff);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 1.2em;
        cursor: pointer;
        border-radius: 30px;
        margin-top: 20px;
        transition: background 0.3s, transform 0.3s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 1;
    }
    button:hover {
        background: linear-gradient(135deg, #0056b3, #009acd);
        transform: scale(1.05);
    }
</style>
<header>
    <h1>Платная Рыбалка</h1>
    <p>Наслаждайтесь спокойным отдыхом и богатым уловом в живописных местах</p>
    <button>Записаться</button>
</header>
<script>
    function createRipple() {
        const ripple = document.createElement('div');
        ripple.classList.add('ripple');
        ripple.style.left = `${Math.random() * 90}%`;
        ripple.style.top = `${Math.random() * 90}%`;
        ripple.style.animationDelay = `${Math.random() * 2}s`;
        document.querySelector('header').appendChild(ripple);
        ripple.addEventListener('animationend', () => {
            ripple.remove();
        });
    }
    setInterval(createRipple, 2000);

    function createDrop() {
        const drop = document.createElement('div');
        drop.classList.add('drop');
        drop.style.left = `${Math.random() * 100}%`;
        drop.style.animationDuration = `${Math.random() * 0.5 + 0.5}s`;
        drop.style.animationDelay = `${Math.random() * 1}s`;
        document.querySelector('header').appendChild(drop);
        setTimeout(() => {
            drop.remove();
        }, 2000);
    }
    setInterval(createDrop, 50);
</script>
