<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentence Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .back-btn {
            font-size: 40px;
            cursor: pointer;
            color: #2196f3;
            font-weight: 800;
        }
        .progress {
            font-size: 18px;
            color: #4caf50;
            font-weight: 700;
        }
        .russian-hint {
            text-align: center;
            font-size: 18px;
            color: #bbbbbb;
            opacity: 0.6;
            margin-bottom: 20px;
        }
        .sentence-area {
            min-height: 80px;
            border: 2px dashed #333;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .sentence-slot {
            min-width: 60px;
            min-height: 40px;
            border-bottom: 2px solid #4caf50;
        }
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .word {
            padding: 10px 16px;
            background-color: #1e1e1e;
            border-radius: 8px;
            border: 2px solid #333;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.25s ease;
        }
        .word:hover {
            border-color: #4caf50;
            transform: scale(1.05);
        }
        .word.used {
            opacity: 0.3;
            pointer-events: none;
        }
        .error {
            animation: shake 0.4s;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="back-btn" id="back-btn">←</div>
        <div class="progress" id="progress"></div>
    </div>

    <div class="russian-hint" id="russian-hint"></div>

    <div class="sentence-area" id="sentence-area"></div>

    <div class="word-bank" id="word-bank"></div>
</div>

<script>
const sentences = [
    {
        ru: "Эта стратегия оказала значительное влияние на процесс.",
        en: "This strategy had a significant impact on the process"
    },
    {
        ru: "Результат зависит от выбранного подхода.",
        en: "The result depends on the chosen approach"
    },
    {
        ru: "Четкое понимание контекста улучшает процесс принятия решений.",
        en: "A clear understanding of the context improves the decision making process"
    }
];

const progressEl = document.getElementById('progress');
const ruHintEl = document.getElementById('russian-hint');
const sentenceArea = document.getElementById('sentence-area');
const wordBank = document.getElementById('word-bank');
const backBtn = document.getElementById('back-btn');

let index = 0;
let mistakeCount = 0;
let currentWords = [];
let placedCount = 0;

function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

function speak(text) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    speechSynthesis.speak(u);
}

function resetSentence() {
    mistakeCount = 0;
    placedCount = 0;
    sentenceArea.innerHTML = '';
    wordBank.innerHTML = '';

    const sentence = sentences[index];
    const words = sentence.en.split(' ');
    currentWords = words;

    ruHintEl.textContent = sentence.ru;
    progressEl.textContent = `${index + 1} / ${sentences.length}`;

    words.forEach(() => {
        const slot = document.createElement('div');
        slot.className = 'sentence-slot';
        sentenceArea.appendChild(slot);
    });

    shuffle(words).forEach(word => {
        const el = document.createElement('div');
        el.className = 'word';
        el.textContent = word;
        el.addEventListener('click', () => onWordClick(el, word));
        wordBank.appendChild(el);
    });
}

function onWordClick(el, word) {
    const expected = currentWords[placedCount];

    if (word === expected) {
        const slot = sentenceArea.children[placedCount];
        slot.textContent = word;
        el.classList.add('used');
        placedCount++;

        if (placedCount === currentWords.length) {
            speak(currentWords.join(' '));
            setTimeout(() => {
                index++;
                if (index >= sentences.length) {
                    window.location.href = 'index.html';
                } else {
                    resetSentence();
                }
            }, 1200);
        }
    } else {
        mistakeCount++;
        sentenceArea.classList.add('error');
        setTimeout(() => sentenceArea.classList.remove('error'), 400);

        if (mistakeCount >= 3) {
            resetSentence();
        }
    }
}

backBtn.addEventListener('click', () => {
    window.location.href = 'index.html';
});

resetSentence();
</script>
</body>
</html>
