<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Review Words - Always Free English</title>
    <!-- PWA мета-теги -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#121212">
    <!-- Шрифты -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', Arial, sans-serif;
            background: linear-gradient(135deg, #121212 0%, #1a1a1a 50%, #121212 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            color: #ffffff;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Контейнер для плавного фона */
        .background-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
            transition: all 0.5s ease;
        }
        .gradient-overlay {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .gradient-known {
            background: radial-gradient(circle at center,
                rgba(76, 175, 80, 0) 0%,
                rgba(76, 175, 80, 0.15) 30%,
                rgba(76, 175, 80, 0.3) 50%,
                rgba(76, 175, 80, 0.4) 70%,
                rgba(76, 175, 80, 0.6) 100%);
        }
        .gradient-review {
            background: radial-gradient(circle at center,
                rgba(255, 152, 0, 0) 0%,
                rgba(255, 152, 0, 0.15) 30%,
                rgba(255, 152, 0, 0.3) 50%,
                rgba(255, 152, 0, 0.4) 70%,
                rgba(255, 152, 0, 0.6) 100%);
        }
        /* Эффект волн при улетании */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            transform: scale(0);
            pointer-events: none;
            z-index: 3;
        }
        .ripple-known {
            background: radial-gradient(circle, rgba(76, 175, 80, 0.2) 0%, transparent 70%);
        }
        .ripple-review {
            background: radial-gradient(circle, rgba(255, 152, 0, 0.2) 0%, transparent 70%);
        }
        /* Эффект частиц */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
        /* Горизонтальные зоны для ПК по умолчанию */
        .horizontal-left-overlay, .horizontal-right-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 50%;
            display: flex;
            align-items: center;
            background-color: transparent;
            z-index: 1;
            pointer-events: none;
        }
        .horizontal-left-overlay {
            left: 0;
            justify-content: center;
        }
        .horizontal-right-overlay {
            right: 0;
            justify-content: center;
        }
        /* Вертикальные зоны для мобильных (скрыты по умолчанию) */
        .vertical-top-overlay, .vertical-bottom-overlay {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            display: none;
            align-items: center;
            background-color: transparent;
            z-index: 1;
            pointer-events: none;
        }
        .vertical-top-overlay {
            top: 0;
            height: 50%;
            justify-content: center;
            align-items: center;
        }
        .vertical-bottom-overlay {
            bottom: 0;
            height: 50%;
            justify-content: center;
            align-items: center;
        }
        .icon {
            font-size: 70px;
            opacity: 0.3;
            font-weight: 800;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .horizontal-left-overlay .icon,
        .vertical-top-overlay .icon {
            color: #4caf50;
            filter: drop-shadow(0 0 15px rgba(76, 175, 80, 0.7));
        }
        .horizontal-right-overlay .icon,
        .vertical-bottom-overlay .icon {
            color: #ff9800;
            filter: drop-shadow(0 0 15px rgba(255, 152, 0, 0.7));
        }
        /* Фоновые иконки (белые, без цвета) */
        .background-icon {
            position: absolute;
            font-size: 200px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
            pointer-events: none;
            user-select: none;
            opacity: 0.8;
        }
        /* Для мобильных */
        .background-icon-mobile-top {
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 180px;
            opacity: 0.05;
        }
        .background-icon-mobile-bottom {
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 180px;
            opacity: 0.05;
        }
        /* Для ПК */
        .background-icon-pc-left {
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            font-size: 200px;
            opacity: 0.05;
        }
        .background-icon-pc-right {
            top: 50%;
            right: 10%;
            transform: translateY(-50%);
            font-size: 200px;
            opacity: 0.05;
        }
        /* СТИЛЬНЫЙ КРУГ С ЭФФЕКТАМИ */
        .word-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 50% 50%,
                rgba(40, 40, 40, 0.95) 0%,
                rgba(30, 30, 30, 0.9) 70%,
                rgba(20, 20, 20, 0.85) 100%);
            border-radius: 50%;
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 0 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            cursor: grab;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            z-index: 4;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            transform-origin: center;
            transform-style: preserve-3d;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .word-circle:active {
            cursor: grabbing;
        }
        /* Эффект свечения при драге */
        .word-circle.dragging {
            box-shadow:
                0 20px 45px rgba(0, 0, 0, 0.8),
                0 0 0 2px rgba(255, 255, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.7);
        }
        .word-circle.dragging.known-zone {
            box-shadow:
                0 20px 45px rgba(76, 175, 80, 0.3),
                0 0 0 3px rgba(76, 175, 80, 0.4),
                inset 0 0 30px rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.3);
        }
        .word-circle.dragging.review-zone {
            box-shadow:
                0 20px 45px rgba(255, 152, 0, 0.3),
                0 0 0 3px rgba(255, 152, 0, 0.4),
                inset 0 0 30px rgba(255, 152, 0, 0.1);
            border-color: rgba(255, 152, 0, 0.3);
        }
        /* Пульсация при приближении к зоне */
        @keyframes pulse-known {
            0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
        }
        @keyframes pulse-review {
            0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 152, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); }
        }
        .word-circle.pulse-known {
            animation: pulse-known 2s infinite;
        }
        .word-circle.pulse-review {
            animation: pulse-review 2s infinite;
        }
        .english {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            transition: all 0.3s ease;
            margin: 0;
            padding: 0 30px;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
            max-width: 90%;
        }
        .word-circle.dragging .english {
            transform: scale(1.4);
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .translation-behind {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 22px;
            font-weight: 700;
            color: #4caf50;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 20px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .translation-behind.show {
            opacity: 0.95;
        }
        /* Индикатор перевода */
        .hint-translation {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .word-circle:hover .hint-translation {
            opacity: 1;
        }
        /* Мобильный хедер */
        .mobile-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: auto;
            min-height: 70px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: stretch;
            z-index: 20;
            border-bottom: 1px solid #333;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            padding-top: env(safe-area-inset-top);
        }
        .mobile-header.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .mobile-header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px 5px;
            width: 100%;
            box-sizing: border-box;
        }
        .mobile-back-button {
            width: 44px;
            height: 44px;
            background-color: transparent;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #ffffff;
            font-size: 24px;
            padding: 0;
            margin: 0;
            position: relative;
        }
        .mobile-back-button:before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 10px;
            height: 10px;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        .mobile-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            flex: 1;
            margin: 0 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.2;
        }
        /* Полоса прогресса внизу */
        .bottom-progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            z-index: 20;
            transition: opacity 0.3s ease;
            opacity: 0;
            visibility: hidden;
        }
        .bottom-progress-container.visible {
            opacity: 1;
            visibility: visible;
        }
        .bottom-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #ff9800);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 0;
        }
        /* Инструкция для мобильных */
        .mobile-hint {
            position: absolute;
            bottom: calc(var(--safe-area-bottom, 0px) + 30px);
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #666;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding: 0 20px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
        }
        .mobile-hint.visible {
            opacity: 1;
            visibility: visible;
        }
        /* Инструкция для ПК */
        .pc-hint {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: #666;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            padding: 0 20px;
            box-sizing: border-box;
            opacity: 0;
            visibility: hidden;
        }
        .pc-hint.visible {
            opacity: 1;
            visibility: visible;
        }
        /* PC хедер */
        .top-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            padding: 0 20px;
            box-sizing: border-box;
        }
        .top-area.visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .back-button {
            width: 44px;
            height: 44px;
            background-color: transparent;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #ffffff;
            font-size: 24px;
            padding: 0;
            margin: 20px 0 0 20px;
            position: relative;
        }
        .back-button:before {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 10px;
            height: 10px;
            border-left: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        /* Заголовок раздела */
        .section-title {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 30px;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .section-title.visible {
            opacity: 1;
            visibility: visible;
        }
        .loader-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 18, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top: 4px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #ffffff;
            z-index: 5;
        }
        /* Анимации для улетания круга */
        @keyframes flyOutLeft {
            0% { transform: translate(var(--startX), var(--startY)) rotate(0deg); }
            50% { transform: translate(calc(var(--startX) - 100px), var(--startY)) rotate(-20deg) scale(0.9); }
            100% { transform: translate(-1000px, var(--startY)) rotate(-30deg) scale(0.8); opacity: 0; }
        }
        @keyframes flyOutRight {
            0% { transform: translate(var(--startX), var(--startY)) rotate(0deg); }
            50% { transform: translate(calc(var(--startX) + 100px), var(--startY)) rotate(20deg) scale(0.9); }
            100% { transform: translate(1000px, var(--startY)) rotate(30deg) scale(0.8); opacity: 0; }
        }
        @keyframes flyOutUp {
            0% { transform: translate(var(--startX), var(--startY)) rotate(0deg); }
            50% { transform: translate(var(--startX), calc(var(--startY) - 100px)) rotate(-20deg) scale(0.9); }
            100% { transform: translate(var(--startX), -1000px) rotate(-30deg) scale(0.8); opacity: 0; }
        }
        @keyframes flyOutDown {
            0% { transform: translate(var(--startX), var(--startY)) rotate(0deg); }
            50% { transform: translate(var(--startX), calc(var(--startY) + 100px)) rotate(20deg) scale(0.9); }
            100% { transform: translate(var(--startX), 1000px) rotate(30deg) scale(0.8); opacity: 0; }
        }
        .fly-out-left {
            animation: flyOutLeft 0.6s ease forwards;
        }
        .fly-out-right {
            animation: flyOutRight 0.6s ease forwards;
        }
        .fly-out-up {
            animation: flyOutUp 0.6s ease forwards;
        }
        .fly-out-down {
            animation: flyOutDown 0.6s ease forwards;
        }
        /* Эффект волн */
        @keyframes ripple {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
        .ripple {
            animation: ripple 0.8s ease-out;
        }
        /* Мобильные стили */
        @media (max-width: 768px) {
            :root {
                --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            }

            .horizontal-left-overlay,
            .horizontal-right-overlay {
                display: none !important;
            }
            .vertical-top-overlay,
            .vertical-bottom-overlay {
                display: flex;
            }
            .mobile-header {
                display: flex;
            }
            .top-area {
                display: none;
            }
            .section-title {
                display: none;
            }
            .pc-hint {
                display: none;
            }
            .word-circle {
                width: 240px;
                height: 240px;
            }
            .english {
                font-size: 24px;
                padding: 0 20px;
            }
            .translation-behind {
                font-size: 18px;
                width: 210px;
                height: 210px;
            }
            .icon {
                font-size: 70px;
            }
            .mobile-back-button {
                width: 40px;
                height: 40px;
            }
            .mobile-back-button:before {
                width: 8px;
                height: 8px;
            }
            .bottom-progress-container {
                bottom: calc(env(safe-area-inset-bottom, 0px));
            }
            /* Показываем мобильные фоновые иконки */
            .background-icon-mobile-top,
            .background-icon-mobile-bottom {
                display: block;
            }
            .background-icon-pc-left,
            .background-icon-pc-right {
                display: none;
            }
            .hint-translation {
                bottom: -35px;
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            .word-circle {
                width: 220px;
                height: 220px;
            }
            .english {
                font-size: 22px;
            }
            .translation-behind {
                font-size: 16px;
                width: 190px;
                height: 190px;
            }
            .icon {
                font-size: 60px;
            }
            .background-icon-mobile-top,
            .background-icon-mobile-bottom {
                font-size: 150px;
            }
            .hint-translation {
                bottom: -30px;
                font-size: 11px;
            }
        }
        /* Десктопные стили */
        @media (min-width: 769px) {
            .mobile-header {
                display: none;
            }
            .section-title {
                display: block;
            }
            .mobile-hint {
                display: none;
            }
            .pc-hint {
                display: block;
            }
            /* Показываем ПК фоновые иконки */
            .background-icon-pc-left,
            .background-icon-pc-right {
                display: block;
            }
            .background-icon-mobile-top,
            .background-icon-mobile-bottom {
                display: none;
            }
            .word-circle {
                width: 280px;
                height: 280px;
            }
        }
        /* Безопасная зона для iPhone */
        @supports (padding: max(0px)) {
            .mobile-header {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: env(safe-area-inset-top);
                min-height: calc(70px + env(safe-area-inset-top));
            }
            .mobile-hint {
                bottom: calc(env(safe-area-inset-bottom, 0px) + 30px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Фоновые иконки для мобильных -->
        <div class="background-icon background-icon-mobile-top">✓</div>
        <div class="background-icon background-icon-mobile-bottom">↻</div>

        <!-- Фоновые иконки для ПК -->
        <div class="background-icon background-icon-pc-left">✓</div>
        <div class="background-icon background-icon-pc-right">↻</div>

        <!-- Плавный фон для зон -->
        <div class="background-gradient">
            <div class="gradient-overlay gradient-known" id="gradient-known"></div>
            <div class="gradient-overlay gradient-review" id="gradient-review"></div>
        </div>

        <!-- Контейнер для частиц -->
        <div class="particles-container" id="particles-container"></div>

        <!-- Горизонтальные зоны для ПК -->
        <div class="horizontal-left-overlay">
            <div class="icon">✓</div>
        </div>
        <div class="horizontal-right-overlay">
            <div class="icon">↻</div>
        </div>
        <!-- Вертикальные зоны для мобильных -->
        <div class="vertical-top-overlay">
            <div class="icon">✓</div>
        </div>
        <div class="vertical-bottom-overlay">
            <div class="icon">↻</div>
        </div>
        <div class="loader-overlay" id="loader-overlay">
            <div class="loader-spinner"></div>
        </div>
        <!-- PC хедер -->
        <div class="top-area" id="top-area">
            <div class="back-button" id="back-button"></div>
        </div>
        <!-- Заголовок раздела для ПК -->
        <div class="section-title" id="section-title">Review Words</div>
        <!-- Мобильный хедер -->
        <div class="mobile-header" id="mobile-header">
            <div class="mobile-header-top">
                <div class="mobile-back-button" id="mobile-back-button"></div>
                <div class="mobile-title" id="mobile-title">Review Words</div>
            </div>
        </div>
        <!-- Полоса прогресса внизу -->
        <div class="bottom-progress-container" id="bottom-progress-container">
            <div class="bottom-progress-bar" id="bottom-progress-bar"></div>
        </div>
        <!-- Мобильная инструкция -->
        <div class="mobile-hint" id="mobile-hint">Вверх — слово знаете, вниз — для повтора</div>
        <!-- Инструкция для ПК -->
        <div class="pc-hint" id="pc-hint">Влево — слово знаете, вправо — для повтора</div>
        <div class="translation-behind" id="translation-behind"></div>
        <div id="word-circle" class="word-circle">
            <div class="english"></div>
        </div>
        <div class="loading" id="loading">Loading words...</div>
    </div>
    <script>
        const WordDB = {
            saveWordStatus(listId, english, status) {
                const key = `word_${listId}_${english}`;
                localStorage.setItem(key, status);
            },
            getWordStatus(listId, english) {
                const key = `word_${listId}_${english}`;
                return localStorage.getItem(key) || 'new';
            },
            updateListStatus(listData) {
                if (!listData.words) return listData;
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                });
                return listData;
            },
            getWordsForReview(listData) {
                const reviewedWords = [];
                const newWords = [];
                listData.words.forEach(word => {
                    const status = this.getWordStatus(listData.filename, word.english);
                    word.status = status;
                    if (status === 'review') {
                        reviewedWords.push(word);
                    } else if (status === 'new') {
                        newWords.push(word);
                    }
                });
                return [...reviewedWords, ...newWords];
            }
        };

        // Аудио менеджер
        const AudioManager = {
            audioContext: null,
            audioElements: new Map(),

            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            },

            async playWordAudio(word) {
                try {
                    const audioPath = `audio/${word.english.toLowerCase().replace(/[^a-z0-9]/g, '_')}.wav`;

                    if (this.audioElements.has(word.english)) {
                        const audio = this.audioElements.get(word.english);
                        audio.currentTime = 0;
                        await audio.play();
                        return;
                    }

                    const audio = new Audio(audioPath);
                    audio.preload = 'auto';

                    audio.addEventListener('error', (e) => {
                        console.log(`Audio not found for: ${word.english}`);
                    });

                    audio.addEventListener('canplaythrough', async () => {
                        try {
                            await audio.play();
                            this.audioElements.set(word.english, audio);
                        } catch (err) {
                            console.log(`Could not play audio for: ${word.english}`);
                        }
                    });

                    audio.addEventListener('error', () => {
                        console.log(`Audio file not found: ${audioPath}`);
                    });

                } catch (error) {
                    console.log(`Audio playback issue for: ${word.english}`);
                }
            },

            async testAudio() {
                try {
                    const testAudio = new Audio();
                    testAudio.src = 'audio/test.wav';
                    await testAudio.play();
                    console.log('Audio test: OK');
                } catch (error) {
                    console.log('Audio test: No audio files found');
                }
            }
        };

        const Utils = {
            shuffleArray(array) {
                const shuffled = [...array];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            },
            isMobileDevice() {
                return window.innerWidth <= 768 ||
                       'ontouchstart' in window ||
                       navigator.maxTouchPoints > 0;
            }
        };

        // Менеджер эффектов
        const EffectsManager = {
            particlesContainer: null,

            init() {
                this.particlesContainer = document.getElementById('particles-container');
            },

            createParticles(x, y, color, count = 20) {
                for (let i = 0; i < count; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = `${x}px`;
                    particle.style.top = `${y}px`;
                    particle.style.backgroundColor = color;

                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 3;
                    const duration = 0.8 + Math.random() * 0.5;

                    particle.style.setProperty('--angle', angle);
                    particle.style.setProperty('--speed', speed);

                    this.particlesContainer.appendChild(particle);

                    requestAnimationFrame(() => {
                        particle.style.transition = `all ${duration}s ease-out`;
                        particle.style.transform = `translate(
                            ${Math.cos(angle) * 100 * speed}px,
                            ${Math.sin(angle) * 100 * speed}px
                        )`;
                        particle.style.opacity = '0';
                    });

                    setTimeout(() => {
                        if (particle.parentNode) {
                            particle.parentNode.removeChild(particle);
                        }
                    }, duration * 1000);
                }
            },

            createRipple(x, y, type) {
                const ripple = document.createElement('div');
                ripple.className = `ripple-effect ${type === 'known' ? 'ripple-known' : 'ripple-review'}`;
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = ripple.style.height = '100px';

                document.querySelector('.container').appendChild(ripple);

                requestAnimationFrame(() => {
                    ripple.classList.add('ripple');
                });

                setTimeout(() => {
                    if (ripple.parentNode) {
                        ripple.parentNode.removeChild(ripple);
                    }
                }, 800);
            },

            createTrail(x, y, color) {
                const trail = document.createElement('div');
                trail.className = 'particle';
                trail.style.left = `${x}px`;
                trail.style.top = `${y}px`;
                trail.style.backgroundColor = color;
                trail.style.width = trail.style.height = '8px';
                trail.style.opacity = '0.7';

                this.particlesContainer.appendChild(trail);

                setTimeout(() => {
                    trail.style.transition = 'all 0.5s ease-out';
                    trail.style.transform = 'scale(0)';
                    trail.style.opacity = '0';

                    setTimeout(() => {
                        if (trail.parentNode) {
                            trail.parentNode.removeChild(trail);
                        }
                    }, 500);
                }, 10);
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const listId = urlParams.get('list');
            const sessionId = urlParams.get('session');

            if (!listId && !sessionId) {
                window.location.href = 'index.html';
                return;
            }

            let wordQueue = [];
            let currentList = null;
            let isCombinedMode = false;
            const isMobile = Utils.isMobileDevice();
            const wordCircle = document.getElementById('word-circle');
            const englishEl = wordCircle.querySelector('.english');
            const translationBehind = document.getElementById('translation-behind');
            const backButton = document.getElementById('back-button');
            const mobileBackButton = document.getElementById('mobile-back-button');
            const mobileHeader = document.getElementById('mobile-header');
            const mobileHint = document.getElementById('mobile-hint');
            const pcHint = document.getElementById('pc-hint');
            const loadingEl = document.getElementById('loading');
            const loaderOverlay = document.getElementById('loader-overlay');
            const mobileTitle = document.getElementById('mobile-title');
            const sectionTitle = document.getElementById('section-title');
            const bottomProgressContainer = document.getElementById('bottom-progress-container');
            const bottomProgressBar = document.getElementById('bottom-progress-bar');
            const topArea = document.getElementById('top-area');

            const gradientKnown = document.getElementById('gradient-known');
            const gradientReview = document.getElementById('gradient-review');

            const leftOverlay = document.querySelector('.horizontal-left-overlay');
            const rightOverlay = document.querySelector('.horizontal-right-overlay');
            const topOverlay = document.querySelector('.vertical-top-overlay');
            const bottomOverlay = document.querySelector('.vertical-bottom-overlay');

            let currentWord = null;
            let isDragging = false;
            let currentIndex = 0;
            let isProcessingAction = false;
            let dragStartTime = 0;
            let startX = 0;
            let startY = 0;
            let currentX = 0;
            let currentY = 0;
            let initialTranslateX = 0;
            let initialTranslateY = 0;
            let isUIHidden = true;

            // Инициализация
            AudioManager.init();
            EffectsManager.init();

            async function loadData() {
                try {
                    if (sessionId) {
                        isCombinedMode = true;
                        const sessionData = JSON.parse(localStorage.getItem(sessionId) || '{}');
                        if (!sessionData.words || sessionData.words.length === 0) {
                            throw new Error('Session data not found');
                        }
                        wordQueue = sessionData.words;
                        currentList = { filename: 'combined' };
                        mobileTitle.textContent = 'Multiple Lists';
                        sectionTitle.textContent = 'Multiple Lists';
                    } else if (listId) {
                        isCombinedMode = false;
                        if (listId.startsWith('default_')) {
                            const defaultLists = JSON.parse(localStorage.getItem('default_lists') || '[]');
                            currentList = defaultLists.find(list => list.filename === listId);
                            if (!currentList) {
                                throw new Error('Default list not found');
                            }
                        } else {
                            const response = await fetch(listId);
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            const text = await response.text();
                            currentList = JSON.parse(text);
                        }
                        if (!currentList.words || !Array.isArray(currentList.words)) {
                            throw new Error('Invalid list format');
                        }
                        currentList.filename = listId;
                        mobileTitle.textContent = currentList.name || 'Review Words';
                        sectionTitle.textContent = currentList.name || 'Review Words';
                        WordDB.updateListStatus(currentList);
                        const wordsForReview = WordDB.getWordsForReview(currentList);
                        wordQueue = Utils.shuffleArray(wordsForReview);
                    }

                    if (wordQueue.length === 0) {
                        showLoader();
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 800);
                        return;
                    }

                    loadingEl.style.display = 'none';
                    wordCircle.style.display = 'flex';
                    currentIndex = 0;
                    showNextWord();
                    updateProgress();

                    isUIHidden = true;
                    updateUIVisibility();

                    setTimeout(() => {
                        AudioManager.testAudio();
                    }, 1000);

                } catch (error) {
                    console.error('Error loading data:', error);
                    loadingEl.textContent = 'Error loading words.';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                }
            }

            function showLoader() {
                loaderOverlay.classList.add('active');
            }

            function hideLoader() {
                loaderOverlay.classList.remove('active');
            }

            function showNextWord() {
                if (currentIndex >= wordQueue.length) {
                    showLoader();
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                    return;
                }
                currentWord = wordQueue[currentIndex];
                englishEl.textContent = currentWord.english;
                translationBehind.textContent = currentWord.russian || currentWord.translation || '';
                resetCirclePosition();
                hideLoader();

                if (currentWord.english) {
                    setTimeout(() => {
                        AudioManager.playWordAudio(currentWord);
                    }, 300);
                }
            }

            function resetCirclePosition() {
                wordCircle.style.transform = 'translate(-50%, -50%) rotate(0deg) scale(1)';
                wordCircle.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                englishEl.style.transform = 'scale(1)';
                translationBehind.classList.remove('show');
                wordCircle.classList.remove('dragging', 'known-zone', 'review-zone', 'pulse-known', 'pulse-review');
                resetZones();
                wordCircle.classList.remove('fly-out-left', 'fly-out-right', 'fly-out-up', 'fly-out-down');
            }

            function updateProgress() {
                const totalWords = wordQueue.length;
                const currentPosition = currentIndex;
                const progressPercentage = (currentPosition / totalWords) * 100;
                bottomProgressBar.style.width = `${progressPercentage}%`;
            }

            function updateUIVisibility() {
                if (isMobile) {
                    if (isUIHidden) {
                        mobileHeader.classList.remove('visible');
                        mobileHint.classList.remove('visible');
                        bottomProgressContainer.classList.remove('visible');
                    } else {
                        mobileHeader.classList.add('visible');
                        mobileHint.classList.add('visible');
                        bottomProgressContainer.classList.add('visible');
                    }
                } else {
                    if (isUIHidden) {
                        topArea.classList.remove('visible');
                        bottomProgressContainer.classList.remove('visible');
                        sectionTitle.classList.remove('visible');
                        pcHint.classList.remove('visible');
                    } else {
                        topArea.classList.add('visible');
                        bottomProgressContainer.classList.add('visible');
                        sectionTitle.classList.add('visible');
                        pcHint.classList.add('visible');
                    }
                }
            }

            function toggleUI() {
                isUIHidden = !isUIHidden;
                updateUIVisibility();
            }

            function startDrag(e) {
                if (isProcessingAction) return;
                e.preventDefault();
                e.stopPropagation();

                isDragging = true;
                dragStartTime = Date.now();
                const transform = window.getComputedStyle(wordCircle).transform;
                const matrix = new DOMMatrix(transform);
                initialTranslateX = matrix.m41;
                initialTranslateY = matrix.m42;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                startX = clientX;
                startY = clientY;
                wordCircle.style.transition = 'none';
                wordCircle.classList.add('dragging');
                translationBehind.classList.add('show');

                if (!isUIHidden) {
                    isUIHidden = true;
                    updateUIVisibility();
                }
            }

            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();
                e.stopPropagation();

                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                const deltaX = clientX - startX;
                const deltaY = clientY - startY;

                // Создаем эффект шлейфа при движении
                if (Date.now() - dragStartTime > 100 && (Math.abs(deltaX) > 5 || Math.abs(deltaY) > 5)) {
                    const rect = wordCircle.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;

                    if (Math.random() > 0.7) {
                        EffectsManager.createTrail(
                            centerX + (Math.random() - 0.5) * 50,
                            centerY + (Math.random() - 0.5) * 50,
                            isMobile ? (deltaY < 0 ? '#4caf50' : '#ff9800') : (deltaX < 0 ? '#4caf50' : '#ff9800')
                        );
                    }
                }

                if (isMobile) {
                    const rotation = deltaY / 15;
                    const scale = 1 - Math.abs(deltaY) / 500;
                    wordCircle.style.transform = `translate(-50%, ${initialTranslateY + deltaY}px) rotate(${rotation}deg) scale(${Math.max(scale, 0.85)})`;
                    currentY = deltaY;
                    checkZonesMobile();
                } else {
                    const rotation = deltaX / 20;
                    const scale = 1 - Math.abs(deltaX) / 500;
                    wordCircle.style.transform = `translate(${initialTranslateX + deltaX}px, -50%) rotate(${rotation}deg) scale(${Math.max(scale, 0.85)})`;
                    currentX = deltaX;
                    checkZonesDesktop();
                }
            }

            function checkZonesDesktop() {
                const delta = currentX;
                const swipeThreshold = 120;
                const minThreshold = 30;

                gradientKnown.style.opacity = '0';
                gradientReview.style.opacity = '0';
                wordCircle.classList.remove('known-zone', 'review-zone', 'pulse-known', 'pulse-review');

                if (delta < -minThreshold) {
                    const intensity = Math.min(Math.abs(delta) / swipeThreshold, 1);
                    gradientKnown.style.opacity = intensity * 0.8;
                    gradientKnown.style.transform = `translateX(${intensity * -20}px)`;
                    wordCircle.classList.add('known-zone');
                    if (intensity > 0.7) wordCircle.classList.add('pulse-known');
                } else if (delta > minThreshold) {
                    const intensity = Math.min(Math.abs(delta) / swipeThreshold, 1);
                    gradientReview.style.opacity = intensity * 0.8;
                    gradientReview.style.transform = `translateX(${intensity * 20}px)`;
                    wordCircle.classList.add('review-zone');
                    if (intensity > 0.7) wordCircle.classList.add('pulse-review');
                }
            }

            function checkZonesMobile() {
                const delta = currentY;
                const swipeThreshold = 80;
                const minThreshold = 20;

                gradientKnown.style.opacity = '0';
                gradientReview.style.opacity = '0';
                wordCircle.classList.remove('known-zone', 'review-zone', 'pulse-known', 'pulse-review');

                if (delta < -minThreshold) {
                    const intensity = Math.min(Math.abs(delta) / swipeThreshold, 1);
                    gradientKnown.style.opacity = intensity * 0.8;
                    gradientKnown.style.transform = `translateY(${intensity * -20}px)`;
                    wordCircle.classList.add('known-zone');
                    if (intensity > 0.7) wordCircle.classList.add('pulse-known');
                } else if (delta > minThreshold) {
                    const intensity = Math.min(Math.abs(delta) / swipeThreshold, 1);
                    gradientReview.style.opacity = intensity * 0.8;
                    gradientReview.style.transform = `translateY(${intensity * 20}px)`;
                    wordCircle.classList.add('review-zone');
                    if (intensity > 0.7) wordCircle.classList.add('pulse-review');
                }
            }

            function resetZones() {
                gradientKnown.style.opacity = '0';
                gradientReview.style.opacity = '0';
                gradientKnown.style.transform = 'translateX(0)';
                gradientReview.style.transform = 'translateX(0)';
                wordCircle.classList.remove('known-zone', 'review-zone', 'pulse-known', 'pulse-review');
            }

            function endDrag(e) {
                if (!isDragging || isProcessingAction) {
                    isDragging = false;
                    wordCircle.classList.remove('dragging');
                    return;
                }
                e.preventDefault();
                e.stopPropagation();

                const dragDuration = Date.now() - dragStartTime;
                if (dragDuration < 100) {
                    isDragging = false;
                    wordCircle.classList.remove('dragging');
                    resetCirclePosition();
                    translationBehind.classList.remove('show');
                    resetZones();
                    return;
                }

                isProcessingAction = true;
                isDragging = false;
                wordCircle.classList.remove('dragging');

                let action = null;
                let swipeClass = '';
                let effectColor = '';
                const transform = window.getComputedStyle(wordCircle).transform;
                const matrix = new DOMMatrix(transform);
                const currentXPos = matrix.m41;
                const currentYPos = matrix.m42;

                // Устанавливаем начальную позицию для анимации
                wordCircle.style.setProperty('--startX', `${currentXPos}px`);
                wordCircle.style.setProperty('--startY', `${currentYPos}px`);

                if (isMobile) {
                    const delta = currentY;
                    const swipeThreshold = 80;

                    if (delta < -swipeThreshold) {
                        action = 'known';
                        swipeClass = 'fly-out-up';
                        effectColor = '#4caf50';
                    } else if (delta > swipeThreshold) {
                        action = 'review';
                        swipeClass = 'fly-out-down';
                        effectColor = '#ff9800';
                    }
                } else {
                    const delta = currentX;
                    const swipeThreshold = 120;

                    if (delta < -swipeThreshold) {
                        action = 'known';
                        swipeClass = 'fly-out-left';
                        effectColor = '#4caf50';
                    } else if (delta > swipeThreshold) {
                        action = 'review';
                        swipeClass = 'fly-out-right';
                        effectColor = '#ff9800';
                    }
                }

                if (!action) {
                    resetCirclePosition();
                    translationBehind.classList.remove('show');
                    resetZones();
                    isProcessingAction = false;
                    return;
                }

                // Создаем эффекты
                const rect = wordCircle.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                EffectsManager.createRipple(centerX, centerY, action);
                EffectsManager.createParticles(centerX, centerY, effectColor, 30);

                translationBehind.classList.remove('show');
                resetZones();
                wordCircle.classList.add(swipeClass);

                if (!isCombinedMode) {
                    WordDB.saveWordStatus(currentList.filename, currentWord.english, action);
                }

                currentIndex++;
                updateProgress();

                setTimeout(() => {
                    showNextWord();
                    isProcessingAction = false;
                }, 600);
            }

            function goBack() {
                window.location.href = 'index.html';
            }

            function handleScreenTap(e) {
                if (isDragging || isProcessingAction) return;
                const isCircleClick = e.target.closest('#word-circle');
                const isBackButton = e.target.closest('#back-button, #mobile-back-button');
                if (!isCircleClick && !isBackButton) {
                    toggleUI();
                }
            }

            function toggleTranslation() {
                if (!isProcessingAction && !isDragging) {
                    translationBehind.classList.toggle('show');
                }
            }

            // Инициализация событий
            backButton.addEventListener('click', goBack);
            mobileBackButton.addEventListener('click', goBack);

            wordCircle.addEventListener('click', (e) => {
                if (!isDragging) {
                    toggleTranslation();
                }
            });

            wordCircle.addEventListener('mousedown', startDrag);
            wordCircle.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);

            document.addEventListener('click', handleScreenTap);
            document.addEventListener('touchend', handleScreenTap, { passive: true });
            wordCircle.addEventListener('contextmenu', (e) => e.preventDefault());

            // Обработчики клавиатуры
            document.addEventListener('keydown', (e) => {
                if (isProcessingAction) return;
                if (e.key === 'ArrowLeft' || e.key === 'a') {
                    processAction('known');
                } else if (e.key === 'ArrowRight' || e.key === 'd') {
                    processAction('review');
                } else if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    toggleTranslation();
                } else if (e.key === 'Escape') {
                    goBack();
                } else if (e.key === 'h') {
                    toggleUI();
                } else if (e.key === 'p' || e.key === 'P') {
                    if (currentWord) {
                        AudioManager.playWordAudio(currentWord);
                    }
                }
            });

            async function processAction(action) {
                if (isProcessingAction) return;
                isProcessingAction = true;

                // Эффекты для клавиатурного ввода
                const rect = wordCircle.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                EffectsManager.createRipple(centerX, centerY, action);
                EffectsManager.createParticles(centerX, centerY, action === 'known' ? '#4caf50' : '#ff9800', 20);

                // Анимация улетания
                const transform = window.getComputedStyle(wordCircle).transform;
                const matrix = new DOMMatrix(transform);
                const currentXPos = matrix.m41;
                const currentYPos = matrix.m42;

                wordCircle.style.setProperty('--startX', `${currentXPos}px`);
                wordCircle.style.setProperty('--startY', `${currentYPos}px`);

                if (action === 'known') {
                    wordCircle.classList.add(isMobile ? 'fly-out-up' : 'fly-out-left');
                } else {
                    wordCircle.classList.add(isMobile ? 'fly-out-down' : 'fly-out-right');
                }

                if (!isCombinedMode) {
                    WordDB.saveWordStatus(currentList.filename, currentWord.english, action);
                }

                currentIndex++;
                updateProgress();

                await new Promise(resolve => setTimeout(resolve, 600));
                showNextWord();
                isProcessingAction = false;
            }

            // Начальная загрузка
            wordCircle.style.display = 'none';
            loadData();
        });
    </script>
</body>
</html>
