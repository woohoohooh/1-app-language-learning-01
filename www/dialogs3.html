<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Dialogue Practice</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #121212;
            color: #fff;
            font-family: Nunito, Arial, sans-serif;
            overflow: hidden;
        }

        :root {
            --header-offset: 0.5cm;
            --hint-offset: 2cm;
        }

        /* Hidden UI by default */
        .hidden-ui {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .visible-ui {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* Header */
        .top-area {
            position: absolute;
            top: calc(var(--header-offset) + env(safe-area-inset-top, 0px));
            left: 0;
            right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .top-inner {
            width: 100%;
            max-width: 900px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .top-left, .top-center, .top-right {
            display: flex;
            align-items: center;
        }

        .top-left {
            flex: 0 0 48px;
        }

        .top-center {
            flex: 1 1 auto;
            justify-content: center;
            text-align: center;
        }

        .top-right {
            flex: 0 0 auto;
        }

        .back-button {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.04);
            z-index: 5;
        }

        .back-button:before {
            content: '';
            width: 10px;
            height: 10px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: translateY(1px) rotate(45deg);
            display: block;
        }

        .section-title {
            font-weight: 700;
            font-size: 18px;
            z-index: 4;
        }

        .dialogue-subtitle {
            font-size: 14px;
            color: #aaa;
            margin-top: 2px;
            font-weight: 400;
        }

        /* Navigation arrows */
        .nav-arrow {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: background 0.2s;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-arrow:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .nav-arrow.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* Main dialogue container */
        .dialogue-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 2;
            padding-top: 72px;
            box-sizing: border-box;
        }

        /* Dialogue messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 40px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-left {
            justify-content: flex-start;
        }

        .message-right {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 75%;
            padding: 16px 20px;
            border-radius: 20px;
            position: relative;
            line-height: 1.5;
            font-size: 17px;
            word-wrap: break-word;
        }

        .message-left .message-bubble {
            background: rgba(76, 175, 80, 0.15);
            border: 1px solid rgba(76, 175, 80, 0.2);
            border-bottom-left-radius: 4px;
            margin-left: 12px;
        }

        .message-right .message-bubble {
            background: rgba(255, 152, 0, 0.15);
            border: 1px solid rgba(255, 152, 0, 0.2);
            border-bottom-right-radius: 4px;
            margin-right: 12px;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message-left .message-avatar {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
        }

        .message-right .message-avatar {
            background: linear-gradient(135deg, #FF9800, #EF6C00);
            color: white;
        }

        .speaker-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .speaker-role {
            font-size: 12px;
            color: #aaa;
            font-weight: 400;
        }

        .translation {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 15px;
            color: #ddd;
            line-height: 1.5;
            display: none;
        }

        .translation-visible {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        /* Bottom hint */
        .bottom-hint {
            position: absolute;
            bottom: calc(var(--hint-offset) + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            color: #999;
            font-size: 13px;
            z-index: 3;
            white-space: nowrap;
            max-width: calc(100% - 40px);
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Progress indicator */
        .progress {
            color: #aaa;
            font-weight: 400;
            font-size: 14px;
        }

        /* Target words panel */
        .target-words-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 90;
            display: none;
        }

        .target-words-panel.visible {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .target-words-title {
            font-weight: 700;
            margin-bottom: 12px;
            font-size: 16px;
            color: #4CAF50;
        }

        .target-words-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .target-word {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 10px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 600;
        }

        /* Loading */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #aaa;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .message-bubble {
                max-width: 85%;
                font-size: 16px;
                padding: 14px 18px;
            }

            .top-area {
                top: env(safe-area-inset-top, 0px);
            }

            .dialogue-container {
                padding-top: 60px;
            }

            .messages-container {
                padding: 15px;
                padding-bottom: 30px;
            }

            .nav-arrow {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="top-area hidden-ui" id="top-area">
        <div class="top-inner">
            <div class="top-left">
                <div class="back-button" id="back-button" title="Back"></div>
            </div>
            <div class="top-center">
                <div class="section-title" id="section-title">Dialogue</div>
                <div class="dialogue-subtitle" id="dialogue-subtitle"></div>
            </div>
            <div class="top-right">
                <div id="progress" class="progress"></div>
            </div>
        </div>
    </div>

    <!-- Target words panel -->
    <div class="target-words-panel hidden-ui" id="target-words-panel">
        <div class="target-words-title">Target Words</div>
        <div class="target-words-grid" id="target-words-grid"></div>
    </div>

    <!-- Dialogue container -->
    <div class="dialogue-container">
        <div class="messages-container" id="messages-container">
            <div class="loading" id="loading">Loading dialogue...</div>
        </div>
    </div>

    <!-- Navigation arrows -->
    <div class="nav-arrow hidden-ui" id="prev-arrow" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); z-index: 10;">
        ←
    </div>
    <div class="nav-arrow hidden-ui" id="next-arrow" style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); z-index: 10;">
        →
    </div>

    <!-- Bottom hint -->
    <div class="bottom-hint hidden-ui" id="hint">Tap to show/hide UI • Click message to reveal translation</div>

    <script>
        // Configuration
        const DIALOGUES_PATH = 'dialogs.json';
        const urlParams = new URLSearchParams(window.location.search);
        const dialogueId = urlParams.get('id') || urlParams.get('dialogue');

        // DOM Elements
        const topArea = document.getElementById('top-area');
        const backButton = document.getElementById('back-button');
        const sectionTitle = document.getElementById('section-title');
        const dialogueSubtitle = document.getElementById('dialogue-subtitle');
        const progressEl = document.getElementById('progress');
        const messagesContainer = document.getElementById('messages-container');
        const loadingEl = document.getElementById('loading');
        const hintEl = document.getElementById('hint');
        const prevArrow = document.getElementById('prev-arrow');
        const nextArrow = document.getElementById('next-arrow');
        const targetWordsPanel = document.getElementById('target-words-panel');
        const targetWordsGrid = document.getElementById('target-words-grid');

        // State
        let dialoguesList = [];
        let currentDialogueIndex = -1;
        let currentDialogue = null;
        let isUIHidden = true;
        let audioElements = new Map();

        // Initialize
        function init() {
            updateUIVisibility();
            setHintText();
            loadDialoguesList();

            // Event listeners
            backButton.addEventListener('click', () => {
                window.location.href = 'index.html';
            });

            prevArrow.addEventListener('click', goToPreviousDialogue);
            nextArrow.addEventListener('click', goToNextDialogue);

            // Tap to toggle UI
            document.addEventListener('click', (e) => {
                // Don't toggle if clicking interactive elements
                if (e.target.closest('.back-button') ||
                    e.target.closest('.nav-arrow') ||
                    e.target.closest('.message-bubble')) {
                    return;
                }

                isUIHidden = !isUIHidden;
                updateUIVisibility();
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') goToPreviousDialogue();
                if (e.key === 'ArrowRight') goToNextDialogue();
                if (e.key === 'Escape') isUIHidden = true;
                if (e.key === ' ') {
                    isUIHidden = !isUIHidden;
                    updateUIVisibility();
                }
            });
        }

        function updateUIVisibility() {
            if (isUIHidden) {
                topArea.classList.add('hidden-ui');
                prevArrow.classList.add('hidden-ui');
                nextArrow.classList.add('hidden-ui');
                hintEl.classList.add('hidden-ui');
                targetWordsPanel.classList.add('hidden-ui');
            } else {
                topArea.classList.remove('hidden-ui');
                prevArrow.classList.remove('hidden-ui');
                nextArrow.classList.remove('hidden-ui');
                hintEl.classList.remove('hidden-ui');
                updateNavigationArrows();
            }
        }

        function setHintText() {
            hintEl.textContent = 'Tap to show/hide UI • Click message to reveal translation';
        }

        // Load dialogues list
        async function loadDialoguesList() {
            try {
                const response = await fetch(DIALOGUES_PATH);
                if (!response.ok) throw new Error('Failed to load dialogues list');

                const data = await response.json();
                dialoguesList = data.items || [];

                if (dialoguesList.length === 0) {
                    loadingEl.textContent = 'No dialogues available';
                    return;
                }

                // Find starting dialogue
                let startIndex = 0;
                if (dialogueId) {
                    startIndex = dialoguesList.findIndex(d => d.id === dialogueId);
                    if (startIndex === -1) startIndex = 0;
                }

                currentDialogueIndex = startIndex;
                loadDialogue(startIndex);

            } catch (error) {
                console.error('Error loading dialogues list:', error);
                loadingEl.textContent = 'Error loading dialogues. Check console.';
            }
        }

        // Load specific dialogue
        async function loadDialogue(index) {
            if (index < 0 || index >= dialoguesList.length) return;

            loadingEl.style.display = 'block';
            messagesContainer.innerHTML = '';
            messagesContainer.appendChild(loadingEl);

            currentDialogueIndex = index;
            const dialogueInfo = dialoguesList[index];

            try {
                const response = await fetch(dialogueInfo.file);
                if (!response.ok) throw new Error('Failed to load dialogue');

                currentDialogue = await response.json();
                renderDialogue();
                updateNavigationArrows();
                playDialogueAudio();

            } catch (error) {
                console.error('Error loading dialogue:', error);
                loadingEl.textContent = 'Error loading dialogue. Check console.';
            }
        }

        // Render dialogue
        function renderDialogue() {
            if (!currentDialogue) return;

            loadingEl.style.display = 'none';
            messagesContainer.innerHTML = '';

            // Update header
            sectionTitle.textContent = currentDialogue.theme || 'Dialogue';
            dialogueSubtitle.textContent = `${currentDialogue.level || ''} • ${currentDialogue.id || ''}`.trim();
            progressEl.textContent = `${currentDialogueIndex + 1}/${dialoguesList.length}`;

            // Render target words
            renderTargetWords();

            // Determine characters for positioning
            const characters = Object.keys(currentDialogue.characters || {});
            if (characters.length >= 2) {
                const char1 = characters[0];
                const char2 = characters[1];

                // Render each message
                currentDialogue.dialogue.forEach(message => {
                    const isChar1 = message.speaker === char1;
                    const messageEl = createMessageElement(message, isChar1 ? char1 : char2, isChar1);
                    messagesContainer.appendChild(messageEl);
                });
            } else {
                // Fallback if characters not defined properly
                currentDialogue.dialogue.forEach((message, index) => {
                    const isLeft = index % 2 === 0;
                    const messageEl = createMessageElement(message, message.speaker || 'Speaker', isLeft);
                    messagesContainer.appendChild(messageEl);
                });
            }

            // Scroll to bottom
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        function createMessageElement(message, speaker, isLeft) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isLeft ? 'message-left' : 'message-right'}`;

            const character = currentDialogue.characters?.[speaker];

            const avatarText = speaker.substring(0, 2).toUpperCase();
            const role = character?.role || '';

            messageDiv.innerHTML = `
                ${isLeft ? `
                    <div class="message-avatar">${avatarText}</div>
                    <div class="message-bubble">
                        <div class="speaker-name">
                            ${speaker}
                            ${role ? `<span class="speaker-role">${role}</span>` : ''}
                        </div>
                        <div class="message-text">${message.en}</div>
                        <div class="translation" id="translation-${message.id}">
                            ${message.ru}
                        </div>
                    </div>
                ` : `
                    <div class="message-bubble">
                        <div class="speaker-name" style="justify-content: flex-end;">
                            ${role ? `<span class="speaker-role">${role}</span>` : ''}
                            ${speaker}
                        </div>
                        <div class="message-text">${message.en}</div>
                        <div class="translation" id="translation-${message.id}">
                            ${message.ru}
                        </div>
                    </div>
                    <div class="message-avatar">${avatarText}</div>
                `}
            `;

            // Add click to show translation
            const bubble = messageDiv.querySelector('.message-bubble');
            bubble.addEventListener('click', () => {
                const translation = messageDiv.querySelector('.translation');
                translation.classList.toggle('translation-visible');

                // Auto-hide translation after 5 seconds
                if (translation.classList.contains('translation-visible')) {
                    setTimeout(() => {
                        if (translation.classList.contains('translation-visible')) {
                            translation.classList.remove('translation-visible');
                        }
                    }, 5000);
                }
            });

            return messageDiv;
        }

        function renderTargetWords() {
            if (!currentDialogue?.target_words) return;

            targetWordsGrid.innerHTML = '';
            currentDialogue.target_words.forEach(word => {
                const wordEl = document.createElement('div');
                wordEl.className = 'target-word';
                wordEl.textContent = word;
                targetWordsGrid.appendChild(wordEl);
            });

            // Show target words when UI is visible
            if (!isUIHidden) {
                setTimeout(() => {
                    targetWordsPanel.classList.add('visible');
                    setTimeout(() => {
                        targetWordsPanel.classList.remove('visible');
                    }, 3000);
                }, 300);
            }
        }

        function updateNavigationArrows() {
            prevArrow.classList.toggle('disabled', currentDialogueIndex === 0);
            nextArrow.classList.toggle('disabled', currentDialogueIndex === dialoguesList.length - 1);
        }

        function goToPreviousDialogue() {
            if (currentDialogueIndex > 0) {
                loadDialogue(currentDialogueIndex - 1);
            }
        }

        function goToNextDialogue() {
            if (currentDialogueIndex < dialoguesList.length - 1) {
                loadDialogue(currentDialogueIndex + 1);
            }
        }

        // Audio playback
        function playDialogueAudio() {
            // Stop any currently playing audio
            audioElements.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            audioElements.clear();

            if (!currentDialogue?.dialogue) return;

            // Auto-play first line after a delay
            setTimeout(() => {
                playLineAudio(0);
            }, 800);
        }

        function playLineAudio(lineIndex) {
            if (!currentDialogue?.dialogue || lineIndex >= currentDialogue.dialogue.length) return;

            const line = currentDialogue.dialogue[lineIndex];
            const audioKey = `${currentDialogue.id}_${line.id}`;

            // Try to load audio file
            const audioPath = `audio/dialogues/${currentDialogue.id}/line_${line.id}.mp3`;
            const audio = new Audio(audioPath);

            audio.addEventListener('canplaythrough', () => {
                audio.play().catch(e => console.log('Autoplay prevented:', e));
            });

            audio.addEventListener('ended', () => {
                // Play next line after a pause
                setTimeout(() => {
                    playLineAudio(lineIndex + 1);
                }, 800);
            });

            audio.addEventListener('error', () => {
                // If audio file doesn't exist, continue to next line
                setTimeout(() => {
                    playLineAudio(lineIndex + 1);
                }, 1000);
            });

            audioElements.set(audioKey, audio);
            audio.load();
        }

        // Edge back handler for mobile
        (function() {
            let tStartX = null, tStartY = null, tStartTime = 0;

            window.addEventListener('touchstart', (ev) => {
                const t = ev.touches && ev.touches[0];
                if (!t) return;
                tStartX = t.clientX;
                tStartY = t.clientY;
                tStartTime = Date.now();
            }, { passive: true });

            window.addEventListener('touchend', (ev) => {
                try {
                    const t = (ev.changedTouches && ev.changedTouches[0]) || {};
                    if (tStartX !== null && t.clientX !== undefined) {
                        const dx = Math.abs(t.clientX - tStartX || 0);
                        const dy = Math.abs(t.clientY - tStartY || 0);
                        const dt = Date.now() - tStartTime;

                        // If started near left edge, short tap and small movement -> go back
                        if (tStartX <= 60 && dx < 30 && dy < 40 && dt < 500) {
                            window.location.href = 'index.html';
                        }
                    }
                } catch (e) {
                    // Ignore errors
                }

                tStartX = null;
                tStartY = null;
                tStartTime = 0;
            }, { passive: true });
        })();

        // Initialize
        init();
    </script>
</body>
</html>
