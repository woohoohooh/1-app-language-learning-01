<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Review — variant 1002 (move real English element)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        html,body{height:100%;margin:0;background:#121212;color:#fff;font-family:Nunito,Arial,sans-serif;overflow:hidden}
        .container{position:relative;z-index:2;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .word-large{font-size:48px;font-weight:800;text-align:center;user-select:none;transition:transform .06s ease,opacity .06s}
        .translation{font-size:64px;font-weight:800;color:#4caf50;margin-top:24px;opacity:0;transition:opacity .12s}
        .top-area{position:absolute;top:0;left:0;right:0;height:72px;display:flex;align-items:center;z-index:3}
        .top-inner{width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
        .back-button{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center}
        .progress{color:#aaa}
    </style>
</head>
<body>
    <div class="top-area"><div class="top-inner"><div style="width:48px"></div><div id="section-title">Review Words</div><div id="progress" class="progress"></div></div></div>
    <div class="container">
        <div id="wordLarge" class="word-large">Loading...</div>
        <div id="translation" class="translation"></div>
    </div>
    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const listId = urlParams.get('list');
    const wordEl = document.getElementById('wordLarge');
    const transEl = document.getElementById('translation');
    const progressEl = document.getElementById('progress');

    async function fetchJson(path){ try{ const r=await fetch(path); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }
    let words=[]; let idx=0;
    async function load(){ const requested=decodeURIComponent(listId||''); let list=await fetchJson(requested)||await fetchJson(`english/${requested}`); if(!list){ wordEl.textContent='Error'; return;} words=list.words||[]; show(); }
    function playAudio(w){ try{ let src=(w.audio&&w.audio[0])||`audio/${w.english.toLowerCase().replace(/[^a-z0-9]/g,'_')}.wav`; new Audio(src).play().catch(()=>{});}catch(e){} }
    function show(){ const w=words[idx]; wordEl.textContent=w.english; transEl.textContent=''; transEl.style.opacity='0'; playAudio(w); progressEl.textContent=`${idx+1}/${words.length}`; }
    // drag: move real wordEl, on dragstart show transEl large and fixed
    let active=false, sx=0, sy=0, lx=0, ly=0;
    const START_DRAG=2, DRAG_THRESHOLD=40;
    function down(e){ const p=(e.touches&&e.touches[0])||e; sx=p.clientX; sy=p.clientY; lx=sx; ly=sy; active=false; e.preventDefault&&e.preventDefault(); }
    function mv(e){ if(sx===null) return; const p=(e.touches&&e.touches[0])||e; const dx=p.clientX-sx, dy=p.clientY-sy; lx=p.clientX; ly=p.clientY; if(!active && Math.max(Math.abs(dx),Math.abs(dy))>=START_DRAG){ active=true; transEl.textContent=words[idx].translation||words[idx].russian||''; transEl.style.opacity='1'; }
        if(active){ wordEl.style.transform=`translate(${dx}px, ${dy}px)`; }
    }
    function up(e){ if(!active){ const ta=document.querySelector('.top-area'); ta.classList.toggle('hidden-ui'); sx=null; return; } const dx=lx-sx, dy=ly-sy; if(Math.abs(dx)<DRAG_THRESHOLD && Math.abs(dy)<DRAG_THRESHOLD){ wordEl.style.transition='transform .18s'; wordEl.style.transform=''; setTimeout(()=>{ wordEl.style.transition=''; },180); sx=null; return; } const action = Math.abs(dx)>Math.abs(dy)? (dx>0?'review':'known') : (dy>0?'review':'known'); wordEl.style.transition='transform .32s ease,opacity .22s'; const offX=(dx>0?1:-1)*(window.innerWidth+200); const offY=(dy>0?1:-1)*(window.innerHeight+200); wordEl.style.transform=`translate(${offX}px, ${offY}px)`; wordEl.style.opacity='0'; setTimeout(()=>{ idx++; if(idx>=words.length){ wordEl.textContent='Done'; return; } wordEl.style.transition=''; wordEl.style.transform=''; wordEl.style.opacity='1'; show(); },340); sx=null; }
    window.addEventListener('mousedown',down); window.addEventListener('touchstart',down,{passive:false}); window.addEventListener('mousemove',mv); window.addEventListener('touchmove',mv,{passive:false}); window.addEventListener('mouseup',up); window.addEventListener('touchend',up);
    load();
    </script>
</body>
</html>
